<!doctype html>
<html lang="tr">
<head>

<title>Anyela Born | Geçici Olarak Kapalı</title>
<style>
:root{--dkd_anyela_closed_bg:#05002b;--dkd_anyela_closed_pink:#ff2bd6;--dkd_anyela_closed_cyan:#18f7ff;--dkd_anyela_closed_text:#fff;--dkd_anyela_closed_muted:rgba(255,255,255,.74);color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 15% 0%,rgba(255,43,214,.25),transparent 24rem),radial-gradient(circle at 88% 10%,rgba(24,247,255,.18),transparent 26rem),linear-gradient(180deg,#090044 0%,var(--dkd_anyela_closed_bg) 100%);color:var(--dkd_anyela_closed_text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.dkd_anyela_closed_page{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px}.dkd_anyela_closed_card{width:min(100%,430px);padding:28px 22px;border-radius:32px;background:linear-gradient(145deg,rgba(18,4,70,.92),rgba(4,0,26,.94));border:1px solid rgba(255,255,255,.16);box-shadow:0 28px 90px rgba(0,0,0,.58),0 0 54px rgba(255,43,214,.22),0 0 72px rgba(24,247,255,.14);text-align:center}.dkd_anyela_closed_badge{display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;padding:9px 13px;border-radius:999px;background:rgba(24,247,255,.13);border:1px solid rgba(24,247,255,.28);color:#9efffb;font-size:12px;font-weight:950;letter-spacing:.12em}.dkd_anyela_closed_title{margin:0;font-size:clamp(30px,9vw,44px);line-height:1.03;text-shadow:0 0 24px rgba(255,43,214,.55)}.dkd_anyela_closed_text{margin:14px 0 0;color:var(--dkd_anyela_closed_muted);font-size:15px;line-height:1.55}.dkd_anyela_closed_note{margin-top:18px;padding:14px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:rgba(255,255,255,.82);font-size:13px;line-height:1.45}@media(min-width:820px){.dkd_anyela_closed_card{border-radius:38px;padding:34px 28px}}

</head>

<main class="dkd_anyela_closed_page" aria-label="Anyela Born geçici kapalı ekranı">
<section class="dkd_anyela_closed_card">

<div class="dkd_anyela_closed_note">Bakım ve düzenleme tamamlandığında tekrar aktif edilecektir.</div>
</section>
</main>
</body>
