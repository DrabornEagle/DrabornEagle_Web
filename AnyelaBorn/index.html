<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06092b" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Anyela Born Club</title>
    <style>
      :root {
        color-scheme: dark;
        --dkd_anyela_root_pink: #ff4fc5;
        --dkd_anyela_root_orange: #ff8d34;
        --dkd_anyela_root_text: #fff8ff;
        --dkd_anyela_root_mute: rgba(255, 248, 255, 0.62);
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--dkd_anyela_root_text);
        background:
          radial-gradient(circle at 14% 12%, rgba(255, 79, 197, 0.26), transparent 30%),
          radial-gradient(circle at 88% 42%, rgba(255, 141, 52, 0.18), transparent 32%),
          linear-gradient(180deg, #050927 0%, #090b31 100%);
      }
      .dkd_anyela_root_hold {
        width: min(92vw, 560px);
        padding: 30px 22px;
        border: 1px solid rgba(255, 92, 211, 0.28);
        border-radius: 26px;
        text-align: center;
        background: rgba(10, 12, 47, 0.72);
        box-shadow: 0 28px 72px rgba(0,0,0,0.34);
      }
      .dkd_anyela_root_hold strong {
        display: block;
        font-size: clamp(24px, 8vw, 40px);
        letter-spacing: 0.02em;
        background: linear-gradient(100deg, var(--dkd_anyela_root_orange), var(--dkd_anyela_root_pink));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .dkd_anyela_root_hold span {
        display: block;
        margin-top: 12px;
        color: var(--dkd_anyela_root_mute);
        font-size: clamp(14px, 4vw, 18px);
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_root_hold" aria-label="Anyela Born ana sayfa hazırlık ekranı">
      <strong>Anyela Born</strong>
      <span>Ana sayfa hazırlanıyor. Bu alan şimdilik aktif değildir.</span>
    </main>
  </body>
</html>
