<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07103a" />
    <meta name="robots" content="noindex, follow" />
    <title>Anyela Born Club</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #fff8ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 79, 197, 0.26), transparent 34%),
          linear-gradient(180deg, #050927 0%, #090826 100%);
      }
      main {
        width: min(100%, 480px);
        padding: 28px;
        border: 1px solid rgba(255, 92, 211, 0.34);
        border-radius: 24px;
        background: rgba(9, 12, 48, 0.74);
        text-align: center;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.44);
      }
      h1 { margin: 0 0 10px; font-size: clamp(24px, 7vw, 38px); }
      p { margin: 0; color: rgba(255, 246, 255, 0.7); line-height: 1.55; }
    </style>
  </head>
  <body>
    <main aria-label="Anyela Born ana sayfa hazırlık ekranı">
      <h1>Anyela Born</h1>
      <p>Ana sayfa hazırlanıyor.</p>
    </main>
  </body>
</html>
