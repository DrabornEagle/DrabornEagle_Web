<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1040" />
    <meta
      name="description"
      content="Anyela Born Club ana sayfası — özel sohbet, sesli mesaj, fotoğraf & video ve reklam paketleri."
    />
    <meta property="og:title" content="Anyela Born Club" />
    <meta
      property="og:description"
      content="Anyela Born Club dünyasına hoş geldin. Özel sohbet, sesli mesaj ve özel içerikler."
    />
    <meta property="og:image" content="./assets/dkd_anyela_miami_home_reference.png" />
    <title>Anyela Born Club</title>
    <link rel="stylesheet" href="./dkd_anyela_home.css" />
  </head>
  <body>
    <main class="dkd_anyela_home_page" id="dkd_anyela_home_root">
      <section class="dkd_anyela_home_shell" aria-label="Anyela Born Club ana sayfa">
        <div class="dkd_anyela_home_phone">
          <img
            class="dkd_anyela_home_mockup"
            src="./assets/dkd_anyela_miami_home_reference.png"
            alt="Anyela Born Club Miami temalı ana sayfa"
            width="864"
            height="1536"
            loading="eager"
          />

          <nav class="dkd_anyela_home_hotspots" aria-label="Anyela Born Club hızlı bağlantılar">
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_menu" href="#dkd_anyela_home_menu" aria-label="Menüyü aç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_notifications" href="#dkd_anyela_home_notifications" aria-label="Bildirimler"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_start" href="./Login/" aria-label="Hemen başla ve giriş sayfasına git"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_chat_card" href="#dkd_anyela_home_chat" aria-label="Sohbet paketleri"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_voice_card" href="#dkd_anyela_home_voice" aria-label="Voice Chat paketleri"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_photo_card" href="#dkd_anyela_home_photo" aria-label="Fotoğraf ve video paketleri"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_ads_card" href="#dkd_anyela_home_ads" aria-label="Reklam paketleri"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_home" href="./" aria-label="Ana sayfa"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_packages" href="#dkd_anyela_home_packages" aria-label="Paketler"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_chat" href="./Login/" aria-label="Chat"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_orders" href="#dkd_anyela_home_orders" aria-label="Siparişler"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_profile" href="./Login/" aria-label="Profil"></a>
          </nav>
        </div>

        <section class="dkd_anyela_home_text_fallback" aria-label="Sayfa özeti">
          <h1>Anyela Born Club</h1>
          <p>
            Anyela Born Club ana sayfası; özel sohbet, sesli mesaj, fotoğraf & video ve
            reklam paketleri için Miami temalı mobil giriş ekranıdır.
          </p>
          <a class="dkd_anyela_home_fallback_button" href="./Login/">Hemen Başla</a>
        </section>
      </section>
    </main>

    <script src="./dkd_anyela_home.js"></script>
  </body>
</html>
