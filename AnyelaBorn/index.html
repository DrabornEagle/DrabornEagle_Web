<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07103a" />
    <meta name="robots" content="noindex" />
    <title>Anyela Born Club</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        padding: 28px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff8ff;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 73, 203, 0.28), transparent 30%),
          radial-gradient(circle at 82% 18%, rgba(255, 142, 69, 0.2), transparent 31%),
          linear-gradient(180deg, #050927 0%, #090b31 54%, #06071f 100%);
      }
      main {
        width: min(100%, 560px);
        padding: 30px 22px;
        border: 1px solid rgba(255, 92, 211, 0.34);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(18, 18, 62, 0.88), rgba(8, 10, 38, 0.94));
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.44), 0 0 34px rgba(255, 72, 204, 0.14);
        text-align: center;
      }
      h1 { margin: 0 0 10px; font-size: clamp(30px, 8vw, 52px); line-height: 0.95; color: #ff59d0; }
      p { margin: 0; color: rgba(255, 246, 255, 0.72); font-size: clamp(15px, 4vw, 19px); line-height: 1.55; }
      strong { color: #fff; }
    </style>
  </head>
  <body>
    <main aria-label="Anyela Born ana sayfa">
      <h1>Anyela Born Club</h1>
      <p><strong>Ana sayfa hazırlanıyor.</strong><br />Giriş ekranı ayrı olarak <strong>/AnyelaBorn/Login</strong> altında çalışacak.</p>
    </main>
  </body>
</html>
