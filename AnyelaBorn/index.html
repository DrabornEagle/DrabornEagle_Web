<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05002b">
<meta name="robots" content="noindex,nofollow">
<title>Anyela Born | Yapım Aşamasında</title>
<style>
:root{--dkd_anyela_creator_bg:#05002b;--dkd_anyela_creator_pink:#ff2bd6;--dkd_anyela_creator_cyan:#18f7ff;--dkd_anyela_creator_text:#fff;--dkd_anyela_creator_muted:rgba(255,255,255,.76);color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 14% 0%,rgba(255,43,214,.26),transparent 25rem),radial-gradient(circle at 90% 8%,rgba(24,247,255,.18),transparent 27rem),linear-gradient(180deg,#090044 0%,var(--dkd_anyela_creator_bg) 100%);color:var(--dkd_anyela_creator_text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.dkd_anyela_creator_page{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px}.dkd_anyela_creator_card{width:min(100%,430px);padding:30px 22px;border-radius:34px;background:linear-gradient(145deg,rgba(20,4,76,.94),rgba(4,0,26,.96));border:1px solid rgba(255,255,255,.16);box-shadow:0 28px 90px rgba(0,0,0,.58),0 0 58px rgba(255,43,214,.22),0 0 78px rgba(24,247,255,.14);text-align:center}.dkd_anyela_creator_badge{display:inline-flex;align-items:center;justify-content:center;margin-bottom:18px;padding:10px 14px;border-radius:999px;background:rgba(24,247,255,.13);border:1px solid rgba(24,247,255,.30);color:#9efffb;font-size:12px;font-weight:950;letter-spacing:.12em}.dkd_anyela_creator_title{margin:0;font-size:clamp(31px,9vw,46px);line-height:1.02;text-shadow:0 0 26px rgba(255,43,214,.58)}.dkd_anyela_creator_text{margin:15px 0 0;color:var(--dkd_anyela_creator_muted);font-size:16px;line-height:1.55}.dkd_anyela_creator_status{margin-top:18px;padding:15px;border-radius:22px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);color:rgba(255,255,255,.85);font-size:14px;font-weight:850;line-height:1.45}.dkd_anyela_creator_dot{display:inline-block;width:8px;height:8px;margin:0 7px;border-radius:999px;background:var(--dkd_anyela_creator_pink);box-shadow:0 0 18px var(--dkd_anyela_creator_pink)}@media(min-width:820px){.dkd_anyela_creator_card{border-radius:40px;padding:38px 30px}}
</style>
</head>
<body>
<main class="dkd_anyela_creator_page" aria-label="Anyela Born yapım aşamasında ekranı">
<section class="dkd_anyela_creator_card">
<div class="dkd_anyela_creator_badge">ANYELA BORN</div>
<h1 class="dkd_anyela_creator_title">Virtual AI Creator <span class="dkd_anyela_creator_dot"></span> yapım aşamasında</h1>
<p class="dkd_anyela_creator_text">Anyela Born deneyimi şimdilik hazırlanıyor.</p>
<div class="dkd_anyela_creator_status">Yakında daha modern ve tamamlanmış haliyle tekrar aktif olacak.</div>
</section>
</main>
</body>
</html>
