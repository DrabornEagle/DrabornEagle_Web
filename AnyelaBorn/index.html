<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07103a" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Anyela Born Club</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #fff8ff;
        background:
          radial-gradient(circle at 24% 18%, rgba(255, 78, 199, 0.32), transparent 30%),
          radial-gradient(circle at 82% 74%, rgba(255, 137, 52, 0.2), transparent 32%),
          linear-gradient(180deg, #050927 0%, #080a2d 48%, #05071d 100%);
      }
      .dkd_anyela_home_shell {
        width: min(92vw, 520px);
        padding: 30px 24px;
        border: 1px solid rgba(255, 92, 211, 0.36);
        border-radius: 28px;
        background: rgba(10, 12, 45, 0.72);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.48), 0 0 34px rgba(255, 72, 204, 0.16);
        text-align: center;
        backdrop-filter: blur(18px);
      }
      .dkd_anyela_home_logo {
        margin: 0 0 8px;
        font-size: clamp(38px, 12vw, 68px);
        line-height: 0.95;
        font-family: "Brush Script MT", "Segoe Script", cursive;
        color: #ff59cb;
        text-shadow: 0 0 26px rgba(255, 72, 204, 0.64);
      }
      .dkd_anyela_home_title {
        margin: 0;
        font-size: clamp(18px, 5vw, 27px);
        letter-spacing: 0.22em;
        font-weight: 800;
      }
      .dkd_anyela_home_note {
        margin: 18px auto 0;
        max-width: 360px;
        color: rgba(255, 246, 255, 0.72);
        font-size: 15px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_home_shell" aria-label="Anyela Born ana sayfa hazırlık ekranı">
      <h1 class="dkd_anyela_home_logo">Anyela♡</h1>
      <p class="dkd_anyela_home_title">BORN CLUB</p>
      <p class="dkd_anyela_home_note">Ana sayfa hazırlanıyor. Bu alan şimdilik aktif değildir.</p>
    </main>
  </body>
</html>
