<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#061044" />
    <meta
      name="description"
      content="Anyela Born Club ana sayfası — Miami temalı özel sohbet, sesli mesaj, sana özel içerikler, paketler ve marka reklam yüzü alanı."
    />
    <meta property="og:title" content="Anyela Born Club" />
    <meta
      property="og:description"
      content="Anyela ile premium fan deneyimini keşfet. Paket seç, özel chat odanı aç ve kişisel içeriklerini teslim al."
    />
    <meta property="og:image" content="./assets/dkd_anyela_miami_home_reference.png" />
    <title>Anyela Born Club</title>
    <style>
      :root {
        --dkd_anyela_root_bg: #05051d;
        --dkd_anyela_root_panel: rgba(255, 255, 255, 0.08);
        --dkd_anyela_root_focus: rgba(33, 217, 221, 0.82);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--dkd_anyela_root_bg);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100%;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #ffffff;
        background:
          radial-gradient(circle at 16% 4%, rgba(33, 217, 221, 0.28), transparent 25rem),
          radial-gradient(circle at 90% 8%, rgba(255, 79, 184, 0.30), transparent 25rem),
          linear-gradient(180deg, #071044 0%, #05051d 52%, #03030e 100%);
      }

      .dkd_anyela_page {
        min-height: 100svh;
        width: 100%;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_mockup_shell {
        width: min(100vw, 480px);
        min-height: 100svh;
        position: relative;
        background: #070526;
        box-shadow:
          0 32px 90px rgba(0, 0, 0, 0.56),
          0 0 88px rgba(255, 79, 184, 0.18),
          0 0 96px rgba(33, 217, 221, 0.14);
      }

      .dkd_anyela_mockup_frame {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: #070526;
      }

      .dkd_anyela_mockup_image {
        display: block;
        width: 100%;
        height: auto;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_hotspot_layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .dkd_anyela_hotspot {
        position: absolute;
        display: block;
        pointer-events: auto;
        border-radius: 999px;
        text-decoration: none;
        outline: none;
      }

      .dkd_anyela_hotspot:focus-visible {
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.92),
          0 0 0 7px var(--dkd_anyela_root_focus),
          0 0 28px rgba(255, 79, 184, 0.72);
        background: var(--dkd_anyela_root_panel);
      }

      .dkd_anyela_hotspot_menu {
        left: 91.5%;
        top: 1.1%;
        width: 6.9%;
        height: 4.0%;
      }

      .dkd_anyela_hotspot_packages_top {
        left: 3.8%;
        top: 29.4%;
        width: 34.4%;
        height: 3.6%;
      }

      .dkd_anyela_hotspot_chat_start {
        left: 3.8%;
        top: 33.8%;
        width: 34.4%;
        height: 3.6%;
      }

      .dkd_anyela_hotspot_intro {
        left: 3.7%;
        top: 51.2%;
        width: 29.8%;
        height: 17.6%;
        border-radius: 22px;
      }

      .dkd_anyela_hotspot_private {
        left: 34.8%;
        top: 51.2%;
        width: 29.8%;
        height: 17.6%;
        border-radius: 22px;
      }

      .dkd_anyela_hotspot_voice {
        left: 66.1%;
        top: 51.2%;
        width: 29.8%;
        height: 17.6%;
        border-radius: 22px;
      }

      .dkd_anyela_hotspot_photo {
        left: 3.6%;
        top: 72.8%;
        width: 44.4%;
        height: 7.4%;
        border-radius: 22px;
      }

      .dkd_anyela_hotspot_video {
        left: 50.4%;
        top: 72.8%;
        width: 45.3%;
        height: 7.4%;
        border-radius: 22px;
      }

      .dkd_anyela_hotspot_brand {
        left: 3.6%;
        top: 89.0%;
        width: 92.8%;
        height: 8.3%;
        border-radius: 24px;
      }

      .dkd_anyela_hotspot_nav_home {
        left: 2.2%;
        bottom: 0.2%;
        width: 22.2%;
        height: 4.4%;
        border-radius: 18px;
      }

      .dkd_anyela_hotspot_nav_packages {
        left: 26.2%;
        bottom: 0.2%;
        width: 22.8%;
        height: 4.4%;
        border-radius: 18px;
      }

      .dkd_anyela_hotspot_nav_chat {
        left: 51.2%;
        bottom: 0.2%;
        width: 21.2%;
        height: 4.4%;
        border-radius: 18px;
      }

      .dkd_anyela_hotspot_nav_profile {
        left: 75.0%;
        bottom: 0.2%;
        width: 22.8%;
        height: 4.4%;
        border-radius: 18px;
      }

      .dkd_anyela_screen_reader_text {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }

      @media (min-width: 820px) {
        .dkd_anyela_page {
          align-items: center;
          padding: 34px 0;
        }

        .dkd_anyela_mockup_shell {
          min-height: auto;
          border-radius: 38px;
          overflow: hidden;
          border: 1px solid rgba(255, 255, 255, 0.14);
        }
      }

      @supports (height: 100dvh) {
        .dkd_anyela_page,
        .dkd_anyela_mockup_shell {
          min-height: 100dvh;
        }

        @media (min-width: 820px) {
          .dkd_anyela_mockup_shell {
            min-height: auto;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_page" id="dkd_anyela_home_root">
      <section class="dkd_anyela_mockup_shell" aria-label="Anyela Born Club mobile ana sayfası">
        <div class="dkd_anyela_mockup_frame">
          <img
            class="dkd_anyela_mockup_image"
            src="./assets/dkd_anyela_miami_home_reference.png"
            alt="Anyela Born Club Miami temalı mobile ana sayfa tasarımı"
            width="864"
            height="1536"
            loading="eager"
          />

          <nav class="dkd_anyela_hotspot_layer" aria-label="Anyela Born Club hızlı bağlantılar">
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_menu" href="./Login/" aria-label="Menüyü ve giriş sayfasını aç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_packages_top" href="./Login/?dkd_anyela_section=packages" aria-label="Paketleri incele"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_chat_start" href="./Login/?dkd_anyela_section=chat" aria-label="Özel sohbet başlat"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_intro" href="./Login/?dkd_anyela_package=intro" aria-label="Anyela Intro paketini seç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_private" href="./Login/?dkd_anyela_package=private-chat" aria-label="Private Chat paketini seç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_voice" href="./Login/?dkd_anyela_package=voice-intro" aria-label="Voice Intro paketini seç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_photo" href="./Login/?dkd_anyela_package=photo-set" aria-label="Photo Set paketini seç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_video" href="./Login/?dkd_anyela_package=talking-video" aria-label="Talking Video paketini seç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_brand" href="./Login/?dkd_anyela_section=brand" aria-label="Markan için Anyela reklam alanını aç"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_home" href="./" aria-label="Ana Sayfa"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_packages" href="./Login/?dkd_anyela_section=packages" aria-label="Paketler"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_chat" href="./Login/?dkd_anyela_section=chat" aria-label="Chat"></a>
            <a class="dkd_anyela_hotspot dkd_anyela_hotspot_nav_profile" href="./Login/?dkd_anyela_section=profile" aria-label="Profil"></a>
          </nav>
        </div>

        <section class="dkd_anyela_screen_reader_text" aria-label="Sayfa özeti">
          <h1>Anyela Born Club</h1>
          <p>Özel sohbet, sesli mesaj ve sana özel içerikler. Paketleri incele, özel sohbet başlat ve markan için Anyela reklam yüzü alanını keşfet.</p>
        </section>
      </section>
    </main>
  </body>
</html>
