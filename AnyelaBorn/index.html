<!doctype html>
<html lang="tr">
  <head>

    <style>

      .dkd_anyela_root_mobile_shell { position:relative; width:min(100vw,480px); min-height:100svh; overflow:hidden; background:#05002b; box-shadow:var(--dkd_anyela_root_shadow); }
      .dkd_anyela_root_mockup { display:block; width:100%; height:auto; min-height:100svh; object-fit:contain; object-position:center top; user-select:none; -webkit-user-drag:none; }
      .dkd_anyela_root_video { position:absolute; left:3.62%; top:46.72%; width:92.76%; height:39.45%; z-index:70; display:block; object-fit:cover; object-position:center center; border-radius:22px; opacity:0; pointer-events:none; background:#000; box-shadow:0 0 18px rgba(255,35,188,.28),0 0 22px rgba(24,247,255,.18); transition:opacity 180ms ease; }
      .dkd_anyela_root_video[data-dkd-anyela-video-active="true"] { opacity:1; pointer-events:auto; }
      .dkd_anyela_root_start_button,.dkd_anyela_root_play_button { position:absolute; z-index:90; display:block; border-radius:999px; background:transparent; cursor:pointer; outline:none; }
      .dkd_anyela_root_start_button { left:3.30%; top:31.65%; width:93.40%; height:11.80%; border-radius:34px; }
      .dkd_anyela_root_play_button { left:38.75%; top:62.95%; width:22.65%; height:11.4%; }
      .dkd_anyela_root_screen_reader { position:absolute; width:1px; height:1px; margin:-1px; padding:0; overflow:hidden; clip-path:inset(50%); border:0; white-space:nowrap; }
      @media (min-width:820px) { .dkd_anyela_root_page { align-items:center; padding:32px 0; } .dkd_anyela_root_mobile_shell { width:min(44vw,480px); min-height:auto; border-radius:38px; border:1px solid rgba(255,255,255,.16); box-shadow:0 42px 110px rgba(0,0,0,.58),0 0 90px rgba(255,35,188,.25),0 0 120px rgba(24,247,255,.18); } .dkd_anyela_root_mockup { min-height:auto; } }

  </head>
  <body>
    <main class="dkd_anyela_root_page" aria-label="Anyela Born Club ana sayfa">

        <video class="dkd_anyela_root_video" id="dkd_anyela_root_video" src="./assets/dkd_anyela_root_video_9950_20260530.mp4?v=20260601autoplay" preload="auto" playsinline webkit-playsinline autoplay muted controls controlslist="nodownload noplaybackrate"></video>
        <button class="dkd_anyela_root_start_button" id="dkd_anyela_root_start_button" type="button" aria-label="Anyela ile hemen tanışmaya başla"></button>
        <button class="dkd_anyela_root_play_button" id="dkd_anyela_root_play_button" type="button" aria-label="Anyela video oynat"></button>
        <section class="dkd_anyela_root_screen_reader" aria-label="Sayfa özeti"><h1>Anyela Born Club</h1><p>Video otomatik başlar. Video bitince Login sayfasına yönlendirir.</p></section>
      </section>
    </main>
    <script>
      (function dkdAnyelaRootVideoRoute(){
        "use strict";
        const dkdAnyelaRootVideo=document.getElementById("dkd_anyela_root_video");
        const dkdAnyelaRootLoginPath="./Login/";
        const dkdAnyelaRootPlayButton=document.getElementById("dkd_anyela_root_play_button");
        const dkdAnyelaRootStartButton=document.getElementById("dkd_anyela_root_start_button");
        function dkdAnyelaRootShowVideo(){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootVideo.setAttribute("data-dkd-anyela-video-active","true");}
        function dkdAnyelaRootTryAutoplay(){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootShowVideo();dkdAnyelaRootVideo.muted=true;const dkdAnyelaRootPlayResult=dkdAnyelaRootVideo.play();if(dkdAnyelaRootPlayResult&&typeof dkdAnyelaRootPlayResult.catch==="function"){dkdAnyelaRootPlayResult.catch(function dkdAnyelaRootAutoplayBlocked(){dkdAnyelaRootShowVideo();});}}
        function dkdAnyelaRootPlayVideo(dkdAnyelaRootEvent){if(dkdAnyelaRootEvent){dkdAnyelaRootEvent.preventDefault();dkdAnyelaRootEvent.stopPropagation();}if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootShowVideo();dkdAnyelaRootVideo.muted=false;const dkdAnyelaRootPlayResult=dkdAnyelaRootVideo.play();if(dkdAnyelaRootPlayResult&&typeof dkdAnyelaRootPlayResult.catch==="function"){dkdAnyelaRootPlayResult.catch(function dkdAnyelaRootMuteFallback(){dkdAnyelaRootVideo.muted=true;dkdAnyelaRootVideo.play();});}}
        [dkdAnyelaRootStartButton,dkdAnyelaRootPlayButton].forEach(function dkdAnyelaRootBindPlayButton(dkdAnyelaRootButton){if(!dkdAnyelaRootButton){return;}dkdAnyelaRootButton.addEventListener("click",dkdAnyelaRootPlayVideo);dkdAnyelaRootButton.addEventListener("touchend",dkdAnyelaRootPlayVideo);});
        if(dkdAnyelaRootVideo){dkdAnyelaRootVideo.addEventListener("click",function dkdAnyelaRootStopVideoClick(dkdAnyelaRootEvent){dkdAnyelaRootEvent.stopPropagation();});dkdAnyelaRootVideo.addEventListener("play",dkdAnyelaRootShowVideo);dkdAnyelaRootVideo.addEventListener("ended",function dkdAnyelaRootGoLogin(){window.location.href=dkdAnyelaRootLoginPath;});}
        window.addEventListener("DOMContentLoaded",dkdAnyelaRootTryAutoplay);
        window.addEventListener("load",dkdAnyelaRootTryAutoplay);
        window.setTimeout(dkdAnyelaRootTryAutoplay,600);
      })();
    </script>
  </body>
</html>
