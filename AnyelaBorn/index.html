<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05002b" />
    <meta name="description" content="Anyela Born Club ana sayfası — Miami Vibes video tanıtım ekranı." />
    <meta property="og:title" content="Anyela Born Club" />
    <meta property="og:description" content="Anyela Born Club dünyasına giriş yap. Video otomatik başlar ve bitince login sayfasına yönlendirir." />
    <meta property="og:image" content="./assets/dkd_anyela_root_9950_20260530.png" />
    <title>Anyela Born Club</title>
    <style>
      :root{--dkd_anyela_root_bg:#05002b;--dkd_anyela_root_shadow:0 28px 90px rgba(0,0,0,.54);color-scheme:dark}
      *{box-sizing:border-box}
      html,body{min-height:100%;margin:0;background:#05002b;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
      button{border:0;padding:0;font:inherit;-webkit-tap-highlight-color:transparent}
      .dkd_anyela_root_page{width:100%;min-height:100svh;display:flex;justify-content:center;background:#05002b}
      .dkd_anyela_root_mobile_shell{position:relative;width:min(100vw,480px);height:100svh;min-height:100svh;overflow:hidden;background:#05002b;box-shadow:var(--dkd_anyela_root_shadow)}
      .dkd_anyela_root_mockup{display:block;width:100%;height:100%;object-fit:cover;object-position:center top;user-select:none;-webkit-user-drag:none}
      .dkd_anyela_root_video{position:absolute;left:1.35%;top:50.10%;width:97.30%;height:40.15%;z-index:70;display:block;object-fit:fill;object-position:center center;border-radius:22px;opacity:0;pointer-events:none;background:#000;box-shadow:0 0 18px rgba(255,35,188,.28),0 0 22px rgba(24,247,255,.18);transition:opacity 180ms ease}
      .dkd_anyela_root_video[data-dkd-anyela-video-active="true"]{opacity:1;pointer-events:auto}
      .dkd_anyela_root_start_button,.dkd_anyela_root_play_button{position:absolute;z-index:90;display:block;border-radius:999px;background:transparent;cursor:pointer;outline:none}
      .dkd_anyela_root_start_button{left:3.30%;top:31.65%;width:93.40%;height:11.80%;border-radius:34px}
      .dkd_anyela_root_play_button{left:36.90%;top:66.85%;width:26.20%;height:11.8%}
      .dkd_anyela_root_screen_reader{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip-path:inset(50%);border:0;white-space:nowrap}
      @media (min-width:820px){.dkd_anyela_root_page{align-items:center;padding:32px 0}.dkd_anyela_root_mobile_shell{width:min(44vw,480px);height:auto;min-height:auto;aspect-ratio:9/16;border-radius:38px;border:1px solid rgba(255,255,255,.16);box-shadow:0 42px 110px rgba(0,0,0,.58),0 0 90px rgba(255,35,188,.25),0 0 120px rgba(24,247,255,.18)}}
    </style>
  </head>
  <body>
    <main class="dkd_anyela_root_page" aria-label="Anyela Born Club ana sayfa">
      <section class="dkd_anyela_root_mobile_shell" id="dkd_anyela_root_home">
        <img class="dkd_anyela_root_mockup" src="./assets/dkd_anyela_root_9950_20260530.png" alt="Anyela Born Club Miami Vibes video tanıtım mobil ana sayfası" width="864" height="1536" loading="eager" />
        <video class="dkd_anyela_root_video" id="dkd_anyela_root_video" src="./assets/dkd_anyela_root_video_9950_20260530.mp4?v=20260601widefit" preload="auto" playsinline webkit-playsinline autoplay controls controlslist="nodownload noplaybackrate"></video>
        <button class="dkd_anyela_root_start_button" id="dkd_anyela_root_start_button" type="button" aria-label="Anyela ile hemen tanışmaya başla"></button>
        <button class="dkd_anyela_root_play_button" id="dkd_anyela_root_play_button" type="button" aria-label="Anyela video oynat"></button>
        <section class="dkd_anyela_root_screen_reader" aria-label="Sayfa özeti"><h1>Anyela Born Club</h1><p>Video ses açık otomatik başlar. Video bitince Login sayfasına yönlendirir.</p></section>
      </section>
    </main>
    <script>
      (function dkdAnyelaRootVideoRoute(){
        "use strict";
        const dkdAnyelaRootVideo=document.getElementById("dkd_anyela_root_video");
        const dkdAnyelaRootLoginPath="./Login/";
        const dkdAnyelaRootPlayButton=document.getElementById("dkd_anyela_root_play_button");
        const dkdAnyelaRootStartButton=document.getElementById("dkd_anyela_root_start_button");
        function dkdAnyelaRootShowVideo(){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootVideo.setAttribute("data-dkd-anyela-video-active","true");}
        function dkdAnyelaRootPlayWithSound(dkdAnyelaRootEvent){if(dkdAnyelaRootEvent){dkdAnyelaRootEvent.preventDefault();dkdAnyelaRootEvent.stopPropagation();}if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootShowVideo();dkdAnyelaRootVideo.muted=false;dkdAnyelaRootVideo.defaultMuted=false;dkdAnyelaRootVideo.volume=1;const dkdAnyelaRootPlayResult=dkdAnyelaRootVideo.play();if(dkdAnyelaRootPlayResult&&typeof dkdAnyelaRootPlayResult.catch==="function"){dkdAnyelaRootPlayResult.catch(function(){dkdAnyelaRootShowVideo();});}}
        [dkdAnyelaRootStartButton,dkdAnyelaRootPlayButton].forEach(function dkdAnyelaRootBind(dkdAnyelaRootButton){if(!dkdAnyelaRootButton){return;}dkdAnyelaRootButton.addEventListener("click",dkdAnyelaRootPlayWithSound);dkdAnyelaRootButton.addEventListener("touchend",dkdAnyelaRootPlayWithSound);});
        if(dkdAnyelaRootVideo){dkdAnyelaRootVideo.muted=false;dkdAnyelaRootVideo.defaultMuted=false;dkdAnyelaRootVideo.volume=1;dkdAnyelaRootVideo.addEventListener("click",function dkdAnyelaRootStopClick(dkdAnyelaRootEvent){dkdAnyelaRootEvent.stopPropagation();});dkdAnyelaRootVideo.addEventListener("play",dkdAnyelaRootShowVideo);dkdAnyelaRootVideo.addEventListener("ended",function dkdAnyelaRootGoLogin(){window.location.href=dkdAnyelaRootLoginPath;});}
        window.addEventListener("DOMContentLoaded",dkdAnyelaRootPlayWithSound);
        window.addEventListener("load",dkdAnyelaRootPlayWithSound);
        window.setTimeout(dkdAnyelaRootPlayWithSound,600);
      })();
    </script>
  </body>
</html>
