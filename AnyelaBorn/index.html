<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05002b" />
    <meta
      name="description"
      content="Anyela Born Club ana sayfası — Miami Vibes özel tanışma ekranı."
    />
    <meta property="og:title" content="Anyela Born Club" />
    <meta
      property="og:description"
      content="Anyela Born Club dünyasına giriş yap. Devam etmek için ekrana dokun."
    />
    <meta property="og:image" content="./assets/dkd_anyela_root_9910_20260529.png" />
    <title>Anyela Born Club</title>
    <style>
      :root {
        --dkd_anyela_root_bg: #05002b;
        --dkd_anyela_root_shadow: 0 28px 90px rgba(0, 0, 0, 0.54);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 35, 188, 0.24), transparent 24rem),
          radial-gradient(circle at 88% 10%, rgba(24, 247, 255, 0.18), transparent 25rem),
          linear-gradient(180deg, #090044 0%, var(--dkd_anyela_root_bg) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        -webkit-tap-highlight-color: transparent;
      }

      .dkd_anyela_root_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_root_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #05002b;
        box-shadow: var(--dkd_anyela_root_shadow);
      }

      .dkd_anyela_root_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_root_full_link {
        position: absolute;
        inset: 0;
        z-index: 100;
        display: block;
        cursor: pointer;
        outline: none;
        text-decoration: none;
      }

      .dkd_anyela_root_full_link:focus-visible {
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.92),
          inset 0 0 0 9px rgba(255, 35, 188, 0.72),
          0 0 34px rgba(24, 247, 255, 0.72);
      }

      .dkd_anyela_root_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @media (min-width: 820px) {
        .dkd_anyela_root_page {
          align-items: center;
          padding: 32px 0;
        }

        .dkd_anyela_root_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.16);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.58),
            0 0 90px rgba(255, 35, 188, 0.25),
            0 0 120px rgba(24, 247, 255, 0.18);
        }

        .dkd_anyela_root_mockup {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_root_page" aria-label="Anyela Born Club ana sayfa">
      <section class="dkd_anyela_root_mobile_shell" id="dkd_anyela_root_home">
        <img
          class="dkd_anyela_root_mockup"
          src="./assets/dkd_anyela_root_9910_20260529.png"
          alt="Anyela Born Club Miami Vibes özel tanışma mobil ana sayfası"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_root_full_link" href="./Login/" aria-label="Anyela Born Login sayfasına git"></a>

        <section class="dkd_anyela_root_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club</h1>
          <p>Bu sayfada herhangi bir yere dokununca Login sayfası açılır.</p>
        </section>
      </section>
    </main>
    <script>
      (function dkdAnyelaRootClickRoute() {
        "use strict";
        document.addEventListener("click", function dkdAnyelaRootOpenLogin(dkdAnyelaRootEvent) {
          const dkdAnyelaRootAnchor = dkdAnyelaRootEvent.target.closest("a");
          if (dkdAnyelaRootAnchor) {
            return;
          }
          window.location.href = "./Login/";
        });
      })();
    </script>
  </body>
</html>
