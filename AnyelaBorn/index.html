<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />

    <style>

      html,body { width:100%; height:100%; min-height:100%; margin:0; overflow:hidden; background:#05002b; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }

      .dkd_anyela_root_page { width:100vw; height:100svh; min-height:100svh; display:flex; justify-content:center; background:#05002b; overflow:hidden; }
      .dkd_anyela_root_mobile_shell { position:relative; width:min(100vw,480px); height:100svh; min-height:100svh; overflow:hidden; background:#05002b; box-shadow:var(--dkd_anyela_root_shadow); }
      .dkd_anyela_root_mockup { position:absolute; inset:0; display:block; width:100%; height:100%; object-fit:cover; object-position:center top; user-select:none; -webkit-user-drag:none; }
      .dkd_anyela_root_video { position:absolute; left:3.62%; top:45.85%; width:92.76%; height:36.20%; z-index:70; display:block; object-fit:contain; object-position:center center; border-radius:22px; opacity:0; pointer-events:none; background:transparent; box-shadow:0 0 18px rgba(255,35,188,.28),0 0 22px rgba(24,247,255,.18); transition:opacity 180ms ease; }
      .dkd_anyela_root_video[data-dkd-anyela-video-active="true"] { opacity:1; pointer-events:auto; }
      .dkd_anyela_root_start_button,.dkd_anyela_root_play_button { position:absolute; z-index:90; display:block; border-radius:999px; background:transparent; cursor:pointer; outline:none; }
      .dkd_anyela_root_start_button { left:3.30%; top:31.65%; width:93.40%; height:11.80%; border-radius:34px; }
      .dkd_anyela_root_play_button { left:38.75%; top:60.70%; width:22.65%; height:10.80%; }
      .dkd_anyela_root_sound_button { position:absolute; right:5.2%; bottom:5.3%; z-index:100; min-width:92px; border-radius:999px; padding:10px 13px; color:#fff; font-weight:900; background:rgba(5,0,43,.72); border:1px solid rgba(255,255,255,.24); box-shadow:0 0 20px rgba(255,43,214,.28); }
      .dkd_anyela_root_screen_reader { position:absolute; width:1px; height:1px; margin:-1px; padding:0; overflow:hidden; clip-path:inset(50%); border:0; white-space:nowrap; }
      @media (min-width:820px) { .dkd_anyela_root_page { align-items:center; padding:32px 0; height:100vh; } .dkd_anyela_root_mobile_shell { width:min(44vw,480px); height:min(100vh - 64px,853px); min-height:auto; border-radius:38px; border:1px solid rgba(255,255,255,.16); box-shadow:0 42px 110px rgba(0,0,0,.58),0 0 90px rgba(255,35,188,.25),0 0 120px rgba(24,247,255,.18); } }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_root_page" aria-label="Anyela Born Club ana sayfa">
      <section class="dkd_anyela_root_mobile_shell" id="dkd_anyela_root_home">

        <video class="dkd_anyela_root_video" id="dkd_anyela_root_video" src="./assets/dkd_anyela_root_video_9950_20260530.mp4?v=20260601fitfull" preload="auto" playsinline webkit-playsinline autoplay controls controlslist="nodownload noplaybackrate"></video>
        <button class="dkd_anyela_root_start_button" id="dkd_anyela_root_start_button" type="button" aria-label="Anyela ile hemen tanışmaya başla"></button>
        <button class="dkd_anyela_root_play_button" id="dkd_anyela_root_play_button" type="button" aria-label="Anyela video oynat"></button>
        <button class="dkd_anyela_root_sound_button" id="dkd_anyela_root_sound_button" type="button">Sesi Aç</button>
        <section class="dkd_anyela_root_screen_reader" aria-label="Sayfa özeti"><h1>Anyela Born Club</h1><p>Video otomatik başlar. Video bitince Login sayfasına yönlendirir.</p></section>
      </section>
    </main>
    <script>
      (function dkdAnyelaRootVideoRoute(){
        "use strict";
        const dkdAnyelaRootVideo=document.getElementById("dkd_anyela_root_video");
        const dkdAnyelaRootLoginPath="./Login/";
        const dkdAnyelaRootPlayButton=document.getElementById("dkd_anyela_root_play_button");
        const dkdAnyelaRootStartButton=document.getElementById("dkd_anyela_root_start_button");
        const dkdAnyelaRootSoundButton=document.getElementById("dkd_anyela_root_sound_button");
        function dkdAnyelaRootShowVideo(){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootVideo.setAttribute("data-dkd-anyela-video-active","true");}
        function dkdAnyelaRootSetSound(dkdAnyelaRootMuted){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootVideo.muted=dkdAnyelaRootMuted;if(dkdAnyelaRootSoundButton){dkdAnyelaRootSoundButton.textContent=dkdAnyelaRootMuted?"Sesi Aç":"Ses Açık";}}
        function dkdAnyelaRootTryAutoplay(){if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootShowVideo();dkdAnyelaRootSetSound(false);const dkdAnyelaRootPlayResult=dkdAnyelaRootVideo.play();if(dkdAnyelaRootPlayResult&&typeof dkdAnyelaRootPlayResult.catch==="function"){dkdAnyelaRootPlayResult.catch(function dkdAnyelaRootAutoplayBlocked(){dkdAnyelaRootSetSound(true);dkdAnyelaRootVideo.play().catch(function dkdAnyelaRootSilentBlocked(){dkdAnyelaRootShowVideo();});});}}
        function dkdAnyelaRootPlayVideo(dkdAnyelaRootEvent){if(dkdAnyelaRootEvent){dkdAnyelaRootEvent.preventDefault();dkdAnyelaRootEvent.stopPropagation();}if(!dkdAnyelaRootVideo){return;}dkdAnyelaRootShowVideo();dkdAnyelaRootSetSound(false);const dkdAnyelaRootPlayResult=dkdAnyelaRootVideo.play();if(dkdAnyelaRootPlayResult&&typeof dkdAnyelaRootPlayResult.catch==="function"){dkdAnyelaRootPlayResult.catch(function dkdAnyelaRootMuteFallback(){dkdAnyelaRootSetSound(true);dkdAnyelaRootVideo.play();});}}
        [dkdAnyelaRootStartButton,dkdAnyelaRootPlayButton,dkdAnyelaRootSoundButton].forEach(function dkdAnyelaRootBindPlayButton(dkdAnyelaRootButton){if(!dkdAnyelaRootButton){return;}dkdAnyelaRootButton.addEventListener("click",dkdAnyelaRootPlayVideo);dkdAnyelaRootButton.addEventListener("touchend",dkdAnyelaRootPlayVideo);});
        if(dkdAnyelaRootVideo){dkdAnyelaRootVideo.addEventListener("click",function dkdAnyelaRootStopVideoClick(dkdAnyelaRootEvent){dkdAnyelaRootEvent.stopPropagation();});dkdAnyelaRootVideo.addEventListener("play",dkdAnyelaRootShowVideo);dkdAnyelaRootVideo.addEventListener("volumechange",function dkdAnyelaRootVolumeLabel(){if(dkdAnyelaRootSoundButton){dkdAnyelaRootSoundButton.textContent=dkdAnyelaRootVideo.muted?"Sesi Aç":"Ses Açık";}});dkdAnyelaRootVideo.addEventListener("ended",function dkdAnyelaRootGoLogin(){window.location.href=dkdAnyelaRootLoginPath;});}
        window.addEventListener("DOMContentLoaded",dkdAnyelaRootTryAutoplay);
        window.addEventListener("load",dkdAnyelaRootTryAutoplay);
        window.setTimeout(dkdAnyelaRootTryAutoplay,500);
      })();
    </script>
  </body>
</html>
