<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020611" />
  <title>Anyela Born Club | Premium Digital Experience</title>
  <meta name="description" content="Anyela Born Club özel sohbet, sesli mesaj, görsel/video siparişi ve işletme reklam paketi deneyimi." />
  <link rel="preconnect" href="https://esm.sh" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react-icons/fa6": "https://esm.sh/react-icons@5.5.0/fa6?external=react",
        "react-icons/io5": "https://esm.sh/react-icons@5.5.0/io5?external=react",
        "react-icons/hi2": "https://esm.sh/react-icons@5.5.0/hi2?external=react",
        "react-icons/md": "https://esm.sh/react-icons@5.5.0/md?external=react",
        "react-icons/pi": "https://esm.sh/react-icons@5.5.0/pi?external=react"
      }
    }
  </script>
  <style>
    :root {
      --dkd-bg: #020611;
      --dkd-bg-soft: #07111f;
      --dkd-panel: rgba(9, 17, 31, .78);
      --dkd-panel-strong: rgba(13, 22, 38, .94);
      --dkd-line: rgba(133, 171, 220, .17);
      --dkd-line-strong: rgba(28, 156, 255, .52);
      --dkd-white: #f7fbff;
      --dkd-muted: #94a3b8;
      --dkd-blue: #1d7dff;
      --dkd-cyan: #0ee7ff;
      --dkd-violet: #7148ff;
      --dkd-gold: #f7c96f;
      --dkd-bronze: #d99a61;
      --dkd-green: #1ae39c;
      --dkd-red: #ff5b63;
      --dkd-shadow: 0 26px 80px rgba(0, 0, 0, .58);
      --dkd-radius: 28px;
      --dkd-radius-sm: 18px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 76% 7%, rgba(15, 112, 255, .20), transparent 31%),
        radial-gradient(circle at 9% 22%, rgba(0, 229, 255, .12), transparent 28%),
        linear-gradient(180deg, #01030a 0%, #050914 41%, #020611 100%);
      color: var(--dkd-white);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .dkd-app-shell {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      background:
        radial-gradient(circle at 88% 4%, rgba(29, 125, 255, .18), transparent 25%),
        linear-gradient(180deg, rgba(4, 9, 19, .94), rgba(1, 4, 12, .98));
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .03), 0 0 92px rgba(0, 0, 0, .65);
      isolation: isolate;
    }

    .dkd-app-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at 50% 10%, #000, transparent 78%);
      opacity: .24;
      z-index: -1;
    }

    .dkd-screen { padding: 18px 14px 96px; min-height: 100vh; }
    .dkd-screen.dkd-admin-pad { padding-bottom: 110px; }

    .dkd-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 6px 4px 18px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, rgba(2, 6, 17, .96), rgba(2, 6, 17, .70) 82%, transparent);
      backdrop-filter: blur(14px);
    }
    .dkd-logo { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .dkd-logo-mark {
      width: 58px;
      height: 54px;
      display: grid;
      place-items: center;
      position: relative;
      flex: 0 0 auto;
    }
    .dkd-logo-mark::before {
      content: "";
      position: absolute;
      inset: 5px 10px 6px 6px;
      border-radius: 50%;
      border: 2px solid rgba(14, 231, 255, .40);
      filter: drop-shadow(0 0 13px rgba(14, 231, 255, .5));
      transform: rotate(-18deg) skew(-4deg);
    }
    .dkd-logo-mark span {
      font-family: Cinzel, serif;
      font-size: 37px;
      font-weight: 700;
      letter-spacing: -8px;
      background: linear-gradient(135deg, var(--dkd-cyan), var(--dkd-blue) 54%, #f9fdff);
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 28px rgba(0, 195, 255, .35);
      z-index: 1;
    }
    .dkd-logo-copy strong {
      display: block;
      font-family: Cinzel, serif;
      letter-spacing: .26em;
      font-size: 14px;
      line-height: 1.15;
      white-space: nowrap;
    }
    .dkd-logo-copy small {
      display: block;
      color: var(--dkd-cyan);
      letter-spacing: .64em;
      font-size: 9px;
      margin-top: 3px;
      font-weight: 800;
    }
    .dkd-icon-button {
      width: 46px;
      height: 46px;
      border-radius: 17px;
      border: 1px solid rgba(170, 202, 255, .14);
      background: linear-gradient(145deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color: var(--dkd-white);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 14px 36px rgba(0,0,0,.34);
    }
    .dkd-icon-button svg { font-size: 22px; }

    .dkd-menu {
      position: fixed;
      left: 50%;
      top: 78px;
      transform: translateX(-50%);
      width: min(492px, calc(100% - 28px));
      z-index: 80;
      padding: 16px;
      border-radius: 28px;
      background: rgba(5, 10, 20, .92);
      border: 1px solid rgba(31, 155, 255, .28);
      box-shadow: 0 28px 90px rgba(0,0,0,.72), inset 0 0 0 1px rgba(255,255,255,.04);
      backdrop-filter: blur(22px);
    }
    .dkd-menu-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .dkd-menu-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      color: #dbeafe;
      background: linear-gradient(145deg, rgba(13, 28, 48, .92), rgba(3, 8, 18, .82));
    }
    .dkd-menu-link.dkd-active { border-color: rgba(29,125,255,.70); box-shadow: 0 0 28px rgba(29, 125, 255, .20); color: #fff; }
    .dkd-menu-link svg { color: var(--dkd-cyan); font-size: 19px; }
    .dkd-menu-note { margin: 12px 2px 0; color: var(--dkd-muted); font-size: 12px; line-height: 1.55; }

    .dkd-hero-card,
    .dkd-panel,
    .dkd-soft-panel,
    .dkd-compact-card,
    .dkd-package-card,
    .dkd-wide-card {
      border: 1px solid var(--dkd-line);
      background: linear-gradient(145deg, rgba(12, 22, 38, .86), rgba(3, 7, 17, .86));
      box-shadow: var(--dkd-shadow), inset 0 0 0 1px rgba(255,255,255,.025);
      border-radius: var(--dkd-radius);
      overflow: hidden;
    }

    .dkd-hero-card {
      position: relative;
      min-height: 324px;
      padding: 26px 18px 20px;
      isolation: isolate;
    }
    .dkd-hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(2, 6, 17, .98) 0%, rgba(2, 6, 17, .76) 44%, rgba(2, 6, 17, .08) 100%),
        radial-gradient(circle at 74% 34%, rgba(14, 231, 255, .19), transparent 32%);
      z-index: -1;
    }
    .dkd-hero-img {
      position: absolute;
      right: -24px;
      top: 0;
      width: 58%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: saturate(1.04) contrast(1.02);
      z-index: -2;
    }
    .dkd-hero-ring {
      position: absolute;
      right: 38px;
      top: 24px;
      width: 164px;
      height: 214px;
      border: 4px solid rgba(29, 125, 255, .82);
      border-left-color: transparent;
      border-bottom-color: rgba(14, 231, 255, .18);
      border-radius: 50%;
      filter: drop-shadow(0 0 16px rgba(29, 125, 255, .75));
      z-index: -1;
      pointer-events: none;
    }
    .dkd-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d9f7ff;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      margin-bottom: 18px;
      backdrop-filter: blur(10px);
    }
    .dkd-badge svg { color: var(--dkd-cyan); }
    .dkd-title {
      margin: 0;
      max-width: 280px;
      color: var(--dkd-white);
      font-size: clamp(36px, 10vw, 54px);
      line-height: .98;
      font-weight: 900;
      letter-spacing: -.055em;
    }
    .dkd-title span,
    .dkd-blue-text {
      background: linear-gradient(135deg, #3cb3ff, #166dff 56%, #06e4ff);
      -webkit-background-clip: text;
      color: transparent;
    }
    .dkd-subtitle {
      max-width: 262px;
      margin: 16px 0 0;
      color: rgba(225, 235, 248, .82);
      line-height: 1.46;
      font-size: 15px;
    }
    .dkd-hero-actions { display: flex; gap: 10px; margin-top: 23px; align-items: stretch; }
    .dkd-button {
      min-height: 54px;
      border: 0;
      border-radius: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      padding: 0 16px;
      font-weight: 900;
      letter-spacing: .02em;
      background: linear-gradient(135deg, #2149ff 0%, #168eff 58%, #0ce7ff 100%);
      box-shadow: 0 14px 34px rgba(29, 125, 255, .30), inset 0 0 0 1px rgba(255,255,255,.18);
      white-space: nowrap;
    }
    .dkd-button.dkd-secondary {
      background: rgba(4, 9, 18, .72);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02), 0 14px 34px rgba(0,0,0,.30);
    }
    .dkd-button.dkd-gold {
      color: #160f04;
      background: linear-gradient(135deg, #b97c31, #ffd47a 58%, #fff0c0);
    }
    .dkd-button.dkd-outline {
      background: transparent;
      border: 1px solid rgba(29, 125, 255, .58);
      color: #cfe9ff;
    }

    .dkd-section { margin-top: 16px; }
    .dkd-section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 0 2px 12px; }
    .dkd-section-title h2,
    .dkd-section-title h3 {
      margin: 0;
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #f8fbff;
    }
    .dkd-section-link { display: inline-flex; align-items: center; gap: 7px; color: #3ea8ff; font-weight: 800; font-size: 13px; }

    .dkd-step-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; padding: 14px; }
    .dkd-step-card {
      min-height: 132px;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 22px;
      background: rgba(255,255,255,.035);
      padding: 14px 12px;
      position: relative;
    }
    .dkd-step-card small { color: #5c7cff; font-weight: 900; font-size: 13px; }
    .dkd-step-card svg { display: block; color: var(--dkd-blue); font-size: 30px; margin: 8px 0; }
    .dkd-step-card strong { display: block; font-size: 15px; }
    .dkd-step-card span { display: block; color: var(--dkd-muted); line-height: 1.4; font-size: 12px; margin-top: 6px; }

    .dkd-row-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 2px 2px 8px; scroll-snap-type: x mandatory; }
    .dkd-row-scroll::-webkit-scrollbar { display: none; }
    .dkd-package-card {
      min-width: 205px;
      padding: 16px;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }
    .dkd-package-card::after {
      content: "";
      position: absolute;
      inset: auto -26px -42px auto;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29, 125, 255, .12), transparent 64%);
    }
    .dkd-package-card.dkd-selected { border-color: rgba(29, 125, 255, .70); box-shadow: 0 0 0 1px rgba(29,125,255,.18), 0 30px 70px rgba(3, 20, 58, .55); }
    .dkd-package-card.dkd-gold-card { border-color: rgba(247, 201, 111, .42); background: linear-gradient(145deg, rgba(58, 40, 7, .45), rgba(5, 8, 14, .90)); }
    .dkd-metal-tag { display: inline-flex; border-radius: 999px; padding: 7px 11px; font-size: 11px; font-weight: 900; color: #120b05; background: linear-gradient(135deg, #b27745, #f0b072); margin-bottom: 14px; }
    .dkd-metal-tag.dkd-silver { background: linear-gradient(135deg, #c8d0d7, #f7fbff 48%, #7f8c96); }
    .dkd-metal-tag.dkd-gold { background: linear-gradient(135deg, #b77d20, #ffe188 55%, #b87922); }
    .dkd-package-logo { font-family: Cinzel, serif; font-size: 44px; letter-spacing: -9px; color: rgba(255,255,255,.74); margin-bottom: 8px; }
    .dkd-package-price { font-size: 30px; font-weight: 900; margin: 2px 0 14px; letter-spacing: -.04em; }
    .dkd-package-price small { font-size: 13px; color: var(--dkd-muted); font-weight: 600; }
    .dkd-check-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; color: rgba(241, 245, 249, .86); font-size: 13px; line-height: 1.25; }
    .dkd-check-list li { display: flex; align-items: flex-start; gap: 9px; }
    .dkd-check-list svg { color: var(--dkd-cyan); flex: 0 0 auto; margin-top: 1px; }
    .dkd-card-bottom { margin-top: 17px; display: grid; gap: 10px; }
    .dkd-card-bottom .dkd-button { min-height: 44px; font-size: 13px; }
    .dkd-mini-meta { display: flex; align-items: center; justify-content: space-between; color: var(--dkd-muted); font-size: 13px; }
    .dkd-mini-meta span { display: inline-flex; align-items: center; gap: 6px; }
    .dkd-mini-meta svg { color: var(--dkd-cyan); }
    .dkd-ribbon {
      position: absolute;
      right: 12px;
      top: 0;
      border-radius: 0 0 13px 13px;
      background: linear-gradient(135deg, #2149ff, #0ee7ff);
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 900;
      z-index: 2;
    }

    .dkd-video-card { display: grid; grid-template-columns: 1fr; gap: 0; border-color: rgba(29,125,255,.55); }
    .dkd-video-thumb { height: 160px; position: relative; overflow: hidden; }
    .dkd-video-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: center 26%; filter: saturate(1.02); }
    .dkd-play {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: rgba(8, 20, 38, .62);
      border: 2px solid rgba(29,125,255,.72);
      box-shadow: 0 0 40px rgba(29,125,255,.44);
    }
    .dkd-video-copy { padding: 16px; }
    .dkd-video-copy h3 { margin: 0 0 8px; font-size: 22px; line-height: 1.05; letter-spacing: -.04em; }
    .dkd-video-copy p { color: var(--dkd-muted); margin: 0; line-height: 1.45; }
    .dkd-video-copy small { color: #36a9ff; display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-weight: 800; }

    .dkd-trust-row,
    .dkd-stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      padding: 13px;
      border-radius: 22px;
      border: 1px solid var(--dkd-line);
      background: rgba(12, 20, 35, .78);
    }
    .dkd-stat-row { grid-template-columns: repeat(4, 1fr); }
    .dkd-trust-item,
    .dkd-stat-item { padding: 6px 8px; border-right: 1px solid rgba(255,255,255,.10); min-width: 0; }
    .dkd-trust-item:last-child,
    .dkd-stat-item:last-child { border-right: 0; }
    .dkd-trust-item svg,
    .dkd-stat-item svg { color: var(--dkd-blue); font-size: 24px; margin-bottom: 5px; }
    .dkd-trust-item strong,
    .dkd-stat-item strong { display: block; font-size: 12px; letter-spacing: .02em; }
    .dkd-trust-item small,
    .dkd-stat-item small { display: block; color: var(--dkd-muted); font-size: 11px; line-height: 1.35; }

    .dkd-page-hero { min-height: 304px; margin-bottom: 14px; }
    .dkd-page-hero .dkd-title { font-size: clamp(34px, 9vw, 48px); max-width: 270px; }

    .dkd-filter-bar { display: flex; gap: 9px; overflow-x: auto; padding: 10px 2px 12px; }
    .dkd-filter-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 15px;
      color: #dbeafe;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      font-weight: 800;
    }
    .dkd-filter-pill.dkd-active { background: linear-gradient(135deg, rgba(29,125,255,.92), rgba(14,231,255,.40)); border-color: rgba(14,231,255,.70); box-shadow: 0 0 26px rgba(29,125,255,.35); }

    .dkd-wide-card { padding: 15px; margin-top: 12px; }
    .dkd-feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .dkd-feature-item { min-height: 86px; border: 1px solid rgba(255,255,255,.10); border-radius: 19px; padding: 12px; background: rgba(255,255,255,.035); }
    .dkd-feature-item svg { color: var(--dkd-blue); font-size: 24px; margin-bottom: 8px; }
    .dkd-feature-item strong { display: block; font-size: 13px; }
    .dkd-feature-item small { color: var(--dkd-muted); display: block; margin-top: 4px; line-height: 1.35; }

    .dkd-plan-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .dkd-plan-grid .dkd-package-card { min-width: 0; }
    .dkd-plan-grid.dkd-three { grid-template-columns: 1fr; }

    .dkd-faq { display: grid; gap: 8px; }
    .dkd-faq-item { display: flex; justify-content: space-between; gap: 12px; padding: 14px; border-radius: 15px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09); color: #dfefff; font-weight: 600; }

    .dkd-auth-wrap { padding-top: 16px; text-align: center; }
    .dkd-auth-logo { justify-content: center; margin-bottom: 20px; }
    .dkd-auth-title { margin: 12px 0 6px; font-size: 25px; letter-spacing: -.03em; }
    .dkd-auth-desc { margin: 0 auto 22px; color: var(--dkd-muted); max-width: 350px; line-height: 1.45; }
    .dkd-auth-panel { padding: 15px; text-align: left; }
    .dkd-tab-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.10); }
    .dkd-tab { min-height: 50px; border: 0; background: transparent; color: var(--dkd-muted); font-weight: 900; letter-spacing: .03em; position: relative; }
    .dkd-tab.dkd-active { color: #49b8ff; }
    .dkd-tab.dkd-active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px; background: linear-gradient(90deg, var(--dkd-blue), var(--dkd-cyan)); border-radius: 99px; }
    .dkd-input-row { min-height: 58px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,.13); border-radius: 16px; background: rgba(255,255,255,.045); padding: 0 14px; margin: 10px 0; }
    .dkd-input-row svg { color: var(--dkd-blue); font-size: 22px; }
    .dkd-input-row input { width: 100%; color: #fff; border: 0; outline: 0; background: transparent; }
    .dkd-input-row input::placeholder { color: rgba(219, 234, 254, .44); }
    .dkd-auth-mini { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #dcecff; font-size: 14px; margin: 12px 0 18px; }
    .dkd-check { display: inline-flex; align-items: center; gap: 8px; }
    .dkd-check span { width: 18px; height: 18px; border-radius: 5px; background: linear-gradient(135deg, #244dff, #12d8ff); display: grid; place-items: center; }
    .dkd-auth-socials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 8px; }
    .dkd-social { min-height: 48px; border-radius: 15px; border: 1px solid rgba(255,255,255,.13); background: rgba(255,255,255,.04); color: #dbeafe; display: flex; align-items: center; justify-content: center; gap: 8px; }

    .dkd-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .dkd-upload-box {
      min-height: 132px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed rgba(190, 215, 255, .34);
      border-radius: 19px;
      background: rgba(255,255,255,.025);

        <section className="dkd-wide-card"><DkdSectionTitle dkd_title="Ödeme Durumu" /><div className="dkd-status-line">{[[FaWallet,'Ödeme Bekleniyor','Dekont bekliyoruz'],[FaClock,'Kontrol Ediliyor','Ekibimiz kontrol ediyor'],[FaShieldHalved,'Onay Bekliyor','Bildirim alacaksın'],[FaLock,'Odaya Erişim','Özel odan açılır']].map(([DkdIcon, dkd_title, dkd_copy], dkd_index) => <div key={dkd_title} className={`dkd-status-step ${dkd_index === 0 ? 'dkd-active' : ''}`}><span className="dkd-status-icon"><DkdIcon /></span><strong>{dkd_title}</strong><span>{dkd_copy}</span></div>)}</div></section>
        <button className="dkd-button" style={{ width: '100%', marginTop: 16 }} onClick={() => dkd_onNavigate('chat')}><FaPaperPlane /> DEKONTU GÖNDER</button><p className="dkd-footer-note">Onay sonrası özel sohbet odan otomatik olarak açılacaktır.</p><DkdTrustRow />

    function DkdChatPage({ dkd_onNavigate }) {
      return <main className="dkd-screen">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><button className="dkd-icon-button" onClick={() => dkd_onNavigate('home')}><IoChevronBack /></button><div className="dkd-chat-header"><h1>Özel Chat Odası</h1><small style={{ color: '#49aaff' }}><FaLock /> Güvenli & Özel</small></div><button className="dkd-icon-button"><FaBars /></button></div>

        <section className="dkd-compose"><div className="dkd-compose-input"><input placeholder="Mesajını yaz..." /><button className="dkd-send"><FaPaperPlane /></button></div><div className="dkd-chat-tools"><button className="dkd-chat-tool"><FaRegCommentDots />Yazı</button><button className="dkd-chat-tool"><FaMicrophone />Ses Kaydı</button><button className="dkd-chat-tool"><FaImage />Görsel Yükle</button><button className="dkd-chat-tool"><FaVideo />Video Yükle</button></div></section>
        <section className="dkd-panel dkd-upsell"><div style={{ display: 'flex', justifyContent: 'space-between', gap: 12 }}><div><h3 style={{ margin: 0 }}>Daha fazlasını mı istiyorsun?</h3><p style={{ color: 'var(--dkd-muted)', margin: '5px 0 0' }}>Özel içerikler ve ayrıcalıklarla deneyimini zirveye taşı.</p></div><button className="dkd-icon-button"><IoClose /></button></div><div className="dkd-upsell-grid"><button className="dkd-quick-button"><PiWaveformBold />Voice Pack Al</button><button className="dkd-quick-button"><FaVideo />Özel Video İste</button></div><button className="dkd-button" style={{ width: '100%', marginTop: 10 }} onClick={() => dkd_onNavigate('packages')}><FaGem /> Tüm Paketleri Gör <FaArrowRight /></button></section>
      </main>;
    }

    function DkdAccountPage({ dkd_onNavigate }) {

        <section className="dkd-panel dkd-profile-card"><div className="dkd-profile-avatar"><img src={dkd_images.yachtAqua} alt="Anyela hesap" /></div><div className="dkd-profile-copy"><h2>Anyela Born <FaCircleCheck style={{ color: 'var(--dkd-blue)', fontSize: 17 }} /></h2><p>anyelabornclub@gmail.com</p><p>Üye No: ABC-2024-00125 <FaCopy /></p><strong style={{ color: 'var(--dkd-gold)' }}><FaCrown /> GOLD ÜYE</strong><button className="dkd-button dkd-secondary" style={{ marginTop: 12 }}><FaPen /> Profili Düzenle</button></div><div className="dkd-profile-stats"><div className="dkd-profile-stat"><FaClock /><small>Üyelik Başlangıcı</small><strong>12.03.2024</strong></div><div className="dkd-profile-stat"><FaWallet /><small>Toplam Harcama</small><strong>₺24.760</strong></div><div className="dkd-profile-stat"><FaLock /><small>Toplam Sipariş</small><strong>12</strong></div></div></section>
        <section className="dkd-section"><DkdSectionTitle dkd_title="Aktif Siparişlerim" dkd_link="Tümünü Gör" /><div className="dkd-wide-card dkd-order-card"><div className="dkd-order-thumb"><img src={dkd_images.yachtGreen} /><span>GOLD</span></div><div><h3 style={{ margin: 0 }}>GOLD Paketi</h3><p style={{ margin: '5px 0', color: 'var(--dkd-muted)' }}>Sipariş No: #AB12345</p><div className="dkd-progress-line">{['Ödeme Alındı','Onaylandı','Hazırlanıyor','Teslim'].map((dkd_step, dkd_index) => <div key={dkd_step} className={`dkd-progress-step ${dkd_index < 3 ? 'dkd-active' : ''}`}><span>{dkd_index < 2 ? <FaCheck /> : dkd_index + 1}</span>{dkd_step}</div>)}</div></div></div></section>
        <section className="dkd-section"><DkdSectionTitle dkd_title="Onay Bekleyen Sipariş" /><div className="dkd-wide-card dkd-order-card"><div className="dkd-order-thumb"><img src={dkd_images.yachtSilver} /><span style={{ background: 'linear-gradient(135deg,#c8d0d7,#fff)' }}>SILVER</span></div><div><h3 style={{ margin: 0 }}>SILVER Paketi</h3><p style={{ color: 'var(--dkd-muted)' }}>Ödeme onayı bekleniyor.</p><button className="dkd-button dkd-outline"><IoCloudUploadOutline /> Dekont Yükle</button></div></div></section>
        <section className="dkd-section"><DkdSectionTitle dkd_title="Tamamlanan Teslimatlarım" dkd_link="Tümünü Gör" />{['BRONZ Paketi','SILVER Paketi'].map((dkd_title, dkd_index) => <div className="dkd-list-row" key={dkd_title}><img src={dkd_index === 0 ? dkd_images.carOrange : dkd_images.yachtGold} /><div><strong>{dkd_title}</strong><br /><small style={{ color: 'var(--dkd-muted)' }}>Sipariş No: #AB1234{dkd_index}</small></div><span className="dkd-status-good"><FaCircleCheck /> Teslim Edildi</span></div>)}</section>
        <section className="dkd-wide-card"><DkdSectionTitle dkd_title="Bakiye & Kredi Özeti" /><div className="dkd-profile-stats" style={{ gridColumn: 'auto' }}><div className="dkd-profile-stat"><FaWallet /><small>Mevcut Bakiye</small><strong>₺1.250</strong></div><div className="dkd-profile-stat"><FaStar /><small>Kazanılan Bonus</small><strong>₺750</strong></div><div className="dkd-profile-stat"><FaCreditCard /><small>Toplam Harcama</small><strong>₺24.760</strong></div></div></section>
        <section className="dkd-section"><DkdSectionTitle dkd_title="Hızlı İşlemler" /><div className="dkd-quick-grid"><button className="dkd-quick-button" onClick={() => dkd_onNavigate('packages')}><FaGem />Yeni Paket Al</button><button className="dkd-quick-button" onClick={() => dkd_onNavigate('payment')}><FaFileInvoice />Dekont Durumu</button><button className="dkd-quick-button"><FaFolder />Dosyalarım</button><button className="dkd-quick-button"><FaHeadphones />Destek</button></div></section>
        <DkdBottomNav dkd_currentPage="account" dkd_onNavigate={dkd_onNavigate} />
      </main>;
    }

    function DkdAdminPage({ dkd_onNavigate }) {
      const dkd_requests = [
        ['Emre Y.', '₺1.499 • SILVER Paket', 'Garanti BBVA • 12:45', dkd_images.carOrange],
        ['Merve D.', '₺999 • BRONZ Paket', 'İş Bankası • 11:32', dkd_images.yachtGold],
        ['Burak K.', '₺2.499 • GOLD Paket', 'Yapı Kredi • 10:58', dkd_images.carRed]
      ];
      return <main className="dkd-screen dkd-admin-pad">
        <DkdHeader dkd_currentPage="admin" dkd_onNavigate={dkd_onNavigate} />
        <DkdHero dkd_badge="ADMIN PANEL" dkd_titleStart="Hoş Geldin," dkd_titleBlue="Admin" dkd_subtitle="Sistemdeki tüm işlemleri buradan yönetebilirsin." dkd_image={dkd_images.yachtGreen} dkd_compact />
        <section className="dkd-admin-stats">{[[FaClock,'Bekleyen Ödemeler','12','Toplam ₺24.870'],[FaRegCommentDots,'Aktif Chatler','18','Şu an çevrimiçi'],[FaEnvelope,'Yeni Mesajlar','27','Son 24 saat'],[FaStore,'Teslim Bekleyen','9','Toplam ₺15.430']].map(([DkdIcon, dkd_label, dkd_value, dkd_copy]) => <div className="dkd-admin-stat" key={dkd_label}><DkdIcon /><span>{dkd_label}</span><strong>{dkd_value}</strong><small>{dkd_copy}</small></div>)}</section>
        <section className="dkd-wide-card"><DkdSectionTitle dkd_title="Dekont Onay Talepleri" dkd_link="Tümünü Gör" />{dkd_requests.map(([dkd_name, dkd_price, dkd_bank, dkd_image]) => <div className="dkd-approval-row" key={dkd_name}><img src={dkd_image} alt={dkd_name} /><div><strong>{dkd_name}</strong><br /><small style={{ color: 'var(--dkd-muted)' }}>{dkd_price}<br />{dkd_bank}</small></div><FaFileInvoice style={{ fontSize: 38, color: '#f8fafc' }} /><div className="dkd-approval-actions"><button className="dkd-approve"><FaCheck /> Onayla</button><button className="dkd-reject"><IoClose /> Reddet</button></div></div>)}</section>
        <section className="dkd-section"><DkdSectionTitle dkd_title="Hızlı İşlemler" /><div className="dkd-quick-grid"><button className="dkd-quick-button"><FaRegCommentDots />Cevap Yaz</button><button className="dkd-quick-button"><FaMicrophone />Ses Yükle</button><button className="dkd-quick-button"><FaImage />Görsel Teslim Et</button><button className="dkd-quick-button"><HiOutlineSpeakerWave />Toplu Duyuru</button></div></section>
        <DkdBottomNav dkd_currentPage="admin" dkd_onNavigate={dkd_onNavigate} dkd_admin />
      </main>;
    }

    function DkdBottomNav({ dkd_currentPage, dkd_onNavigate, dkd_admin }) {
      const dkd_items = dkd_admin ? [['admin','Dashboard',MdOutlineDashboard],['payment','Ödemeler',FaCreditCard],['chat','Chatler',FaRegCommentDots,'18'],['custom','Siparişler',FaStore,'9'],['account','Profil',FaUser]] : [['home','Ana Sayfa',FaGem],['packages','Paketler',FaGem],['chat','Özel Oda',FaLock],['account','Hesabım',FaUser]];
      return <nav className="dkd-bottom-nav" style={{ gridTemplateColumns: `repeat(${dkd_items.length}, 1fr)` }}>{dkd_items.map(([dkd_key, dkd_label, DkdIcon, dkd_badge]) => <button type="button" key={dkd_key} className={`dkd-nav-item ${dkd_currentPage === dkd_key ? 'dkd-active' : ''}`} onClick={() => dkd_onNavigate(dkd_key)}><DkdIcon />{dkd_badge && <span className="dkd-nav-badge">{dkd_badge}</span>}<span>{dkd_label}</span></button>)}</nav>;
    }

    function DkdAnyelaBornApp() {
      const dkd_initialPage = useMemo(() => window.location.hash?.replace('#/', '') || 'home', []);
      const [dkd_currentPage, dkd_setCurrentPage] = useState(dkd_pages.some((dkd_page) => dkd_page.key === dkd_initialPage) ? dkd_initialPage : 'home');
      const dkd_handleNavigate = (dkd_nextPage) => {
        dkd_setCurrentPage(dkd_nextPage);
        window.history.replaceState(null, '', `#/${dkd_nextPage}`);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      const dkd_pageProps = { dkd_onNavigate: dkd_handleNavigate };
      return <div className="dkd-app-shell">
        {dkd_currentPage === 'home' && <DkdHomePage {...dkd_pageProps} />}
        {dkd_currentPage === 'login' && <DkdLoginPage {...dkd_pageProps} />}
        {dkd_currentPage === 'packages' && <DkdPackagesPage {...dkd_pageProps} />}
        {dkd_currentPage === 'fan' && <DkdFanPage {...dkd_pageProps} />}
        {dkd_currentPage === 'voice' && <DkdVoicePage {...dkd_pageProps} />}
        {dkd_currentPage === 'custom' && <DkdCustomPage {...dkd_pageProps} />}
        {dkd_currentPage === 'business' && <DkdBusinessPage {...dkd_pageProps} />}
        {dkd_currentPage === 'payment' && <DkdPaymentPage {...dkd_pageProps} />}
        {dkd_currentPage === 'chat' && <DkdChatPage {...dkd_pageProps} />}
        {dkd_currentPage === 'account' && <DkdAccountPage {...dkd_pageProps} />}
        {dkd_currentPage === 'admin' && <DkdAdminPage {...dkd_pageProps} />}
      </div>;
    }

    createRoot(document.getElementById('dkd-root')).render(<DkdAnyelaBornApp />);
  </script>
</body>
</html>
