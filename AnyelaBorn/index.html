<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#061044" />
    <title>Anyela Born Club</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #ffffff;
        background:
          radial-gradient(circle at 18% 12%, rgba(255, 79, 184, 0.28), transparent 25rem),
          radial-gradient(circle at 86% 18%, rgba(33, 217, 221, 0.22), transparent 24rem),
          linear-gradient(180deg, #061044 0%, #070526 58%, #030517 100%);
      }

      .dkd_anyela_closed_page {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 28px 18px;
      }

      .dkd_anyela_closed_card {
        width: min(100%, 520px);
        border: 1px solid rgba(255, 79, 184, 0.72);
        border-radius: 32px;
        padding: 30px 24px;
        background:
          radial-gradient(circle at 16% 8%, rgba(255, 79, 184, 0.24), transparent 28%),
          radial-gradient(circle at 86% 4%, rgba(33, 217, 221, 0.16), transparent 26%),
          linear-gradient(180deg, rgba(24, 16, 78, 0.94) 0%, rgba(9, 9, 48, 0.96) 100%);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.46),
          0 0 34px rgba(255, 79, 184, 0.24);
        text-align: center;
      }

      .dkd_anyela_closed_badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        color: #ff7ed4;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .dkd_anyela_closed_title {
        margin: 18px 0 10px;
        font-size: clamp(30px, 8vw, 52px);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .dkd_anyela_closed_text {
        margin: 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: clamp(15px, 4vw, 18px);
        line-height: 1.55;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_closed_page" aria-label="Anyela Born Club geçici kapalı sayfası">
      <section class="dkd_anyela_closed_card">
        <span class="dkd_anyela_closed_badge">Yakında</span>
        <h1 class="dkd_anyela_closed_title">Anyela Born Club</h1>
        <p class="dkd_anyela_closed_text">
          Bu alan şimdilik yayına kapalıdır. Login ekranı ayrı sayfada aktif tutulmaktadır.
        </p>
      </section>
    </main>
  </body>
</html>
