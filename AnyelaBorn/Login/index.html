ogin_popup_backdrop{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 20% 18%,rgba(25,246,255,.18),transparent 28rem),radial-gradient(circle at 80% 12%,rgba(255,46,199,.22),transparent 24rem),rgba(4,0,29,.72);backdrop-filter:blur(12px)}.dkd_anyela_login_popup_backdrop[data-dkd-anyela-popup-open="true"]{display:flex}.dkd_anyela_login_popup{width:min(92vw,410px);border:1.5px solid rgba(255,255,255,.28);border-radius:30px;padding:20px;background:radial-gradient(circle at 12% 0%,rgba(25,246,255,.28),transparent 30%),radial-gradient(circle at 88% 0%,rgba(255,46,199,.34),transparent 30%),linear-gradient(180deg,rgba(27,4,85,.96),rgba(4,0,28,.97));box-shadow:0 24px 80px rgba(0,0,0,.56),0 0 44px rgba(255,46,199,.34),inset 0 1px 0 rgba(255,255,255,.22);color:#fff}.dkd_anyela_login_popup_title{margin:0 0 6px;text-align:center;font-size:clamp(24px,7vw,34px);line-height:1.08;font-weight:950;text-shadow:0 0 18px rgba(255,46,199,.7),0 0 24px rgba(25,246,255,.36)}.dkd_anyela_login_popup_subtitle{margin:0 0 18px;color:rgba(255,255,255,.76);text-align:center;font-size:14px;line-height:1.45}.dkd_anyela_login_popup_grid{display:grid;gap:11px}.dkd_anyela_login_popup_action{position:relative;min-height:62px;border:1.2px solid rgba(255,255,255,.28);border-radius:20px;color:#fff;background:linear-gradient(105deg,rgba(25,246,255,.28),rgba(255,46,199,.36),rgba(255,207,88,.18));box-shadow:inset 0 1px 0 rgba(255,255,255,.20),0 10px 24px rgba(255,46,199,.18);cursor:pointer;font-size:17px;font-weight:900;overflow:hidden}.dkd_anyela_login_popup_action::before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 35%,rgba(255,255,255,.28) 47%,transparent 58% 100%);transform:translateX(-120%);animation:dkdAnyelaLoginShine 2.8s ease-in-out infinite}.dkd_anyela_login_popup_action[data-dkd-anyela-popup-choice="login"]{min-height:70px;border-color:rgba(25,246,255,.72);background:line <body>
<main class="dkd_anyela_login_page"><section class="dkd_anyela_login_mobile_shell"><img class="dkd_anyela_login_mockup" src="./assets/dkd_anyela_login_9935_20260529.png" alt="Anyela Born Club Miami neon login sayfası" width="864" height="1536" loading="eager"><a class="dkd_anyela_login_package_link" href="#" data-dkd-anyela-package-check="true" aria-label="Paketleri İncele"></a><form autocomplete="on"><input class="dkd_anyela_login_input dkd_anyela_login_email" id="dkd_anyela_login_email" name="dkd_anyela_email" type="email" autocomplete="email" aria-label="Email"><input class="dkd_anyela_login_input dkd_anyela_login_password" id="dkd_anyela_login_password" name="dkd_anyela_password" type="password" autocomplete="current-password" aria-label="Şifre"><button class="dkd_anyela_login_tap_button dkd_anyela_login_submit" type="button" data-dkd-anyela-login-action="login" aria-label="Giriş Yap"></button><button class="dkd_anyela_login_tap_button dkd_anyela_login_register" type="button" data-dkd-anyela-login-action="register" aria-label="Kayıt Ol"></button><button class="dkd_anyela_login_tap_button dkd_anyela_login_guest" type="button" data-dkd-anyela-login-action="guest" aria-label="Misafir Girişi"></button></form></section></main>
<div class="dkd_anyela_login_popup_backdrop" id="dkd_anyela_login_popup" aria-hidden="true"><section class="dkd_anyela_login_popup" role="dialog" aria-modal="true"><h2 class="dkd_anyela_login_popup_title" id="dkd_anyela_login_popup_title">Miami Giriş Seçimi</h2><p class="dkd_anyela_login_popup_subtitle">Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.</p><div class="dkd_anyela_login_popup_grid"><button class="dkd_anyela_login_popup_action" type="button" data-dkd-anyela-popup-choice="login">✨ Giriş Yap</button><button class="dkd_anyela_login_popup_action" type="button" data-dkd-anyela-popup-choice="register">Kayıt Ol</button><button class="dkd_anyela_login_popup_action dkd_anyela_login_popup_guest" type="button" data-dkd-anyela-popup-choice="guest">Misafir Girişi</button></div><p class="dkd_anyela_login_popup_note" id="dkd_anyela_login_popup_note"></p><button class="dkd_anyela_login_popup_close" id="dkd_anyela_login_popup_close" type="button">Kapat</button></section></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){'use strict';const dkd_url='https://ztxlcfcwuwerxrhwfmte.supabase.co';const dkd_key='sb_publishable_GSd5xFBwG9pioOY8N6MRQw_C2n7RLYa';const dkd_home='../Home/';const dkd_popup=document.getElementById('dkd_anyela_login_popup');const dkd_note=document.getElementById('dkd_anyela_login_popup_note');const dkd_title=document.getElementById('dkd_anyela_login_popup_title');const dkd_sub=document.querySelector('.dkd_anyela_login_popup_subtitle');const dkd_email=document.getElementById('dkd_anyela_login_email');const dkd_password=document.getElementById('dkd_anyela_login_password');const dkd_client=window.supabase.createClient(dkd_url,dkd_key,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'dkd_anyela_auth_session'}});function dkd_note_set(dkd_text,dkd_status){dkd_note.textContent=dkd_text||'';if(dkd_status){dkd_note.setAttribute('data-dkd-anyela-status',dkd_status)}else{dkd_note.removeAttribute('data-dkd-anyela-status')}}function dkd_open(dkd_event){dkd_event.preventDefault();dkd_event.stopPropagation();dkd_popup.setAttribute('data-dkd-anyela-popup-open','true');dkd_popup.setAttribute('aria-hidden','false');dkd_title.textContent='Miami Giriş Seçimi';dkd_sub.textContent='Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.';dkd_note_set('Giriş Yap butonuna basarak hesabına hızlıca geçebilirsin.','success')}function dkd_close(){dkd_popup.removeAttribute('data-dkd-anyela-popup-open');dkd_popup.setAttribute('aria-hidden','true')}function dkd_save(dkd_mode){localStorage.setItem('dkd_anyela_auth_access','allowed');localStorage.setItem('dkd_anyela_auth_mode',dkd_mode);localStorage.setItem('dkd_anyela_auth_at',String(Date.now()));if(dkd_mode==='member'){localStorage.setItem('dkd_anyela_account_login_once','true')}if(dkd_mode==='guest'){localStorage.setItem('dkd_anyela_guest_login_active','true')}}function dkd_creds(){const dkd_email_value=(dkd_email.value||'').trim();const dkd_password_value=dkd_password.value||'';if(!dkd_email_value||!dkd_email_value.includes('@')){dkd_note_set('Geçerli bir email adresi yazmalısın.','error');return null}if(!dkd_password_value||dkd_password_value.length<6){dkd_note_set('Şifre en az 6 karakter olmalı.','error');return null}return{email:dkd_email_value,password:dkd_password_value}}async function dkd_login(){const dkd_value=dkd_creds();if(!dkd_value){return}dkd_note_set('Giriş kontrol ediliyor...','success');const dkd_result=await dkd_client.auth.signInWithPassword(dkd_value);if(dkd_result.error){dkd_note_set('Giriş başarısız: '+dkd_result.error.message,'error');return}dkd_save('member');dkd_note_set('Giriş başarılı. Home sayfasına yönlendiriliyorsun...','success');setTimeout(()=>location.href=dkd_home,650)}async function dkd_register(){const dkd_value=dkd_creds();if(!dkd_value){return}dkd_note_set('Kayıt oluşturuluyor...','success');const dkd_result=await dkd_client.auth.signUp({email:dkd_value.email,password:dkd_value.password,options:{data:{dkd_display_name:dkd_value.email.split('@')[0],dkd_source:'anyelaborn_login'}}});if(dkd_result.error){dkd_note_set('Kayıt başarısız: '+dkd_result.error.message,'error');return}if(dkd_result.data&&dkd_result.data.session){dkd_save('member');location.href=dkd_home;return}dkd_note_set('Kayıt alındı. Email onayı açıksa mail kutunu kontrol etmelisin.','success')}document.querySelectorAll('[data-dkd-anyela-login-action]').forEach(dkd_btn=>dkd_btn.addEventListener('click',dkd_open));document.querySelector('[data-dkd-anyela-package-check]').addEventListener('click',function(dkd_event){dkd_event.preventDefault();dkd_open(dkd_event);dkd_title.textContent='Lütfen Önce Giriş yapın';dkd_sub.textContent='Paketleri incelemek için hesabınla giriş yapabilir veya misafir olarak devam edebilirsin.';dkd_note_set('Lütfen Önce Giriş yapın','error')});document.querySelectorAll('[data-dkd-anyela-popup-choice]').forEach(dkd_btn=>dkd_btn.addEventListener('click',function(){const dkd_choice=dkd_btn.getAttribute('data-dkd-anyela-popup-choice');if(dkd_choice==='guest'){dkd_save('guest');location.href=dkd_home}else if(dkd_choice==='login'){dkd_login()}else{dkd_register()}}));document.getElementById('dkd_anyela_login_popup_close').addEventListener('click',dkd_close);window.addEventListener('load',()=>{dkd_email.focus({preventScroll:true})});})();
</script>
