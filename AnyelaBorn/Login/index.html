<script>
(function dkdAnyelaLoginScope(){'use strict';const dkdUrl='https://ztxlcfcwuwerxrhwfmte.supabase.co';const dkdKey='sb_publishable_GSd5xFBwG9pioOY8N6MRQw_C2n7RLYa';const dkdHome='../Home/';const dkdPopup=document.getElementById('dkd_anyela_login_popup');const dkdTitle=document.getElementById('dkd_anyela_login_popup_title');const dkdSubtitle=document.querySelector('.dkd_anyela_login_popup_subtitle');const dkdNote=document.getElementById('dkd_anyela_login_popup_note');const dkdEmail=document.getElementById('dkd_anyela_login_email');const dkdPassword=document.getElementById('dkd_anyela_login_password');const dkdClient=window.supabase.createClient(dkdUrl,dkdKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'dkd_anyela_auth_session'}});function dkdSetNote(dkdText,dkdStatus){dkdNote.textContent=dkdText||'';if(dkdStatus){dkdNote.setAttribute('data-dkd-anyela-status',dkdStatus)}else{dkdNote.removeAttribute('data-dkd-anyela-status')}}function dkdOpen(dkdEvent){if(dkdEvent){dkdEvent.preventDefault();dkdEvent.stopPropagation()}dkdTitle.textContent='Miami Giriş Seçimi';dkdSubtitle.textContent='Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.';dkdPopup.setAttribute('data-dkd-anyela-popup-open','true');dkdPopup.setAttribute('aria-hidden','false');dkdSetNote('Giriş Yap butonuna basınca güvenli oturum açılır.','success')}function dkdClose(){dkdPopup.removeAttribute('data-dkd-anyela-popup-open');dkdPopup.setAttribute('aria-hidden','true')}function dkdSave(dkdMode){localStorage.setItem('dkd_anyela_auth_access','allowed');localStorage.setItem('dkd_anyela_auth_mode',dkdMode);localStorage.setItem('dkd_anyela_auth_at',String(Date.now()));if(dkdMode==='member'){localStorage.setItem('dkd_anyela_account_login_once','true')}if(dkdMode==='guest'){localStorage.setItem('dkd_anyela_guest_login_active','true')}}function dkdCred(){const dkdEmailValue=(dkdEmail.value||'').trim();const dkdPasswordValue=dkdPassword.value||'';if(!dkdEmailValue||!dkdEmailValue.includes('@')){dkdSetNote('Geçerli bir email adresi yazmalısın.','error');dkdEmail.focus();return null}if(!dkdPasswordValue||dkdPasswordValue.length<6){dkdSetNote('Şifre en az 6 karakter olmalı.','error');dkdPassword.focus();return null}return{dkd_email:dkdEmailValue,dkd_password:dkdPasswordValue}}async function dkdSignIn(){const dkdCredentials=dkdCred();if(!dkdCredentials){return}dkdSetNote('Giriş kontrol ediliyor...','success');const dkdResult=await dkdClient.auth.signInWithPassword({email:dkdCredentials.dkd_email,password:dkdCredentials.dkd_password});if(dkdResult.error){dkdSetNote('Giriş başarısız: '+dkdResult.error.message,'error');return}dkdSave('member');dkdSetNote('Giriş başarılı. Home sayfasına yönlendiriliyorsun...','success');setTimeout(()=>{location.href=dkdHome},650)}async function dkdSignUp(){const dkdCredentials=dkdCred();if(!dkdCredentials){return}dkdSetNote('Kayıt oluşturuluyor...','success');const dkdResult=await dkdClient.auth.signUp({email:dkdCredentials.dkd_email,password:dkdCredentials.dkd_password,options:{data:{dkd_display_name:dkdCredentials.dkd_email.split('@')[0],dkd_source:'anyelaborn_login'}}});if(dkdResult.error){dkdSetNote('Kayıt başarısız: '+dkdResult.error.message,'error');return}if(dkdResult.data&&dkdResult.data.session){dkdSave('member');dkdSetNote('Kayıt tamamlandı. Home sayfasına yönlendiriliyorsun...','success');setTimeout(()=>{location.href=dkdHome},650);return}dkdSetNote('Kayıt alındı. Email onayı açıksa mail kutunu kontrol etmelisin.','success')}document.querySelectorAll('[data-dkd-anyela-login-action]').forEach(dkdButton=>dkdButton.addEventListener('click',dkdOpen));document.querySelector('[data-dkd-anyela-package-check]').addEventListener('click',function(dkdEvent){dkdEvent.preventDefault();dkdOpen();dkdSetNote('Paketleri incelemek için önce giriş yapabilir veya misafir olarak devam edebilirsin.','error')});document.querySelectorAll('[data-dkd-anyela-popup-choice]').forEach(dkdButton=>dkdButton.addEventListener('click',async function(){const dkdChoice=dkdButton.getAttribute('data-dkd-anyela-popup-choice');if(dkdChoice==='guest'){dkdSave('guest');location.href=dkdHome;return}if(dkdChoice==='login'){await dkdSignIn();return}if(dkdChoice==='register'){await dkdSignUp()}}));document.getElementById('dkd_anyela_login_popup_close').addEventListener('click',dkdClose);dkdPopup.addEventListener('click',function(dkdEvent){if(dkdEvent.target===dkdPopup){dkdClose()}});window.addEventListener('load',()=>setTimeout(()=>dkdEmail.focus({preventScroll:true}),120));})();
