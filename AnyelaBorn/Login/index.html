<style>

px rgba(25,246,255,.35),inset 0 1px 0 rgba(255,255,255,.38);animation:dkdAnyelaLoginPulse 1.25s ease-in-out infinite}.dkd_anyela_login_submit:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 0 36%,rgba(255,255,255,.34) 46%,transparent 57% 100%);transform:translateX(-120%);animation:dkdAnyelaLoginShine 2.7s ease-in-out infinite}.dkd_anyela_login_submit span{position:relative;z-index:2;display:flex;align-items:center;gap:8px;text-shadow:0 0 16px rgba(0,0,0,.4)}.dkd_anyela_login_register{left:22.2%;top:86.45%;width:58%;height:4.65%;background:rgba(255,255,255,.001);color:transparent}.dkd_anyela_login_guest{left:22.2%;top:92.10%;width:58%;height:4.65%;background:rgba(255,255,255,.001);color:transparent}@keyframes dkdAnyelaLoginPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045);box-shadow:0 0 0 4px rgba(25,246,255,.16),0 18px 42px rgba(255,46,199,.46),0 0 44px rgba(25,246,255,.42)}}@keyframes dkdAnyelaLoginShine{0%,58%{transform:translateX(-120%)}100%{transform:translateX(120%)}}.dkd_anyela_login_popup_backdrop{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 20% 18%,rgba(25,246,255,.18),transparent 28rem),radial-gradient(circle at 80% 12%,rgba(255,46,199,.22),transparent 24rem),rgba(4,0,29,.72);backdrop-filter:blur(12px)}.dkd_anyela_login_popup_backdrop[data-dkd-open="true"]{display:flex}.dkd_anyela_login_popup{width:min(92vw,410px);border:1.5px solid rgba(255,255,255,.28);border-radius:30px;padding:20px;background:radial-gradient(circle at 12% 0%,rgba(25,246,255,.28),transparent 30%),radial-gradient(circle at 88% 0%,rgba(255,46,199,.34),transparent 30%),linear-gradient(180deg,rgba(27,4,85,.96),rgba(4,0,28,.97));box-shadow:0 24px 80px rgba(0,0,0,.56),0 0 44px rgba(255,46,199,.34),inset 0 1px 0 rgba(255,255,255,.22);color:#fff}.dkd_anyela_login_popup_title{margin:0 0 6px;text-align:center;font-size:clamp(24px,7vw,34px);line-height:1.08;font-weight:950;text-shadow:0 0 18px rgba(255,46,199,.7),0 0 24px rgba(25,246,255,.36)}.dkd_anyela_login_popup_subtitle{margin:0 0 18px;color:rgba(255,255,255,.76);text-align:center;font-size:14px;line-height:1.45}.dkd_anyela_login_popup_grid{display:grid;gap:11px}.dkd_anyela_login_popup_action{min-height:56px;border:1.2px solid rgba(255,255,255,.28);border-radius:18px;color:#fff;background:linear-gradient(105deg,rgba(25,246,255,.28),rgba(255,46,199,.36),rgba(255,207,88,.18));cursor:pointer;font-size:17px;font-weight:900}.dkd_anyela_login_popup_guest{border-color:rgba(25,246,255,.72);background:linear-gradient(105deg,#08d8ff,#6b52ff 34%,#ff2ec7 72%,#ffcf58)}.dkd_anyela_login_popup_note{min-height:20px;margin:12px 4px 0;color:rgba(255,255,255,.72);font-size:13px;text-align:center;line-height:1.45}.dkd_anyela_login_popup_note[data-dkd-status="success"]{color:#8efff7}.dkd_anyela_login_popup_note[data-dkd-status="error"]{color:#ffb1df}.dkd_anyela_login_popup_close{width:100%;min-height:42px;margin-top:12px;border:0;border-radius:16px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.09);cursor:pointer;font-weight:800}.dkd_anyela_sr{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip-path:inset(50%);border:0;white-space:nowrap}@media(min-width:820px){.dkd_anyela_login_page{align-items:center;padding:32px 0}.dkd_anyela_login_shell{width:min(44vw,480px);min-height:auto;border-radius:38px;border:1px solid rgba(255,255,255,.16)}.dkd_anyela_login_mockup{min-height:auto}}
</style>
<script src="../assets/dkd_anyela_auth_guard.js" data-dkd-anyela-auth-mode="login"></script>
</head>
<body>
<main class="dkd_anyela_login_page" aria-label="Anyela Born Club Login sayfası">
<section class="dkd_anyela_login_shell">
<img class="dkd_anyela_login_mockup" src="./assets/dkd_anyela_login_9935_20260529.png" alt="Anyela Born Club Miami neon login sayfası" width="864" height="1536" loading="eager">
<a class="dkd_anyela_login_package_link" href="#" aria-label="Paketleri İncele" data-dkd-package-check="true"></a>
<form autocomplete="on">
<label class="dkd_anyela_sr" for="dkd_anyela_login_email">Email</label>
<input class="dkd_anyela_login_input dkd_anyela_login_email" id="dkd_anyela_login_email" name="dkd_anyela_email" type="email" inputmode="email" autocomplete="email" aria-label="Email" autofocus>
<label class="dkd_anyela_sr" for="dkd_anyela_login_password">Şifre</label>
<input class="dkd_anyela_login_input dkd_anyela_login_password" id="dkd_anyela_login_password" name="dkd_anyela_password" type="password" autocomplete="current-password" aria-label="Şifre">
<button class="dkd_anyela_login_action dkd_anyela_login_submit" type="button" data-dkd-action="login" aria-label="Giriş Yap"><span>🚀 Giriş Yap</span></button>
<button class="dkd_anyela_login_action dkd_anyela_login_register" type="button" data-dkd-action="register" aria-label="Kayıt Ol">Kayıt Ol</button>
<button class="dkd_anyela_login_action dkd_anyela_login_guest" type="button" data-dkd-action="guest" aria-label="Misafir Girişi">Misafir Girişi</button>
</form>
</section>
</main>
<div class="dkd_anyela_login_popup_backdrop" id="dkd_anyela_login_popup" aria-hidden="true">
<section class="dkd_anyela_login_popup" role="dialog" aria-modal="true">
<h2 class="dkd_anyela_login_popup_title" id="dkd_anyela_login_popup_title">Miami Giriş Seçimi</h2>
<p class="dkd_anyela_login_popup_subtitle" id="dkd_anyela_login_popup_subtitle">Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.</p>
<div class="dkd_anyela_login_popup_grid">
<button class="dkd_anyela_login_popup_action" type="button" data-dkd-choice="login">Giriş Yap</button>
<button class="dkd_anyela_login_popup_action" type="button" data-dkd-choice="register">Kayıt Ol</button>
<button class="dkd_anyela_login_popup_action dkd_anyela_login_popup_guest" type="button" data-dkd-choice="guest">Misafir Girişi</button>
</div>
<p class="dkd_anyela_login_popup_note" id="dkd_anyela_login_popup_note"></p>
<button class="dkd_anyela_login_popup_close" id="dkd_anyela_login_popup_close" type="button">Kapat</button>
</section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function dkdAnyelaLoginScope(){'use strict';
const dkdUrl='https://ztxlcfcwuwerxrhwfmte.supabase.co';
const dkdKey='sb_publishable_GSd5xFBwG9pioOY8N6MRQw_C2n7RLYa';
const dkdHome='../Home/';
const dkdPopup=document.getElementById('dkd_anyela_login_popup');
const dkdNote=document.getElementById('dkd_anyela_login_popup_note');
const dkdTitle=document.getElementById('dkd_anyela_login_popup_title');
const dkdSubtitle=document.getElementById('dkd_anyela_login_popup_subtitle');
const dkdEmail=document.getElementById('dkd_anyela_login_email');
const dkdPassword=document.getElementById('dkd_anyela_login_password');
const dkdClient=window.supabase&&window.supabase.createClient?window.supabase.createClient(dkdUrl,dkdKey,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'dkd_anyela_auth_session'}}):null;
function dkdSetNote(dkdText,dkdStatus){dkdNote.textContent=dkdText||'';dkdStatus?dkdNote.setAttribute('data-dkd-status',dkdStatus):dkdNote.removeAttribute('data-dkd-status')}
function dkdOpen(dkdTitleText,dkdSubtitleText,dkdNoteText,dkdStatus){dkdTitle.textContent=dkdTitleText;dkdSubtitle.textContent=dkdSubtitleText;dkdSetNote(dkdNoteText,dkdStatus);dkdPopup.setAttribute('data-dkd-open','true');dkdPopup.setAttribute('aria-hidden','false')}
function dkdClose(){dkdPopup.removeAttribute('data-dkd-open');dkdPopup.setAttribute('aria-hidden','true')}
function dkdSave(dkdMode){try{localStorage.setItem('dkd_anyela_auth_access','allowed');localStorage.setItem('dkd_anyela_auth_mode',dkdMode);localStorage.setItem('dkd_anyela_auth_at',String(Date.now()));if(dkdMode==='member'){localStorage.setItem('dkd_anyela_account_login_once','true')}if(dkdMode==='guest'){localStorage.setItem('dkd_anyela_guest_login_active','true')}}catch(dkdError){}}
function dkdCredentials(){const dkdMail=(dkdEmail.value||'').trim();const dkdPass=dkdPassword.value||'';if(!dkdMail||!dkdMail.includes('@')){dkdSetNote('Geçerli bir email adresi yazmalısın.','error');dkdEmail.focus({preventScroll:true});return null}if(!dkdPass||dkdPass.length<6){dkdSetNote('Şifre en az 6 karakter olmalı.','error');dkdPassword.focus({preventScroll:true});return null}return{dkd_email:dkdMail,dkd_password:dkdPass}}
async function dkdSignIn(){if(!dkdClient){dkdSetNote('Supabase bağlantısı yüklenemedi. Sayfayı yenileyip tekrar dene.','error');return}const dkdCred=dkdCredentials();if(!dkdCred){return}dkdSetNote('Giriş kontrol ediliyor...','success');const dkdResult=await dkdClient.auth.signInWithPassword({email:dkdCred.dkd_email,password:dkdCred.dkd_password});if(dkdResult.error){dkdSetNote('Giriş başarısız: '+dkdResult.error.message,'error');return}dkdSave('member');dkdSetNote('Giriş başarılı. Home sayfasına yönlendiriliyorsun...','success');setTimeout(()=>{location.href=dkdHome},650)}
async function dkdSignUp(){if(!dkdClient){dkdSetNote('Supabase bağlantısı yüklenemedi. Sayfayı yenileyip tekrar dene.','error');return}const dkdCred=dkdCredentials();if(!dkdCred){return}dkdSetNote('Kayıt oluşturuluyor...','success');const dkdResult=await dkdClient.auth.signUp({email:dkdCred.dkd_email,password:dkdCred.dkd_password,options:{data:{dkd_display_name:dkdCred.dkd_email.split('@')[0],dkd_source:'anyelaborn_login'}}});if(dkdResult.error){dkdSetNote('Kayıt başarısız: '+dkdResult.error.message,'error');return}if(dkdResult.data&&dkdResult.data.session){dkdSave('member');dkdSetNote('Kayıt tamamlandı. Home sayfasına yönlendiriliyorsun...','success');setTimeout(()=>{location.href=dkdHome},650);return}dkdSetNote('Kayıt alındı. Email onayı açıksa mail kutunu kontrol etmelisin.','success')}
function dkdGuest(){dkdSave('guest');location.href=dkdHome}
document.querySelector('[data-dkd-package-check]').addEventListener('click',function(dkdEvent){dkdEvent.preventDefault();dkdOpen('Lütfen Önce Giriş Yapın','Paketleri incelemek için hesabınla giriş yapabilir veya misafir olarak devam edebilirsin.','Paket ekranına geçmeden önce giriş seçimini tamamla.','error')});
document.querySelectorAll('[data-dkd-action]').forEach(function(dkdButton){dkdButton.addEventListener('click',function(){dkdOpen('Miami Giriş Seçimi','Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.','Email ve şifreni yazdıysan seçim yapabilirsin.','success')})});
document.querySelectorAll('[data-dkd-choice]').forEach(function(dkdButton){dkdButton.addEventListener('click',async function(){const dkdChoice=dkdButton.getAttribute('data-dkd-choice');if(dkdChoice==='guest'){dkdGuest();return}if(dkdChoice==='login'){await dkdSignIn();return}if(dkdChoice==='register'){await dkdSignUp()}})});
document.getElementById('dkd_anyela_login_popup_close').addEventListener('click',dkdClose);dkdPopup.addEventListener('click',function(dkdEvent){if(dkdEvent.target===dkdPopup){dkdClose()}});document.addEventListener('keydown',function(dkdEvent){if(dkdEvent.key==='Escape'){dkdClose()}if(dkdEvent.key==='Enter'&&document.activeElement&&(document.activeElement.id==='dkd_anyela_login_email'||document.activeElement.id==='dkd_anyela_login_password')){dkdOpen('Miami Giriş Seçimi','Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.','Giriş yapmak için Giriş Yap seçeneğine dokun.','success')}});setTimeout(()=>{dkdEmail.focus({preventScroll:true})},120);
})();
</script>
</body>
