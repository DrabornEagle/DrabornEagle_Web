<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="Anyela Born Club Login sayfası. Yüksek kalite görsel üzerinde giriş yap, kayıt ol ve misafir girişi paneli." />
    <meta property="og:title" content="Anyela Born Club Login" />
    <meta property="og:description" content="Anyela Born Club giriş ekranı. Giriş yap, kayıt ol veya misafir olarak devam et." />
    <meta property="og:image" content="../assets/dkd_anyela_login_9928_20260530.png" />
    <title>Anyela Born Club Login</title>
    <style>
      :root {
        --dkd_anyela_login_bg: #f7fbff;
        --dkd_anyela_login_shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        --dkd_anyela_login_pink: #ff2faa;
        --dkd_anyela_login_orange: #ff9d35;
        --dkd_anyela_login_aqua: #12dce9;
        --dkd_anyela_login_ink: #10223d;
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 15% 0%, rgba(255, 86, 176, 0.20), transparent 24rem),
          radial-gradient(circle at 90% 10%, rgba(0, 205, 220, 0.20), transparent 26rem),
          linear-gradient(180deg, #ecfbff 0%, #fff4fb 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a,
      button {
        -webkit-tap-highlight-color: transparent;
      }

      button,
      input {
        font: inherit;
      }

      .dkd_anyela_login_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_login_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #f7fbff;
        box-shadow: var(--dkd_anyela_login_shadow);
      }

      .dkd_anyela_login_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_login_start_hotspot {
        position: absolute;
        left: 4.5%;
        top: 36.6%;
        width: 44.5%;
        height: 8.2%;
        z-index: 20;
        border-radius: 999px;
        text-decoration: none;
        outline: none;
      }

      .dkd_anyela_login_panel {
        position: absolute;
        z-index: 90;
        left: 4.1%;
        right: 4.1%;
        top: 42.4%;
        padding: clamp(14px, 3.8vw, 20px);
        border: 1.5px solid rgba(255, 255, 255, 0.72);
        border-radius: clamp(24px, 7vw, 34px);
        background:
          radial-gradient(circle at 14% 0%, rgba(255, 255, 255, 0.72), transparent 28%),
          linear-gradient(160deg, rgba(255, 255, 255, 0.88) 0%, rgba(255, 245, 252, 0.78) 48%, rgba(231, 253, 255, 0.78) 100%);
        box-shadow:
          0 20px 50px rgba(11, 24, 50, 0.28),
          0 0 30px rgba(255, 47, 170, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      .dkd_anyela_login_tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .dkd_anyela_login_tab {
        min-height: 43px;
        border: 0;
        border-radius: 999px;
        color: rgba(16, 34, 61, 0.72);
        background: rgba(255, 255, 255, 0.56);
        font-weight: 950;
        letter-spacing: 0.02em;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .dkd_anyela_login_tab_active {
        color: #ffffff;
        background: linear-gradient(105deg, #18f7ff 0%, #ff36c7 48%, #ff9d35 100%);
        box-shadow:
          0 10px 22px rgba(255, 47, 170, 0.28),
          0 0 18px rgba(18, 220, 233, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.58);
      }

      .dkd_anyela_login_title {
        margin: 2px 0 10px;
        color: var(--dkd_anyela_login_ink);
        font-size: clamp(20px, 5.2vw, 28px);
        line-height: 1.05;
        font-weight: 950;
        letter-spacing: -0.04em;
      }

      .dkd_anyela_login_subtitle {
        margin: 0 0 12px;
        color: rgba(16, 34, 61, 0.68);
        font-size: clamp(12px, 3.4vw, 15px);
        line-height: 1.35;
        font-weight: 700;
      }

      .dkd_anyela_login_form {
        display: grid;
        gap: 9px;
      }

      .dkd_anyela_login_input {
        width: 100%;
        min-height: 48px;
        border: 1.2px solid rgba(18, 220, 233, 0.42);
        border-radius: 16px;
        padding: 0 14px;
        color: var(--dkd_anyela_login_ink);
        background: rgba(255, 255, 255, 0.72);
        outline: none;
        font-size: clamp(14px, 3.8vw, 17px);
        font-weight: 750;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
      }

      .dkd_anyela_login_input::placeholder {
        color: rgba(16, 34, 61, 0.48);
      }

      .dkd_anyela_login_input:focus {
        border-color: rgba(255, 47, 170, 0.74);
        box-shadow:
          0 0 0 3px rgba(255, 47, 170, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.90);
      }

      .dkd_anyela_login_row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(16, 34, 61, 0.68);
        font-size: clamp(11px, 3.2vw, 14px);
        font-weight: 760;
      }

      .dkd_anyela_login_check {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        white-space: nowrap;
      }

      .dkd_anyela_login_check input {
        width: 16px;
        height: 16px;
        accent-color: var(--dkd_anyela_login_pink);
      }

      .dkd_anyela_login_forgot {
        color: var(--dkd_anyela_login_pink);
        text-decoration: none;
        white-space: nowrap;
      }

      .dkd_anyela_login_guest_button,
      .dkd_anyela_login_submit {
        width: 100%;
        min-height: 50px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 17px;
        text-decoration: none;
        font-size: clamp(15px, 4.1vw, 20px);
        font-weight: 950;
        letter-spacing: 0.02em;
      }

      .dkd_anyela_login_guest_button {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        margin-top: 2px;
        color: #ffffff;
        border: 1.4px solid rgba(255, 255, 255, 0.78);
        background: linear-gradient(105deg, #18f7ff 0%, #6f5cff 21%, #ff36c7 43%, #ff9d35 70%, #18f7ff 100%);
        background-size: 240% 100%;
        box-shadow:
          0 12px 28px rgba(255, 47, 170, 0.34),
          0 0 24px rgba(18, 220, 233, 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.52);
        animation: dkd_anyela_login_guest_flow 3s linear infinite, dkd_anyela_login_guest_pulse 1.7s ease-in-out infinite;
      }

      .dkd_anyela_login_guest_button::before {
        content: "";
        position: absolute;
        inset: -35% -20%;
        z-index: -1;
        background: linear-gradient(115deg, transparent 0 34%, rgba(255, 255, 255, 0.72) 48%, transparent 62% 100%);
        transform: translateX(-82%) rotate(7deg);
        animation: dkd_anyela_login_guest_shine 2.25s ease-in-out infinite;
      }

      .dkd_anyela_login_submit {
        border: 0;
        color: #ffffff;
        background: linear-gradient(105deg, #ff2faa 0%, #ff7d3a 100%);
        box-shadow:
          0 12px 25px rgba(255, 47, 170, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.48);
        cursor: pointer;
      }

      .dkd_anyela_login_nav {
        position: absolute;
        inset: auto 0 0;
        z-index: 70;
      }

      .dkd_anyela_login_nav a {
        position: absolute;
        bottom: 1.2%;
        height: 5.2%;
        border-radius: 16px;
        text-decoration: none;
        outline: none;
      }

      .dkd_anyela_login_nav_home { left: 6.0%; width: 13.5%; }
      .dkd_anyela_login_nav_packages { left: 25.6%; width: 14.0%; }
      .dkd_anyela_login_nav_chat { left: 45.4%; width: 13.8%; }
      .dkd_anyela_login_nav_orders { left: 64.2%; width: 14.5%; }
      .dkd_anyela_login_nav_profile { left: 83.0%; width: 14.0%; }

      .dkd_anyela_login_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @keyframes dkd_anyela_login_guest_flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 240% 50%; }
      }

      @keyframes dkd_anyela_login_guest_pulse {
        0%, 100% { filter: saturate(1.08) brightness(1); }
        50% { filter: saturate(1.32) brightness(1.10); }
      }

      @keyframes dkd_anyela_login_guest_shine {
        0% { transform: translateX(-88%) rotate(7deg); opacity: 0; }
        30% { opacity: 0.9; }
        100% { transform: translateX(88%) rotate(7deg); opacity: 0; }
      }

      @media (max-width: 380px) {
        .dkd_anyela_login_panel {
          top: 40.8%;
          padding: 12px;
        }

        .dkd_anyela_login_title {
          margin-bottom: 7px;
        }

        .dkd_anyela_login_subtitle {
          margin-bottom: 9px;
        }

        .dkd_anyela_login_input {
          min-height: 44px;
        }

        .dkd_anyela_login_guest_button,
        .dkd_anyela_login_submit {
          min-height: 46px;
        }
      }

      @media (max-height: 720px) and (max-width: 480px) {
        .dkd_anyela_login_panel {
          top: 39.5%;
          transform: scale(0.92);
          transform-origin: top center;
        }
      }

      @media (min-width: 820px) {
        .dkd_anyela_login_page {
          align-items: center;
          padding: 32px 0;
        }

        .dkd_anyela_login_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.60);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.30),
            0 0 90px rgba(255, 65, 170, 0.18),
            0 0 120px rgba(0, 205, 220, 0.14);
        }

        .dkd_anyela_login_mockup {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_login_page" aria-label="Anyela Born Club Login sayfası">
      <section class="dkd_anyela_login_mobile_shell" id="dkd_anyela_login_root">
        <img
          class="dkd_anyela_login_mockup"
          src="../assets/dkd_anyela_login_9928_20260530.png"
          alt="Anyela Born Club mobil Login tasarımı"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_login_start_hotspot" href="../Home/" aria-label="Hemen Başla ve Home sayfasına git"></a>

        <section class="dkd_anyela_login_panel" aria-label="Giriş yap ve kayıt ol paneli">
          <div class="dkd_anyela_login_tabs" role="tablist" aria-label="Hesap işlemleri">
            <button class="dkd_anyela_login_tab dkd_anyela_login_tab_active" id="dkd_anyela_login_signin_tab" type="button" aria-selected="true">Giriş Yap</button>
            <button class="dkd_anyela_login_tab" id="dkd_anyela_login_signup_tab" type="button" aria-selected="false">Kayıt Ol</button>
          </div>

          <h1 class="dkd_anyela_login_title" id="dkd_anyela_login_title">Anyela Club’a Giriş</h1>
          <p class="dkd_anyela_login_subtitle" id="dkd_anyela_login_subtitle">Özel sohbet, paketler ve içerikler için hesabına giriş yap.</p>

          <form class="dkd_anyela_login_form" action="../Home/" method="get">
            <input class="dkd_anyela_login_input" id="dkd_anyela_login_name" name="dkd_anyela_login_name" type="text" autocomplete="username" placeholder="E-posta veya kullanıcı adı" aria-label="E-posta veya kullanıcı adı" />
            <input class="dkd_anyela_login_input" id="dkd_anyela_login_password" name="dkd_anyela_login_password" type="password" autocomplete="current-password" placeholder="Şifre" aria-label="Şifre" />
            <input class="dkd_anyela_login_input" id="dkd_anyela_login_phone" name="dkd_anyela_login_phone" type="tel" autocomplete="tel" placeholder="Telefon numarası" aria-label="Telefon numarası" hidden />

            <div class="dkd_anyela_login_row">
              <label class="dkd_anyela_login_check">
                <input type="checkbox" checked />
                Beni hatırla
              </label>
              <a class="dkd_anyela_login_forgot" href="./">Şifremi unuttum</a>
            </div>

            <a class="dkd_anyela_login_guest_button" href="../Home/" aria-label="Misafir olarak Home sayfasına devam et">Misafir Girişi</a>
            <button class="dkd_anyela_login_submit" id="dkd_anyela_login_submit" type="submit">Giriş Yap</button>
          </form>
        </section>

        <nav class="dkd_anyela_login_nav" aria-label="Alt menü">
          <a class="dkd_anyela_login_nav_home" href="../Home/" aria-label="Ana Sayfa"></a>
          <a class="dkd_anyela_login_nav_packages" href="../Packages/" aria-label="Paketler"></a>
          <a class="dkd_anyela_login_nav_chat" href="./" aria-label="Chat"></a>
          <a class="dkd_anyela_login_nav_orders" href="./" aria-label="Siparişler"></a>
          <a class="dkd_anyela_login_nav_profile" href="./" aria-label="Profil"></a>
        </nav>

        <section class="dkd_anyela_login_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club Login</h1>
          <p>Bu sayfada giriş yapabilir, kayıt olabilir veya misafir girişiyle Home sayfasına geçebilirsin.</p>
        </section>
      </section>
    </main>

    <script>
      (function dkdAnyelaLoginPanelScope() {
        "use strict";

        const dkdAnyelaLoginSigninTab = document.getElementById("dkd_anyela_login_signin_tab");
        const dkdAnyelaLoginSignupTab = document.getElementById("dkd_anyela_login_signup_tab");
        const dkdAnyelaLoginTitle = document.getElementById("dkd_anyela_login_title");
        const dkdAnyelaLoginSubtitle = document.getElementById("dkd_anyela_login_subtitle");
        const dkdAnyelaLoginName = document.getElementById("dkd_anyela_login_name");
        const dkdAnyelaLoginPassword = document.getElementById("dkd_anyela_login_password");
        const dkdAnyelaLoginPhone = document.getElementById("dkd_anyela_login_phone");
        const dkdAnyelaLoginSubmit = document.getElementById("dkd_anyela_login_submit");

        function dkdAnyelaLoginSetMode(dkdAnyelaLoginMode) {
          const dkdAnyelaLoginIsSignup = dkdAnyelaLoginMode === "signup";

          dkdAnyelaLoginSigninTab.classList.toggle("dkd_anyela_login_tab_active", !dkdAnyelaLoginIsSignup);
          dkdAnyelaLoginSignupTab.classList.toggle("dkd_anyela_login_tab_active", dkdAnyelaLoginIsSignup);
          dkdAnyelaLoginSigninTab.setAttribute("aria-selected", String(!dkdAnyelaLoginIsSignup));
          dkdAnyelaLoginSignupTab.setAttribute("aria-selected", String(dkdAnyelaLoginIsSignup));

          dkdAnyelaLoginTitle.textContent = dkdAnyelaLoginIsSignup ? "Kayıt Ol" : "Anyela Club’a Giriş";
          dkdAnyelaLoginSubtitle.textContent = dkdAnyelaLoginIsSignup
            ? "Yeni hesabını oluştur, paketleri ve özel içerikleri keşfet."
            : "Özel sohbet, paketler ve içerikler için hesabına giriş yap.";
          dkdAnyelaLoginName.placeholder = dkdAnyelaLoginIsSignup ? "Ad Soyad veya kullanıcı adı" : "E-posta veya kullanıcı adı";
          dkdAnyelaLoginPassword.placeholder = dkdAnyelaLoginIsSignup ? "Şifre oluştur" : "Şifre";
          dkdAnyelaLoginPassword.setAttribute("autocomplete", dkdAnyelaLoginIsSignup ? "new-password" : "current-password");
          dkdAnyelaLoginPhone.hidden = !dkdAnyelaLoginIsSignup;
          dkdAnyelaLoginSubmit.textContent = dkdAnyelaLoginIsSignup ? "Kayıt Ol" : "Giriş Yap";
        }

        dkdAnyelaLoginSigninTab.addEventListener("click", function dkdAnyelaLoginOpenSignin() {
          dkdAnyelaLoginSetMode("signin");
        });

        dkdAnyelaLoginSignupTab.addEventListener("click", function dkdAnyelaLoginOpenSignup() {
          dkdAnyelaLoginSetMode("signup");
        });
      })();
    </script>
  </body>
</html>
