<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05002b" />
    <meta name="description" content="Anyela Born Club Login — Supabase Auth bağlantılı Miami neon giriş ekranı." />
    <meta property="og:title" content="Anyela Born Club Login" />
    <meta property="og:description" content="Anyela Born Club giriş ekranı. Giriş yap, kayıt ol veya paketleri incele." />
    <meta property="og:image" content="./assets/dkd_anyela_login_9935_20260529.png" />
    <title>Anyela Born Club Login</title>
    <style>
      :root {
        --dkd_anyela_login_bg: #05002b;
        --dkd_anyela_login_shadow: 0 28px 90px rgba(0, 0, 0, 0.54);
        --dkd_anyela_login_pink: #ff2ec7;
        --dkd_anyela_login_cyan: #19f6ff;
        --dkd_anyela_login_gold: #ffcf58;
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html, body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 35, 188, 0.24), transparent 24rem),
          radial-gradient(circle at 88% 10%, rgba(24, 247, 255, 0.18), transparent 25rem),
          linear-gradient(180deg, #090044 0%, var(--dkd_anyela_login_bg) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button, input { font: inherit; }
      button, a, input { -webkit-tap-highlight-color: transparent; }

      .dkd_anyela_login_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_login_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #05002b;
        box-shadow: var(--dkd_anyela_login_shadow);
      }

      .dkd_anyela_login_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_login_input {
        position: absolute;
        z-index: 20;
        left: 29.45%;
        width: 48.5%;
        height: 3.40%;
        appearance: none;
        -webkit-appearance: none;
        border: 0 !important;
        outline: 0 !important;
        border-radius: 0;
        background: transparent !important;
        color: #ffffff;
        caret-color: var(--dkd_anyela_login_cyan);
        font-size: clamp(16px, 4.15vw, 22px);
        font-weight: 800;
        letter-spacing: 0.01em;
        padding: 0;
        text-shadow: 0 0 10px rgba(25, 246, 255, 0.45);
        box-shadow: none !important;
        filter: none !important;
      }

      .dkd_anyela_login_input::placeholder { color: transparent; }
      .dkd_anyela_login_input:focus,
      .dkd_anyela_login_input:focus-visible,
      .dkd_anyela_login_input:active,
      .dkd_anyela_login_input:hover {
        border: 0 !important;
        outline: 0 !important;
        background: transparent !important;
        box-shadow: none !important;
        filter: none !important;
      }

      .dkd_anyela_login_input:-webkit-autofill,
      .dkd_anyela_login_input:-webkit-autofill:hover,
      .dkd_anyela_login_input:-webkit-autofill:focus,
      .dkd_anyela_login_input:-webkit-autofill:active {
        -webkit-text-fill-color: #ffffff !important;
        caret-color: var(--dkd_anyela_login_cyan) !important;
        box-shadow: 0 0 0 1000px transparent inset !important;
        -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
        transition: background-color 999999s ease-in-out 0s;
      }

      .dkd_anyela_login_email { top: 64.88%; }
      .dkd_anyela_login_password { top: 71.61%; }

      .dkd_anyela_login_package_link,
      .dkd_anyela_login_tap_button {
        position: absolute;
        display: block;
        border: 0;
        outline: 0;
        background: transparent;
        cursor: pointer;
        border-radius: 999px;
        text-decoration: none;
      }

      .dkd_anyela_login_package_link {
        z-index: 26;
        left: 3.6%;
        top: 38.4%;
        width: 44.8%;
        height: 5.9%;
      }

      .dkd_anyela_login_tap_button { z-index: 24; }
      .dkd_anyela_login_package_link:focus-visible,
      .dkd_anyela_login_tap_button:focus-visible {
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.92),
          0 0 0 8px rgba(255, 46, 199, 0.72),
          0 0 32px rgba(25, 246, 255, 0.72);
      }

      .dkd_anyela_login_submit { left: 22.1%; top: 78.82%; width: 58.0%; height: 5.45%; }
      .dkd_anyela_login_register { left: 22.2%; top: 86.45%; width: 58.0%; height: 4.65%; }
      .dkd_anyela_login_guest { left: 22.2%; top: 92.10%; width: 58.0%; height: 4.65%; }

      .dkd_anyela_login_popup_backdrop {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background:
          radial-gradient(circle at 20% 18%, rgba(25, 246, 255, 0.18), transparent 28rem),
          radial-gradient(circle at 80% 12%, rgba(255, 46, 199, 0.22), transparent 24rem),
          rgba(4, 0, 29, 0.72);
        backdrop-filter: blur(12px);
      }

      .dkd_anyela_login_popup_backdrop[data-dkd-anyela-popup-open="true"] { display: flex; }

      .dkd_anyela_login_popup {
        width: min(92vw, 410px);
        border: 1.5px solid rgba(255, 255, 255, 0.28);
        border-radius: 30px;
        padding: 20px;
        background:
          radial-gradient(circle at 12% 0%, rgba(25, 246, 255, 0.28), transparent 30%),
          radial-gradient(circle at 88% 0%, rgba(255, 46, 199, 0.34), transparent 30%),
          linear-gradient(180deg, rgba(27, 4, 85, 0.96), rgba(4, 0, 28, 0.97));
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.56),
          0 0 44px rgba(255, 46, 199, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        color: #ffffff;
      }

      .dkd_anyela_login_popup_title {
        margin: 0 0 6px;
        text-align: center;
        font-size: clamp(24px, 7vw, 34px);
        line-height: 1.08;
        font-weight: 950;
        text-shadow:
          0 0 18px rgba(255, 46, 199, 0.7),
          0 0 24px rgba(25, 246, 255, 0.36);
      }

      .dkd_anyela_login_popup_subtitle {
        margin: 0 0 18px;
        color: rgba(255, 255, 255, 0.76);
        text-align: center;
        font-size: 14px;
        line-height: 1.45;
      }

      .dkd_anyela_login_popup_grid { display: grid; gap: 11px; }

      .dkd_anyela_login_popup_action {
        min-height: 56px;
        border: 1.2px solid rgba(255, 255, 255, 0.28);
        border-radius: 18px;
        color: #ffffff;
        background:
          linear-gradient(105deg, rgba(25, 246, 255, 0.28), rgba(255, 46, 199, 0.36), rgba(255, 207, 88, 0.18));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.20),
          0 10px 24px rgba(255, 46, 199, 0.18);
        cursor: pointer;
        font-size: 17px;
        font-weight: 900;
      }

      .dkd_anyela_login_popup_action[disabled] {
        cursor: wait;
        opacity: 0.72;
      }

      .dkd_anyela_login_popup_guest {
        border-color: rgba(25, 246, 255, 0.72);
        background:
          linear-gradient(105deg, #08d8ff, #6b52ff 34%, #ff2ec7 72%, #ffcf58);
        box-shadow:
          0 0 26px rgba(25, 246, 255, 0.36),
          0 0 26px rgba(255, 46, 199, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .dkd_anyela_login_popup_note {
        min-height: 20px;
        margin: 12px 4px 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        text-align: center;
        line-height: 1.45;
      }

      .dkd_anyela_login_popup_note[data-dkd-anyela-status="success"] { color: #8efff7; }
      .dkd_anyela_login_popup_note[data-dkd-anyela-status="error"] { color: #ffb1df; }

      .dkd_anyela_login_popup_close {
        width: 100%;
        min-height: 42px;
        margin-top: 12px;
        border: 0;
        border-radius: 16px;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(255, 255, 255, 0.09);
        cursor: pointer;
        font-weight: 800;
      }

      .dkd_anyela_login_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @media (min-width: 820px) {
        .dkd_anyela_login_page { align-items: center; padding: 32px 0; }
        .dkd_anyela_login_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.16);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.58),
            0 0 90px rgba(255, 35, 188, 0.25),
            0 0 120px rgba(24, 247, 255, 0.18);
        }
        .dkd_anyela_login_mockup { min-height: auto; }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_login_page" aria-label="Anyela Born Club Login sayfası">
      <section class="dkd_anyela_login_mobile_shell" id="dkd_anyela_login_root">
        <img
          class="dkd_anyela_login_mockup"
          src="./assets/dkd_anyela_login_9935_20260529.png"
          alt="Anyela Born Club Miami neon login sayfası"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_login_package_link" href="../Packages/" aria-label="Paketleri İncele"></a>

        <form class="dkd_anyela_login_form" autocomplete="on">
          <label class="dkd_anyela_login_screen_reader" for="dkd_anyela_login_email">Email</label>
          <input
            class="dkd_anyela_login_input dkd_anyela_login_email"
            id="dkd_anyela_login_email"
            name="dkd_anyela_email"
            type="email"
            inputmode="email"
            autocomplete="email"
            aria-label="Email"
            autofocus
          />

          <label class="dkd_anyela_login_screen_reader" for="dkd_anyela_login_password">Şifre</label>
          <input
            class="dkd_anyela_login_input dkd_anyela_login_password"
            id="dkd_anyela_login_password"
            name="dkd_anyela_password"
            type="password"
            autocomplete="current-password"
            aria-label="Şifre"
          />

          <button class="dkd_anyela_login_tap_button dkd_anyela_login_submit" type="button" data-dkd-anyela-login-action="login" aria-label="Giriş Yap"></button>
          <button class="dkd_anyela_login_tap_button dkd_anyela_login_register" type="button" data-dkd-anyela-login-action="register" aria-label="Kayıt Ol"></button>
          <button class="dkd_anyela_login_tap_button dkd_anyela_login_guest" type="button" data-dkd-anyela-login-action="guest" aria-label="Misafir Girişi"></button>
        </form>

        <section class="dkd_anyela_login_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club Login</h1>
          <p>Email ve şifre alanları Supabase Auth ile çalışır. Paketleri İncele butonu Packages sayfasına gider.</p>
        </section>
      </section>
    </main>

    <div class="dkd_anyela_login_popup_backdrop" id="dkd_anyela_login_popup" aria-hidden="true">
      <section class="dkd_anyela_login_popup" role="dialog" aria-modal="true" aria-labelledby="dkd_anyela_login_popup_title">
        <h2 class="dkd_anyela_login_popup_title" id="dkd_anyela_login_popup_title">Miami Giriş Seçimi</h2>
        <p class="dkd_anyela_login_popup_subtitle">Email ve şifreni yaz; giriş yap, kayıt ol veya misafir olarak devam et.</p>

        <div class="dkd_anyela_login_popup_grid">
          <button class="dkd_anyela_login_popup_action" type="button" data-dkd-anyela-popup-choice="login">Giriş Yap</button>
          <button class="dkd_anyela_login_popup_action" type="button" data-dkd-anyela-popup-choice="register">Kayıt Ol</button>
          <button class="dkd_anyela_login_popup_action dkd_anyela_login_popup_guest" type="button" data-dkd-anyela-popup-choice="guest">Misafir Girişi</button>
        </div>

        <p class="dkd_anyela_login_popup_note" id="dkd_anyela_login_popup_note"></p>
        <button class="dkd_anyela_login_popup_close" id="dkd_anyela_login_popup_close" type="button">Kapat</button>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function dkdAnyelaLoginScope() {
        "use strict";

        const dkdAnyelaSupabaseUrl = "https://ztxlcfcwuwerxrhwfmte.supabase.co";
        const dkdAnyelaSupabasePublishableKey = "sb_publishable_GSd5xFBwG9pioOY8N6MRQw_C2n7RLYa";
        const dkdAnyelaPackagesRoute = "../Packages/";
        const dkdAnyelaLoginPopup = document.getElementById("dkd_anyela_login_popup");
        const dkdAnyelaLoginPopupNote = document.getElementById("dkd_anyela_login_popup_note");
        const dkdAnyelaLoginPopupClose = document.getElementById("dkd_anyela_login_popup_close");
        const dkdAnyelaLoginButtons = Array.from(document.querySelectorAll("[data-dkd-anyela-login-action]"));
        const dkdAnyelaLoginChoices = Array.from(document.querySelectorAll("[data-dkd-anyela-popup-choice]"));
        const dkdAnyelaLoginEmail = document.getElementById("dkd_anyela_login_email");
        const dkdAnyelaLoginPassword = document.getElementById("dkd_anyela_login_password");
        const dkdAnyelaSupabaseClient = window.supabase && window.supabase.createClient
          ? window.supabase.createClient(dkdAnyelaSupabaseUrl, dkdAnyelaSupabasePublishableKey, {
              auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true,
                storageKey: "dkd_anyela_auth_session"
              }
            })
          : null;

        function dkdAnyelaLoginSetBusy(dkdAnyelaIsBusy) {
          dkdAnyelaLoginChoices.forEach(function dkdAnyelaLoginChoiceButton() {
            arguments[0].disabled = dkdAnyelaIsBusy;
          });
        }

        function dkdAnyelaLoginSetNote(dkdAnyelaMessage, dkdAnyelaStatus) {
          if (!dkdAnyelaLoginPopupNote) {
            return;
          }

          dkdAnyelaLoginPopupNote.textContent = dkdAnyelaMessage || "";
          if (dkdAnyelaStatus) {
            dkdAnyelaLoginPopupNote.setAttribute("data-dkd-anyela-status", dkdAnyelaStatus);
          } else {
            dkdAnyelaLoginPopupNote.removeAttribute("data-dkd-anyela-status");
          }
        }

        function dkdAnyelaLoginFocusEmail() {
          if (!dkdAnyelaLoginEmail) {
            return;
          }

          window.setTimeout(function dkdAnyelaLoginDelayedFocus() {
            dkdAnyelaLoginEmail.focus({ preventScroll: true });
            dkdAnyelaLoginEmail.select();
          }, 120);
        }

        function dkdAnyelaLoginOpenPopup(dkdAnyelaLoginEvent) {
          dkdAnyelaLoginEvent.preventDefault();
          dkdAnyelaLoginEvent.stopPropagation();

          if (!dkdAnyelaLoginPopup) {
            return;
          }

          dkdAnyelaLoginPopup.setAttribute("data-dkd-anyela-popup-open", "true");
          dkdAnyelaLoginPopup.setAttribute("aria-hidden", "false");
          dkdAnyelaLoginSetNote("Email ve şifreni yazdıysan seçim yapabilirsin.", "success");
        }

        function dkdAnyelaLoginClosePopup() {
          if (!dkdAnyelaLoginPopup) {
            return;
          }

          dkdAnyelaLoginPopup.removeAttribute("data-dkd-anyela-popup-open");
          dkdAnyelaLoginPopup.setAttribute("aria-hidden", "true");
        }

        function dkdAnyelaLoginValidateFields() {
          const dkdAnyelaEmailValue = (dkdAnyelaLoginEmail && dkdAnyelaLoginEmail.value ? dkdAnyelaLoginEmail.value : "").trim();
          const dkdAnyelaPasswordValue = dkdAnyelaLoginPassword && dkdAnyelaLoginPassword.value ? dkdAnyelaLoginPassword.value : "";

          if (!dkdAnyelaEmailValue || !dkdAnyelaEmailValue.includes("@")) {
            dkdAnyelaLoginSetNote("Geçerli bir email adresi yazmalısın.", "error");
            if (dkdAnyelaLoginEmail) {
              dkdAnyelaLoginEmail.focus({ preventScroll: true });
            }
            return null;
          }

          if (!dkdAnyelaPasswordValue || dkdAnyelaPasswordValue.length < 6) {
            dkdAnyelaLoginSetNote("Şifre en az 6 karakter olmalı.", "error");
            if (dkdAnyelaLoginPassword) {
              dkdAnyelaLoginPassword.focus({ preventScroll: true });
            }
            return null;
          }

          return { dkd_email: dkdAnyelaEmailValue, dkd_password: dkdAnyelaPasswordValue };
        }

        async function dkdAnyelaLoginSignIn() {
          if (!dkdAnyelaSupabaseClient) {
            dkdAnyelaLoginSetNote("Supabase bağlantısı yüklenemedi. Sayfayı yenileyip tekrar dene.", "error");
            return;
          }

          const dkdAnyelaCredentials = dkdAnyelaLoginValidateFields();
          if (!dkdAnyelaCredentials) {
            return;
          }

          dkdAnyelaLoginSetBusy(true);
          dkdAnyelaLoginSetNote("Giriş kontrol ediliyor...", "success");

          const dkdAnyelaSignInResult = await dkdAnyelaSupabaseClient.auth.signInWithPassword({
            email: dkdAnyelaCredentials.dkd_email,
            password: dkdAnyelaCredentials.dkd_password
          });

          dkdAnyelaLoginSetBusy(false);

          if (dkdAnyelaSignInResult.error) {
            dkdAnyelaLoginSetNote("Giriş başarısız: " + dkdAnyelaSignInResult.error.message, "error");
            return;
          }

          dkdAnyelaLoginSetNote("Giriş başarılı. Paketler sayfasına yönlendiriliyorsun...", "success");
          window.setTimeout(function dkdAnyelaLoginRedirectAfterSignIn() {
            window.location.href = dkdAnyelaPackagesRoute;
          }, 650);
        }

        async function dkdAnyelaLoginSignUp() {
          if (!dkdAnyelaSupabaseClient) {
            dkdAnyelaLoginSetNote("Supabase bağlantısı yüklenemedi. Sayfayı yenileyip tekrar dene.", "error");
            return;
          }

          const dkdAnyelaCredentials = dkdAnyelaLoginValidateFields();
          if (!dkdAnyelaCredentials) {
            return;
          }

          dkdAnyelaLoginSetBusy(true);
          dkdAnyelaLoginSetNote("Kayıt oluşturuluyor...", "success");

          const dkdAnyelaSignUpResult = await dkdAnyelaSupabaseClient.auth.signUp({
            email: dkdAnyelaCredentials.dkd_email,
            password: dkdAnyelaCredentials.dkd_password,
            options: {
              data: {
                dkd_display_name: dkdAnyelaCredentials.dkd_email.split("@")[0],
                dkd_source: "anyelaborn_login"
              }
            }
          });

          dkdAnyelaLoginSetBusy(false);

          if (dkdAnyelaSignUpResult.error) {
            dkdAnyelaLoginSetNote("Kayıt başarısız: " + dkdAnyelaSignUpResult.error.message, "error");
            return;
          }

          if (dkdAnyelaSignUpResult.data && dkdAnyelaSignUpResult.data.session) {
            dkdAnyelaLoginSetNote("Kayıt tamamlandı. Paketler sayfasına yönlendiriliyorsun...", "success");
            window.setTimeout(function dkdAnyelaLoginRedirectAfterSignUp() {
              window.location.href = dkdAnyelaPackagesRoute;
            }, 650);
            return;
          }

          dkdAnyelaLoginSetNote("Kayıt alındı. Supabase email onayı açıksa mail kutunu kontrol etmelisin.", "success");
        }

        async function dkdAnyelaLoginHandleChoice(dkdAnyelaLoginEvent) {
          const dkdAnyelaLoginChoice = dkdAnyelaLoginEvent.currentTarget.getAttribute("data-dkd-anyela-popup-choice");

          if (dkdAnyelaLoginChoice === "guest") {
            window.location.href = dkdAnyelaPackagesRoute;
            return;
          }

          if (dkdAnyelaLoginChoice === "login") {
            await dkdAnyelaLoginSignIn();
            return;
          }

          if (dkdAnyelaLoginChoice === "register") {
            await dkdAnyelaLoginSignUp();
          }
        }

        dkdAnyelaLoginButtons.forEach(function dkdAnyelaLoginBindButton(dkdAnyelaLoginButton) {
          dkdAnyelaLoginButton.addEventListener("click", dkdAnyelaLoginOpenPopup);
        });

        dkdAnyelaLoginChoices.forEach(function dkdAnyelaLoginBindChoice(dkdAnyelaLoginChoiceButton) {
          dkdAnyelaLoginChoiceButton.addEventListener("click", dkdAnyelaLoginHandleChoice);
        });

        if (dkdAnyelaLoginPopupClose) {
          dkdAnyelaLoginPopupClose.addEventListener("click", dkdAnyelaLoginClosePopup);
        }

        if (dkdAnyelaLoginPopup) {
          dkdAnyelaLoginPopup.addEventListener("click", function dkdAnyelaLoginBackdropClose(dkdAnyelaLoginEvent) {
            if (dkdAnyelaLoginEvent.target === dkdAnyelaLoginPopup) {
              dkdAnyelaLoginClosePopup();
            }
          });
        }

        document.addEventListener("keydown", function dkdAnyelaLoginEscapeClose(dkdAnyelaLoginEvent) {
          if (dkdAnyelaLoginEvent.key === "Escape") {
            dkdAnyelaLoginClosePopup();
          }
        });

        window.addEventListener("load", dkdAnyelaLoginFocusEmail);
        dkdAnyelaLoginFocusEmail();
      })();
    </script>
  </body>
</html>
