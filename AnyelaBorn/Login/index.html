<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fbff" />
    <meta name="description" content="Anyela Born Club Login sayfası. Görsel kalitesi korunarak yeni mobil giriş tasarımı kullanıldı." />
    <meta property="og:title" content="Anyela Born Club Login" />
    <meta property="og:description" content="Anyela Born Club giriş ekranı. Hemen Başla alanına dokunarak Home sayfasına geç." />
    <meta property="og:image" content="../assets/dkd_anyela_login_9928_20260530.png" />
    <title>Anyela Born Club Login</title>
    <style>
      :root {
        --dkd_anyela_login_bg: #f7fbff;
        --dkd_anyela_login_shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 15% 0%, rgba(255, 86, 176, 0.20), transparent 24rem),
          radial-gradient(circle at 90% 10%, rgba(0, 205, 220, 0.20), transparent 26rem),
          linear-gradient(180deg, #ecfbff 0%, #fff4fb 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        -webkit-tap-highlight-color: transparent;
      }

      .dkd_anyela_login_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_login_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #f7fbff;
        box-shadow: var(--dkd_anyela_login_shadow);
      }

      .dkd_anyela_login_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_login_full_link {
        position: absolute;
        inset: 0;
        z-index: 35;
        display: block;
        cursor: pointer;
        outline: none;
        text-decoration: none;
      }

      .dkd_anyela_login_hotspot {
        position: absolute;
        display: block;
        z-index: 80;
        border-radius: 999px;
        text-decoration: none;
        outline: none;
      }

      .dkd_anyela_login_full_link:focus-visible,
      .dkd_anyela_login_hotspot:focus-visible {
        box-shadow:
          0 0 0 4px rgba(255, 255, 255, 0.94),
          0 0 0 9px rgba(255, 65, 170, 0.72),
          0 0 34px rgba(0, 205, 220, 0.72);
      }

      .dkd_anyela_login_start_hotspot {
        left: 4.5%;
        top: 36.6%;
        width: 44.5%;
        height: 8.2%;
      }

      .dkd_anyela_login_nav_home {
        left: 6.0%;
        bottom: 1.2%;
        width: 13.5%;
        height: 5.2%;
      }

      .dkd_anyela_login_nav_packages {
        left: 25.6%;
        bottom: 1.2%;
        width: 14.0%;
        height: 5.2%;
      }

      .dkd_anyela_login_nav_chat {
        left: 45.4%;
        bottom: 1.2%;
        width: 13.8%;
        height: 5.2%;
      }

      .dkd_anyela_login_nav_orders {
        left: 64.2%;
        bottom: 1.2%;
        width: 14.5%;
        height: 5.2%;
      }

      .dkd_anyela_login_nav_profile {
        left: 83.0%;
        bottom: 1.2%;
        width: 14.0%;
        height: 5.2%;
      }

      .dkd_anyela_login_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @media (min-width: 820px) {
        .dkd_anyela_login_page {
          align-items: center;
          padding: 32px 0;
        }

        .dkd_anyela_login_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.60);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.30),
            0 0 90px rgba(255, 65, 170, 0.18),
            0 0 120px rgba(0, 205, 220, 0.14);
        }

        .dkd_anyela_login_mockup {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_login_page" aria-label="Anyela Born Club Login sayfası">
      <section class="dkd_anyela_login_mobile_shell" id="dkd_anyela_login_root">
        <img
          class="dkd_anyela_login_mockup"
          src="../assets/dkd_anyela_login_9928_20260530.png"
          alt="Anyela Born Club mobil Login tasarımı"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_login_full_link" href="../Home/" aria-label="Anyela Born Home sayfasına git"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_start_hotspot" href="../Home/" aria-label="Hemen Başla ve Home sayfasına git"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_nav_home" href="../Home/" aria-label="Ana Sayfa"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_nav_packages" href="../Packages/" aria-label="Paketler"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_nav_chat" href="./" aria-label="Chat"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_nav_orders" href="./" aria-label="Siparişler"></a>
        <a class="dkd_anyela_login_hotspot dkd_anyela_login_nav_profile" href="./" aria-label="Profil"></a>

        <section class="dkd_anyela_login_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club Login</h1>
          <p>Bu sayfada Hemen Başla alanına dokununca Home sayfası açılır.</p>
        </section>
      </section>
    </main>
  </body>
</html>
