<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07103a" />
    <meta name="description" content="Anyela Born Club premium giriş ve üyelik ekranı." />
    <title>Anyela Born Club | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="preload" href="./assets/dkd_anyela_miami_stage.jpg" as="image" />
    <link rel="preload" href="./assets/dkd_anyela_cutout.png" as="image" />
    <link rel="stylesheet" href="./dkd_anyela_miami_login.css" />
  </head>
  <body>
    <main class="dkd_anyela_page" aria-label="Anyela Born Club giriş sayfası">
      <section class="dkd_anyela_phone_shell" aria-label="Anyela Born Club Miami temalı mobil login ekranı">
        <section class="dkd_anyela_hero" aria-label="Anyela Born Club karşılama alanı">
          <img class="dkd_anyela_character" src="./assets/dkd_anyela_cutout.png" alt="Anyela Born" />
        </section>

        <section class="dkd_anyela_login_card" aria-label="Giriş ve üye ol formu">
          <div class="dkd_anyela_tabs" role="tablist" aria-label="Giriş seçenekleri">
            <button class="dkd_anyela_tab dkd_anyela_tab_active" id="dkd_anyela_login_tab" type="button" role="tab" aria-selected="true" data-dkd-mode="login">
              <span class="dkd_anyela_icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 12.2a4.1 4.1 0 1 0 0-8.2 4.1 4.1 0 0 0 0 8.2Z"/><path d="M4.7 21a7.3 7.3 0 0 1 14.6 0"/></svg>
              </span>
              <span>GİRİŞ YAP</span>
            </button>
            <button class="dkd_anyela_tab" id="dkd_anyela_join_tab" type="button" role="tab" aria-selected="false" data-dkd-mode="join">
              <span class="dkd_anyela_icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M10.8 11.4a3.8 3.8 0 1 0 0-7.6 3.8 3.8 0 0 0 0 7.6Z"/><path d="M3.9 20.6a6.9 6.9 0 0 1 13.8 0"/><path d="M18.6 7.6v5.2"/><path d="M16 10.2h5.2"/></svg>
              </span>
              <span>ÜYE OL</span>
            </button>
          </div>

          <form class="dkd_anyela_form" id="dkd_anyela_login_form">
            <label class="dkd_anyela_field" for="dkd_anyela_identity_input">
              <span class="dkd_anyela_field_icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 12.2a4.1 4.1 0 1 0 0-8.2 4.1 4.1 0 0 0 0 8.2Z"/><path d="M4.7 21a7.3 7.3 0 0 1 14.6 0"/></svg>
              </span>
              <input id="dkd_anyela_identity_input" name="dkd_anyela_identity" type="text" autocomplete="username" placeholder="E-posta veya kullanıcı adı" />
            </label>

            <label class="dkd_anyela_field" for="dkd_anyela_password_input">
              <span class="dkd_anyela_field_icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M6.8 10.8h10.4v8.8H6.8z"/><path d="M8.9 10.8V8a3.1 3.1 0 0 1 6.2 0v2.8"/></svg>
              </span>
              <input id="dkd_anyela_password_input" name="dkd_anyela_password" type="password" autocomplete="current-password" placeholder="Şifre" />
              <button class="dkd_anyela_eye_button" id="dkd_anyela_password_toggle" type="button" aria-label="Şifreyi göster veya gizle">
                <svg viewBox="0 0 24 24"><path d="M2.8 12s3.5-6 9.2-6 9.2 6 9.2 6-3.5 6-9.2 6-9.2-6-9.2-6Z"/><path d="M12 15.1a3.1 3.1 0 1 0 0-6.2 3.1 3.1 0 0 0 0 6.2Z"/></svg>
              </button>
            </label>

            <div class="dkd_anyela_form_row">
              <label class="dkd_anyela_remember">
                <input id="dkd_anyela_remember_input" type="checkbox" checked />
                <span class="dkd_anyela_checkmark" aria-hidden="true">✓</span>
                <span>Beni Hatırla</span>
              </label>
              <button class="dkd_anyela_forgot" type="button">Şifremi Unuttum?</button>
            </div>

            <button class="dkd_anyela_primary_button" id="dkd_anyela_primary_submit" type="submit">
              <span>GİRİŞ YAP</span>
              <span class="dkd_anyela_button_arrow" aria-hidden="true">›</span>
            </button>
          </form>

          <div class="dkd_anyela_separator" aria-hidden="true">
            <span></span>
            <p>Veya şununla devam et</p>
            <span></span>
          </div>

          <div class="dkd_anyela_social_grid" aria-label="Sosyal giriş seçenekleri">
            <button class="dkd_anyela_social_button" type="button" data-dkd-provider="Google">
              <span class="dkd_anyela_social_icon dkd_anyela_google_icon" aria-hidden="true">
                <svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-2.8-.4-4.1H24v7.8h12.1c-.2 2-1.6 5.1-4.6 7.2l-.1.5 6.6 5.1.5.1c4.4-4.1 6.6-10.1 6.6-16.6Z"/><path fill="#34A853" d="M24 46c6 0 11-2 14.6-5.4l-7-5.4c-1.9 1.3-4.4 2.2-7.6 2.2-5.8 0-10.7-3.8-12.5-9.1l-.5.1-6.9 5.3-.1.5C7.7 41.2 15.3 46 24 46Z"/><path fill="#FBBC05" d="M11.5 28.3A13.6 13.6 0 0 1 10.8 24c0-1.5.3-3 .7-4.3l-.1-.6-7-5.4-.4.2A22 22 0 0 0 2 24c0 3.6.9 7.1 2.5 10.1l7-5.8Z"/><path fill="#EA4335" d="M24 10.6c4.2 0 7 1.8 8.6 3.3l6.3-6.2C35 4.1 30 2 24 2 15.3 2 7.7 6.8 4 13.9l7.5 5.8c1.8-5.3 6.7-9.1 12.5-9.1Z"/></svg>
              </span>
              <span>Google</span>
            </button>
            <button class="dkd_anyela_social_button" type="button" data-dkd-provider="Apple">
              <span class="dkd_anyela_social_icon dkd_anyela_apple_icon" aria-hidden="true">
                <svg viewBox="0 0 48 48"><path fill="currentColor" d="M32.4 25.4c0-5.1 4.2-7.5 4.4-7.6-2.4-3.5-6.1-4-7.4-4-3.1-.3-6.1 1.8-7.7 1.8-1.6 0-4-1.8-6.6-1.7-3.4.1-6.6 2-8.3 5.1-3.6 6.2-.9 15.3 2.5 20.3 1.7 2.5 3.8 5.3 6.5 5.2 2.6-.1 3.6-1.7 6.7-1.7 3.1 0 4 1.7 6.8 1.6 2.8-.1 4.6-2.5 6.3-5 1.9-2.9 2.8-5.6 2.8-5.8-.1 0-5.9-2.2-6-8.2ZM27.4 10.5c1.4-1.7 2.4-4.1 2.1-6.5-2 .1-4.5 1.4-5.9 3.1-1.3 1.5-2.5 4-2.2 6.3 2.3.2 4.6-1.1 6-2.9Z"/></svg>
              </span>
              <span>Apple</span>
            </button>
            <button class="dkd_anyela_social_button" type="button" data-dkd-provider="Instagram">
              <span class="dkd_anyela_social_icon dkd_anyela_instagram_icon" aria-hidden="true">
                <svg viewBox="0 0 48 48"><defs><linearGradient id="dkd_anyela_ig_gradient" x1="6" x2="42" y1="42" y2="6"><stop offset="0" stop-color="#ffca45"/><stop offset="0.32" stop-color="#ff2b8f"/><stop offset="0.68" stop-color="#b136ff"/><stop offset="1" stop-color="#4169ff"/></linearGradient></defs><rect x="6" y="6" width="36" height="36" rx="11" fill="url(#dkd_anyela_ig_gradient)"/><path fill="#fff" d="M24 16.7A7.3 7.3 0 1 0 24 31.3 7.3 7.3 0 0 0 24 16.7Zm0 11.8A4.5 4.5 0 1 1 24 19.5 4.5 4.5 0 0 1 24 28.5Zm9.5-12.1a1.9 1.9 0 1 1-3.8 0 1.9 1.9 0 0 1 3.8 0Z"/></svg>
              </span>
              <span>Instagram</span>
            </button>
          </div>

          <button class="dkd_anyela_join_big" id="dkd_anyela_join_big" type="button">
            <span>ÜYE OL</span>
            <span class="dkd_anyela_icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M10.8 11.4a3.8 3.8 0 1 0 0-7.6 3.8 3.8 0 0 0 0 7.6Z"/><path d="M3.9 20.6a6.9 6.9 0 0 1 13.8 0"/><path d="M18.6 7.6v5.2"/><path d="M16 10.2h5.2"/></svg>
            </span>
          </button>

          <aside class="dkd_anyela_security_card" aria-label="Güvenlik bilgisi">
            <div class="dkd_anyela_shield" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2.8 20 6v5.7c0 5-3.3 8.8-8 10.1-4.7-1.3-8-5.1-8-10.1V6z"/><path d="m8.7 12.3 2.1 2.1 4.8-5"/></svg>
            </div>
            <div class="dkd_anyela_security_copy">
              <strong>%100 Güvenli &amp; Özel</strong>
              <span>Tüm bilgileriniz gizli tutulur.</span>
              <span>Sadece üyeler için özel bir dünya.</span>
            </div>
            <div class="dkd_anyela_city_line" aria-hidden="true">
              <svg viewBox="0 0 180 88">
                <path d="M9 75h162"/>
                <path d="M34 75V51h14v24M61 75V38h16v37M94 75V30h18v45M130 75V21h21v54"/>
                <path d="M18 62c10-21 25-25 45-18"/>
                <path d="M28 58c1-16 9-28 22-36"/>
                <path d="M46 42c-7-6-15-8-24-5M47 42c6-7 15-10 25-8M47 42c-2-9-7-16-16-20"/>
              </svg>
            </div>
          </aside>
        </section>
      </section>
      <div class="dkd_anyela_toast" id="dkd_anyela_toast" role="status" aria-live="polite"></div>
    </main>
    <script src="./dkd_anyela_miami_login.js"></script>
  </body>
</html>
