        function dkdAnyelaPackagesIcon(dkdAnyelaPackagesIconName) { return '<i data-lucide="' + dkdAnyelaPackagesIconName + '"></i>'; }
        function dkdAnyelaPackagesRenderIcons() { if (window.lucide && window.lucide.createIcons) { window.lucide.createIcons(); } }
        function dkdAnyelaPackagesFormatMoney(dkdAnyelaPackagesAmount) { return new Intl.NumberFormat("tr-TR").format(dkdAnyelaPackagesAmount) + " TL"; }
        function dkdAnyelaPackagesOpenModal() { dkdAnyelaPackagesBackdrop.setAttribute("data-dkd-anyela-modal-open", "true"); dkdAnyelaPackagesBackdrop.setAttribute("aria-hidden", "false"); dkdAnyelaPackagesRenderIcons(); }
        function dkdAnyelaPackagesCloseModal() { dkdAnyelaPackagesBackdrop.removeAttribute("data-dkd-anyela-modal-open"); dkdAnyelaPackagesBackdrop.setAttribute("aria-hidden", "true"); }

        function dkdAnyelaPackagesFeatureCardsHtml(dkdAnyelaPackagesFeatures) {
          return dkdAnyelaPackagesFeatures.map(function (dkdAnyelaPackagesFeatureItem) {
            return '<article class="dkd_anyela_packages_feature_card"><span class="dkd_anyela_packages_feature_icon" aria-hidden="true">' + dkdAnyelaPackagesIcon(dkdAnyelaPackagesFeatureItem.icon) + '</span><div><strong>' + dkdAnyelaPackagesFeatureItem.title + '</strong><span>' + dkdAnyelaPackagesFeatureItem.detail + '</span></div></article>';

        function dkdAnyelaPackagesPaymentHtml(dkdAnyelaPackagesPrice, dkdAnyelaPackagesName) {
          return '<section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">' + dkdAnyelaPackagesIcon('credit-card') + 'Ödeme Bilgileri</h3><div class="dkd_anyela_packages_payment_grid"><div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">' + dkdAnyelaPackagesIcon('landmark') + 'IBAN</span><div class="dkd_anyela_packages_payment_value"><span>' + dkdAnyelaPackagesIban + '</span><button class="dkd_anyela_packages_copy" type="button" data-dkd-anyela-copy="' + dkdAnyelaPackagesIban + '">Kopyala</button></div></div><div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">' + dkdAnyelaPackagesIcon('user-round') + 'Ad Soyad</span><div class="dkd_anyela_packages_payment_value"><span>' + dkdAnyelaPackagesOwner + '</span><button class="dkd_anyela_packages_copy" type="button" data-dkd-anyela-copy="' + dkdAnyelaPackagesOwner + '">Kopyala</button></div></div><div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">' + dkdAnyelaPackagesIcon('receipt-text') + 'Açıklama Önerisi</span><div class="dkd_anyela_packages_payment_value"><span>Anyela Born - ' + dkdAnyelaPackagesName + '</span></div></div></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('user-check') + 'Dekonttaki gönderici adı</label><input type="text" autocomplete="name" data-dkd-anyela-receipt-name placeholder="Ad Soyad" /></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('badge-turkish-lira') + 'Ödenen tutar</label><input type="number" inputmode="decimal" data-dkd-anyela-receipt-amount value="' + dkdAnyelaPackagesPrice + '" /></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('upload-cloud') + 'Dekont yükle</label><input type="file" accept="image/*,.pdf" data-dkd-anyela-receipt-file /></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('message-square-text') + 'Sipariş notu</label><textarea data-dkd-anyela-receipt-note placeholder="İçerik isteğini, tarzını veya teslim notunu yazabilirsin."></textarea></div><button class="dkd_anyela_packages_primary" type="button" data-dkd-anyela-submit-receipt>' + dkdAnyelaPackagesIcon('send') + 'Dekontu Gönder</button><p class="dkd_anyela_packages_status" data-dkd-anyela-status>Dekont onayından sonra kısa süre içerisinde onaylanacaktır.</p></section>';
        }

        function dkdAnyelaPackagesBindUtilityButtons() {
          document.querySelectorAll("[data-dkd-anyela-copy]").forEach(function (dkdAnyelaPackagesCopyButton) {
            dkdAnyelaPackagesCopyButton.addEventListener("click", function () {
              var dkdAnyelaPackagesCopyValueText = dkdAnyelaPackagesCopyButton.getAttribute("data-dkd-anyela-copy") || "";
              if (navigator.clipboard) { navigator.clipboard.writeText(dkdAnyelaPackagesCopyValueText); }
              dkdAnyelaPackagesCopyButton.textContent = "Kopyalandı";
              setTimeout(function () { dkdAnyelaPackagesCopyButton.textContent = "Kopyala"; }, 1300);
            });

          document.querySelectorAll("[data-dkd-anyela-submit-receipt]").forEach(function (dkdAnyelaPackagesReceiptButton) {
            dkdAnyelaPackagesReceiptButton.addEventListener("click", function () {
              var dkdAnyelaPackagesStatus = document.querySelector("[data-dkd-anyela-status]");
              var dkdAnyelaPackagesFile = document.querySelector("[data-dkd-anyela-receipt-file]");
              var dkdAnyelaPackagesFileName = dkdAnyelaPackagesFile && dkdAnyelaPackagesFile.files && dkdAnyelaPackagesFile.files[0] ? dkdAnyelaPackagesFile.files[0].name : "";
              if (dkdAnyelaPackagesStatus) { dkdAnyelaPackagesStatus.textContent = dkdAnyelaPackagesFileName ? "Dekont alındı: " + dkdAnyelaPackagesFileName + ". Kısa süre içerisinde onaylanacaktır." : "Dekont dosyası seçilmedi. Ödeme sonrası dekontu yükleyip tekrar gönderebilirsin."; }
            });
          });
        }

        function dkdAnyelaPackagesOpenPackage(dkdAnyelaPackagesKey) {
          var dkdAnyelaPackagesItem = dkdAnyelaPackagesData[dkdAnyelaPackagesKey];
          if (!dkdAnyelaPackagesItem) { return; }
          dkdAnyelaPackagesTitle.textContent = dkdAnyelaPackagesItem.title;
          dkdAnyelaPackagesSubtitle.textContent = dkdAnyelaPackagesItem.tag;
          dkdAnyelaPackagesBody.innerHTML = '<section class="dkd_anyela_packages_hero" style="--dkd-package-glow: ' + dkdAnyelaPackagesItem.color + ';"><div class="dkd_anyela_packages_hero_top"><span class="dkd_anyela_packages_icon" aria-hidden="true">' + dkdAnyelaPackagesIcon(dkdAnyelaPackagesItem.icon) + '</span><span class="dkd_anyela_packages_badge">' + dkdAnyelaPackagesIcon(dkdAnyelaPackagesItem.badgeIcon) + dkdAnyelaPackagesItem.badge + '</span></div><div class="dkd_anyela_packages_price">' + dkdAnyelaPackagesIcon('badge-turkish-lira') + dkdAnyelaPackagesFormatMoney(dkdAnyelaPackagesItem.price) + '</div><div class="dkd_anyela_packages_quick_grid"><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('clock-3') + '<span>Süre</span><strong>' + dkdAnyelaPackagesItem.duration + '</strong></div><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('truck') + '<span>Teslim</span><strong>' + dkdAnyelaPackagesItem.deliveryTime + '</strong></div><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('package-check') + '<span>İçerik</span><strong>' + dkdAnyelaPackagesItem.contentCount + '</strong></div></div></section><section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">' + dkdAnyelaPackagesIcon('sparkles') + 'Paket İçeriği</h3><div class="dkd_anyela_packages_feature_grid">' + dkdAnyelaPackagesFeatureCardsHtml(dkdAnyelaPackagesItem.features) + '</div></section><section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">' + dkdAnyelaPackagesIcon('route') + 'Onay ve Teslimat Akışı</h3><div class="dkd_anyela_packages_timeline"><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">' + dkdAnyelaPackagesIcon('mouse-pointer-click') + '</span><div class="dkd_anyela_packages_timeline_text">Paketi seç, sipariş notunu ve özel isteğini yaz.</div></div><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">' + dkdAnyelaPackagesIcon('receipt-text') + '</span><div class="dkd_anyela_packages_timeline_text">IBAN\'a ödeme yapıp dekontu bu ekrandan yükle.</div></div><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">' + dkdAnyelaPackagesIcon('badge-check') + '</span><div class="dkd_anyela_packages_timeline_text">' + dkdAnyelaPackagesItem.delivery + '</div></div></div></section>' + dkdAnyelaPackagesPaymentHtml(dkdAnyelaPackagesItem.price, dkdAnyelaPackagesItem.title);
          dkdAnyelaPackagesOpenModal();
          dkdAnyelaPackagesBindUtilityButtons();
          dkdAnyelaPackagesRenderIcons();
        }

        function dkdAnyelaPackagesOpenOffer() {
          dkdAnyelaPackagesTitle.textContent = "Teklif Oluştur";
          dkdAnyelaPackagesSubtitle.textContent = "Kendi isteklerini belirle, teklifini ver";
          dkdAnyelaPackagesBody.innerHTML = '<section class="dkd_anyela_packages_hero" style="--dkd-package-glow: rgba(28, 247, 255, 0.34);"><div class="dkd_anyela_packages_hero_top"><span class="dkd_anyela_packages_icon" aria-hidden="true">' + dkdAnyelaPackagesIcon('file-pen-line') + '</span><span class="dkd_anyela_packages_badge">' + dkdAnyelaPackagesIcon('wand-sparkles') + 'Kişiye özel</span></div><div class="dkd_anyela_packages_price">' + dkdAnyelaPackagesIcon('calculator') + 'Canlı Hesaplama</div><div class="dkd_anyela_packages_quick_grid"><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('messages-square') + '<span>Sohbet</span><strong>Dakika seç</strong></div><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('mic-vocal') + '<span>Ses/Video</span><strong>Adet seç</strong></div><div class="dkd_anyela_packages_quick_item">' + dkdAnyelaPackagesIcon('badge-turkish-lira') + '<span>Sonuç</span><strong>Anında TL</strong></div></div></section><section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">' + dkdAnyelaPackagesIcon('sliders-horizontal') + 'Özel Teklif Seçenekleri</h3><div class="dkd_anyela_packages_row"><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('timer') + 'Sohbet dakikası</label><select data-dkd-anyela-offer-chat><option value="0">0 dk</option><option value="10">10 dk</option><option value="20">20 dk</option><option value="30" selected>30 dk</option><option value="45">45 dk</option><option value="60">60 dk</option></select></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('mic-vocal') + 'Sesli mesaj adedi</label><input type="number" min="0" max="20" value="3" data-dkd-anyela-offer-voice /></div></div><div class="dkd_anyela_packages_row"><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('video') + 'Video mesaj adedi</label><input type="number" min="0" max="10" value="1" data-dkd-anyela-offer-video /></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('image-plus') + 'Fotoğraf adedi</label><input type="number" min="0" max="50" value="5" data-dkd-anyela-offer-photo /></div></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('rocket') + 'Teslim önceliği</label><select data-dkd-anyela-offer-priority><option value="0">Normal teslim</option><option value="299">VIP hızlı onay +299 TL</option><option value="599">Ekspres öncelik +599 TL</option></select></div><div class="dkd_anyela_packages_field"><label>' + dkdAnyelaPackagesIcon('notebook-pen') + 'Özel istek açıklaması</label><textarea data-dkd-anyela-offer-note placeholder="İstediğin konuşma tarzını, video mesaj konusunu, fotoğraf konseptini ve özel notunu yaz."></textarea></div><div class="dkd_anyela_packages_total"><span>' + dkdAnyelaPackagesIcon('calculator') + 'Hesaplanan teklif</span><strong data-dkd-anyela-offer-total>0 TL</strong></div><p class="dkd_anyela_packages_status" data-dkd-anyela-offer-breakdown></p></section>' + dkdAnyelaPackagesPaymentHtml(0, "Özel Teklif");
          dkdAnyelaPackagesOpenModal();
          dkdAnyelaPackagesBindOfferCalculator();
          dkdAnyelaPackagesBindUtilityButtons();
          dkdAnyelaPackagesRenderIcons();
        }

        function dkdAnyelaPackagesBindOfferCalculator() {
          var dkdAnyelaPackagesChat = document.querySelector("[data-dkd-anyela-offer-chat]");
          var dkdAnyelaPackagesVoice = document.querySelector("[data-dkd-anyela-offer-voice]");
          var dkdAnyelaPackagesVideo = document.querySelector("[data-dkd-anyela-offer-video]");
          var dkdAnyelaPackagesPhoto = document.querySelector("[data-dkd-anyela-offer-photo]");
          var dkdAnyelaPackagesPriority = document.querySelector("[data-dkd-anyela-offer-priority]");
          var dkdAnyelaPackagesTotal = document.querySelector("[data-dkd-anyela-offer-total]");
          var dkdAnyelaPackagesBreakdown = document.querySelector("[data-dkd-anyela-offer-breakdown]");
          var dkdAnyelaPackagesReceiptAmount = document.querySelector("[data-dkd-anyela-receipt-amount]");
          function dkdAnyelaPackagesNumber(dkdAnyelaPackagesInput) { return Number(dkdAnyelaPackagesInput && dkdAnyelaPackagesInput.value ? dkdAnyelaPackagesInput.value : 0); }
          function dkdAnyelaPackagesCalculate() {
            var dkdAnyelaPackagesChatMinutes = dkdAnyelaPackagesNumber(dkdAnyelaPackagesChat);
            var dkdAnyelaPackagesVoiceCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesVoice);
            var dkdAnyelaPackagesVideoCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesVideo);
            var dkdAnyelaPackagesPhotoCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesPhoto);
            var dkdAnyelaPackagesPriorityPrice = dkdAnyelaPackagesNumber(dkdAnyelaPackagesPriority);
            var dkdAnyelaPackagesAmount = 199 + dkdAnyelaPackagesChatMinutes * 25 + dkdAnyelaPackagesVoiceCount * 149 + dkdAnyelaPackagesVideoCount * 399 + dkdAnyelaPackagesPhotoCount * 99 + dkdAnyelaPackagesPriorityPrice;
            if (dkdAnyelaPackagesTotal) { dkdAnyelaPackagesTotal.textContent = dkdAnyelaPackagesFormatMoney(dkdAnyelaPackagesAmount); }
            if (dkdAnyelaPackagesReceiptAmount) { dkdAnyelaPackagesReceiptAmount.value = dkdAnyelaPackagesAmount; }
            if (dkdAnyelaPackagesBreakdown) { dkdAnyelaPackagesBreakdown.textContent = "Başlangıç 199 TL + sohbet " + dkdAnyelaPackagesChatMinutes + " dk + " + dkdAnyelaPackagesVoiceCount + " sesli mesaj + " + dkdAnyelaPackagesVideoCount + " video mesaj + " + dkdAnyelaPackagesPhotoCount + " fotoğraf seçildi."; }
          }
          [dkdAnyelaPackagesChat, dkdAnyelaPackagesVoice, dkdAnyelaPackagesVideo, dkdAnyelaPackagesPhoto, dkdAnyelaPackagesPriority].forEach(function (dkdAnyelaPackagesInput) { if (dkdAnyelaPackagesInput) { dkdAnyelaPackagesInput.addEventListener("input", dkdAnyelaPackagesCalculate); dkdAnyelaPackagesInput.addEventListener("change", dkdAnyelaPackagesCalculate); } });
          dkdAnyelaPackagesCalculate();
        }

        function dkdAnyelaPackagesHandleShellTap(dkdAnyelaPackagesEvent) {
          if (dkdAnyelaPackagesBackdrop.getAttribute("data-dkd-anyela-modal-open") === "true") { return; }
          var dkdAnyelaPackagesRect = dkdAnyelaPackagesShell.getBoundingClientRect();
          var dkdAnyelaPackagesRelativeY = (dkdAnyelaPackagesEvent.clientY - dkdAnyelaPackagesRect.top) / dkdAnyelaPackagesRect.height;
          if (dkdAnyelaPackagesRelativeY >= 0.092 && dkdAnyelaPackagesRelativeY <= 0.300) { dkdAnyelaPackagesOpenOffer(); return; }
          if (dkdAnyelaPackagesRelativeY >= 0.370 && dkdAnyelaPackagesRelativeY <= 0.532) { dkdAnyelaPackagesOpenPackage("mini-chat"); return; }
          if (dkdAnyelaPackagesRelativeY >= 0.530 && dkdAnyelaPackagesRelativeY <= 0.692) { dkdAnyelaPackagesOpenPackage("voice"); return; }
          if (dkdAnyelaPackagesRelativeY >= 0.690 && dkdAnyelaPackagesRelativeY <= 0.852) { dkdAnyelaPackagesOpenPackage("vip-content"); return; }
          if (dkdAnyelaPackagesRelativeY >= 0.845 && dkdAnyelaPackagesRelativeY <= 0.997) { dkdAnyelaPackagesOpenPackage("full-premium"); return; }
        }

        document.querySelectorAll("[data-dkd-anyela-package]").forEach(function (dkdAnyelaPackagesButton) { dkdAnyelaPackagesButton.addEventListener("click", function (dkdAnyelaPackagesEvent) { dkdAnyelaPackagesEvent.preventDefault(); dkdAnyelaPackagesEvent.stopPropagation(); dkdAnyelaPackagesOpenPackage(dkdAnyelaPackagesButton.getAttribute("data-dkd-anyela-package")); }); });
        var dkdAnyelaPackagesOfferButton = document.querySelector("[data-dkd-anyela-offer]");
        if (dkdAnyelaPackagesOfferButton) { dkdAnyelaPackagesOfferButton.addEventListener("click", function (dkdAnyelaPackagesEvent) { dkdAnyelaPackagesEvent.preventDefault(); dkdAnyelaPackagesEvent.stopPropagation(); dkdAnyelaPackagesOpenOffer(); }); }
        if (dkdAnyelaPackagesShell) { dkdAnyelaPackagesShell.addEventListener("pointerup", dkdAnyelaPackagesHandleShellTap); }
        if (dkdAnyelaPackagesClose) { dkdAnyelaPackagesClose.addEventListener("click", dkdAnyelaPackagesCloseModal); }
        if (dkdAnyelaPackagesBackdrop) { dkdAnyelaPackagesBackdrop.addEventListener("click", function (dkdAnyelaPackagesEvent) { if (dkdAnyelaPackagesEvent.target === dkdAnyelaPackagesBackdrop) { dkdAnyelaPackagesCloseModal(); } }); }
        document.addEventListener("keydown", function (dkdAnyelaPackagesEvent) { if (dkdAnyelaPackagesEvent.key === "Escape") { dkdAnyelaPackagesCloseModal(); } });
        dkdAnyelaPackagesRenderIcons();
      })();
    </script>
  </body>
</html>
