<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05002b" />
    <meta
      name="description"
      content="Anyela Born Club Packages — Miami neon paketler mobil ekranı."
    />
    <meta property="og:title" content="Anyela Born Club Packages" />
    <meta
      property="og:description"
      content="Anyela Born paketlerini incele: tanışma, özel mesajlaşma, sesli mesaj, fotoğraf seti ve premium video."
    />
    <meta property="og:image" content="../assets/dkd_anyela_packages_9906_20260529.png" />
    <title>Anyela Born Club Packages</title>
    <style>
      :root {
        --dkd_anyela_packages_bg: #05002b;
        --dkd_anyela_packages_shadow: 0 28px 90px rgba(0, 0, 0, 0.54);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 35, 188, 0.24), transparent 24rem),
          radial-gradient(circle at 88% 10%, rgba(24, 247, 255, 0.18), transparent 25rem),
          linear-gradient(180deg, #090044 0%, var(--dkd_anyela_packages_bg) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        -webkit-tap-highlight-color: transparent;
      }

      .dkd_anyela_packages_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_packages_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #05002b;
        box-shadow: var(--dkd_anyela_packages_shadow);
      }

      .dkd_anyela_packages_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_packages_hotspot {
        position: absolute;
        display: block;
        z-index: 3;
        border-radius: 999px;
        text-decoration: none;
        outline: none;
      }

      .dkd_anyela_packages_hotspot:focus-visible {
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.94),
          0 0 0 8px rgba(255, 35, 188, 0.72),
          0 0 32px rgba(24, 247, 255, 0.72);
      }

      .dkd_anyela_packages_card_meet {
        left: 2.8%;
        top: 26.7%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_private {
        left: 51.0%;
        top: 26.7%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_voice {
        left: 2.8%;
        top: 44.0%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_photo {
        left: 51.0%;
        top: 44.0%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_video_message {
        left: 2.8%;
        top: 61.3%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_vip {
        left: 51.0%;
        top: 61.3%;
        width: 46.0%;
        height: 16.4%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_voice_special {
        left: 2.8%;
        top: 78.7%;
        width: 46.0%;
        height: 15.0%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_card_premium_video {
        left: 51.0%;
        top: 78.7%;
        width: 46.0%;
        height: 15.0%;
        border-radius: 24px;
      }

      .dkd_anyela_packages_nav_home {
        left: 5.5%;
        bottom: 0.8%;
        width: 14.0%;
        height: 5.0%;
      }

      .dkd_anyela_packages_nav_packages {
        left: 25.0%;
        bottom: 0.8%;
        width: 14.5%;
        height: 5.0%;
      }

      .dkd_anyela_packages_nav_chat {
        left: 44.8%;
        bottom: 0.8%;
        width: 14.5%;
        height: 5.0%;
      }

      .dkd_anyela_packages_nav_profile {
        left: 64.4%;
        bottom: 0.8%;
        width: 14.5%;
        height: 5.0%;
      }

      .dkd_anyela_packages_nav_settings {
        left: 83.7%;
        bottom: 0.8%;
        width: 14.0%;
        height: 5.0%;
      }

      .dkd_anyela_packages_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @media (min-width: 820px) {
        .dkd_anyela_packages_page {
          align-items: center;
          padding: 32px 0;
        }

        .dkd_anyela_packages_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.16);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.58),
            0 0 90px rgba(255, 35, 188, 0.25),
            0 0 120px rgba(24, 247, 255, 0.18);
        }

        .dkd_anyela_packages_mockup {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_packages_page" aria-label="Anyela Born Club Packages sayfası">
      <section class="dkd_anyela_packages_mobile_shell" id="dkd_anyela_packages_root">
        <img
          class="dkd_anyela_packages_mockup"
          src="../assets/dkd_anyela_packages_9906_20260529.png"
          alt="Anyela Born Club neon paketler mobil sayfası"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_meet" href="../Login/?dkd_anyela_package=meet-anyela" aria-label="Anyela ile tanış paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_private" href="../Login/?dkd_anyela_package=private-message" aria-label="Özel mesajlaşma paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_voice" href="../Login/?dkd_anyela_package=voice-message" aria-label="Sesli mesajlaş paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_photo" href="../Login/?dkd_anyela_package=photo-set" aria-label="Sana özel fotoğraf seti paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_video_message" href="../Login/?dkd_anyela_package=video-message" aria-label="Anyela ile videolu mesajlaş paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_vip" href="../Login/?dkd_anyela_package=vip-fan" aria-label="Özel fan paketi paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_voice_special" href="../Login/?dkd_anyela_package=special-voice" aria-label="Özel sesli mesaj paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_card_premium_video" href="../Login/?dkd_anyela_package=premium-video" aria-label="Premium video paketini incele"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_nav_home" href="../Home/" aria-label="Ana Sayfa"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_nav_packages" href="./" aria-label="Paketler"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_nav_chat" href="../Login/" aria-label="Chat"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_nav_profile" href="../Login/" aria-label="Profil"></a>
        <a class="dkd_anyela_packages_hotspot dkd_anyela_packages_nav_settings" href="../Login/" aria-label="Ayarlar"></a>

        <section class="dkd_anyela_packages_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club Paketler</h1>
          <p>Anyela ile tanışma, özel mesajlaşma, sesli mesajlaşma, fotoğraf seti, videolu mesajlaşma, VIP fan paketi, özel sesli mesaj ve premium video paketleri.</p>
        </section>
      </section>
    </main>
  </body>
</html>
