            <section class="dkd_anyela_packages_section">
              <h3 class="dkd_anyela_packages_section_title">Ödeme Bilgileri</h3>
              <div class="dkd_anyela_packages_payment_grid">
                <div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">IBAN</span><div class="dkd_anyela_packages_payment_value"><span>${dkdAnyelaPackagesIban}</span><button class="dkd_anyela_packages_copy" type="button" data-dkd-anyela-copy="${dkdAnyelaPackagesIban}">Kopyala</button></div></div>
                <div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">Ad Soyad</span><div class="dkd_anyela_packages_payment_value"><span>${dkdAnyelaPackagesOwner}</span><button class="dkd_anyela_packages_copy" type="button" data-dkd-anyela-copy="${dkdAnyelaPackagesOwner}">Kopyala</button></div></div>
                <div class="dkd_anyela_packages_payment_box"><span class="dkd_anyela_packages_payment_label">Açıklama Önerisi</span><div class="dkd_anyela_packages_payment_value"><span>Anyela Born - ${dkdAnyelaPackagesName}</span></div></div>
              </div>
              <div class="dkd_anyela_packages_field"><label>Dekonttaki gönderici adı</label><input type="text" autocomplete="name" data-dkd-anyela-receipt-name placeholder="Ad Soyad" /></div>
              <div class="dkd_anyela_packages_field"><label>Ödenen tutar</label><input type="number" inputmode="decimal" data-dkd-anyela-receipt-amount value="${dkdAnyelaPackagesPrice}" /></div>
              <div class="dkd_anyela_packages_field"><label>Dekont yükle</label><input type="file" accept="image/*,.pdf" data-dkd-anyela-receipt-file /></div>
              <div class="dkd_anyela_packages_field"><label>Sipariş notu</label><textarea data-dkd-anyela-receipt-note placeholder="İçerik isteğini, tarzını veya teslim notunu yazabilirsin."></textarea></div>
              <button class="dkd_anyela_packages_primary" type="button" data-dkd-anyela-submit-receipt>Dekontu Gönder</button>
              <p class="dkd_anyela_packages_status" data-dkd-anyela-status>Dekont onayından sonra kısa süre içerisinde onaylanacaktır.</p>
            </section>
          `;
        }

        function dkdAnyelaPackagesBindUtilityButtons() {
          document.querySelectorAll("[data-dkd-anyela-copy]").forEach(function dkdAnyelaPackagesCopyButton) {
            dkdAnyelaPackagesCopyButton.addEventListener("click", function dkdAnyelaPackagesCopyValue() {
              const dkdAnyelaPackagesCopyValueText = dkdAnyelaPackagesCopyButton.getAttribute("data-dkd-anyela-copy") || "";
              navigator.clipboard?.writeText(dkdAnyelaPackagesCopyValueText);
              dkdAnyelaPackagesCopyButton.textContent = "Kopyalandı";
              setTimeout(function dkdAnyelaPackagesResetCopy() { dkdAnyelaPackagesCopyButton.textContent = "Kopyala"; }, 1300);
            });
          });

          document.querySelectorAll("[data-dkd-anyela-submit-receipt]").forEach(function dkdAnyelaPackagesReceiptButton) {
            dkdAnyelaPackagesReceiptButton.addEventListener("click", function dkdAnyelaPackagesSubmitReceipt() {
              const dkdAnyelaPackagesStatus = document.querySelector("[data-dkd-anyela-status]");
              const dkdAnyelaPackagesFile = document.querySelector("[data-dkd-anyela-receipt-file]");
              const dkdAnyelaPackagesFileName = dkdAnyelaPackagesFile?.files?.[0]?.name;
              if (dkdAnyelaPackagesStatus) {
                dkdAnyelaPackagesStatus.textContent = dkdAnyelaPackagesFileName ? "Dekont alındı: " + dkdAnyelaPackagesFileName + ". Kısa süre içerisinde onaylanacaktır." : "Dekont dosyası seçilmedi. Ödeme sonrası dekontu yükleyip tekrar gönderebilirsin.";
              }
            });
          });
        }

        function dkdAnyelaPackagesFeatureCardsHtml(dkdAnyelaPackagesFeatures) {
          return dkdAnyelaPackagesFeatures.map(function (dkdAnyelaPackagesFeatureItem) {
            return `<article class="dkd_anyela_packages_feature_card"><span class="dkd_anyela_packages_feature_icon" aria-hidden="true">${dkdAnyelaPackagesFeatureItem.icon}</span><div><strong>${dkdAnyelaPackagesFeatureItem.title}</strong><span>${dkdAnyelaPackagesFeatureItem.detail}</span></div></article>`;
          }).join("");
        }

        function dkdAnyelaPackagesOpenPackage(dkdAnyelaPackagesKey) {
          const dkdAnyelaPackagesItem = dkdAnyelaPackagesData[dkdAnyelaPackagesKey];
          if (!dkdAnyelaPackagesItem) { return; }
          dkdAnyelaPackagesTitle.textContent = dkdAnyelaPackagesItem.title;
          dkdAnyelaPackagesSubtitle.textContent = dkdAnyelaPackagesItem.tag;
          dkdAnyelaPackagesBody.innerHTML = `
            <section class="dkd_anyela_packages_hero" style="--dkd-package-glow: ${dkdAnyelaPackagesItem.color};">
              <div class="dkd_anyela_packages_hero_top"><span class="dkd_anyela_packages_icon" aria-hidden="true">${dkdAnyelaPackagesItem.icon}</span><span class="dkd_anyela_packages_badge">${dkdAnyelaPackagesItem.badge}</span></div>
              <div class="dkd_anyela_packages_price">${dkdAnyelaPackagesFormatMoney(dkdAnyelaPackagesItem.price)}</div>
              <div class="dkd_anyela_packages_quick_grid"><div class="dkd_anyela_packages_quick_item"><span>Süre</span><strong>${dkdAnyelaPackagesItem.duration}</strong></div><div class="dkd_anyela_packages_quick_item"><span>Teslim</span><strong>${dkdAnyelaPackagesItem.deliveryTime}</strong></div><div class="dkd_anyela_packages_quick_item"><span>İçerik</span><strong>${dkdAnyelaPackagesItem.contentCount}</strong></div></div>
            </section>
            <section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">Paket İçeriği</h3><div class="dkd_anyela_packages_feature_grid">${dkdAnyelaPackagesFeatureCardsHtml(dkdAnyelaPackagesItem.features)}</div></section>
            <section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">Onay ve Teslimat Akışı</h3><div class="dkd_anyela_packages_timeline"><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">1</span><div class="dkd_anyela_packages_timeline_text">Paketi seç, sipariş notunu ve özel isteğini yaz.</div></div><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">2</span><div class="dkd_anyela_packages_timeline_text">IBAN'a ödeme yapıp dekontu bu ekrandan yükle.</div></div><div class="dkd_anyela_packages_timeline_item"><span class="dkd_anyela_packages_timeline_number">3</span><div class="dkd_anyela_packages_timeline_text">${dkdAnyelaPackagesItem.delivery}</div></div></div></section>
            ${dkdAnyelaPackagesPaymentHtml(dkdAnyelaPackagesItem.price, dkdAnyelaPackagesItem.title)}
          `;
          dkdAnyelaPackagesOpenModal();
          dkdAnyelaPackagesBindUtilityButtons();
        }

        function dkdAnyelaPackagesOpenOffer() {
          dkdAnyelaPackagesTitle.textContent = "Teklif Oluştur";
          dkdAnyelaPackagesSubtitle.textContent = "Kendi isteklerini belirle, teklifini ver";
          dkdAnyelaPackagesBody.innerHTML = `
            <section class="dkd_anyela_packages_hero" style="--dkd-package-glow: rgba(28, 247, 255, 0.34);"><div class="dkd_anyela_packages_hero_top"><span class="dkd_anyela_packages_icon" aria-hidden="true">📝</span><span class="dkd_anyela_packages_badge">Kişiye özel</span></div><div class="dkd_anyela_packages_price">Canlı Hesaplama</div><div class="dkd_anyela_packages_quick_grid"><div class="dkd_anyela_packages_quick_item"><span>Sohbet</span><strong>Dakika seç</strong></div><div class="dkd_anyela_packages_quick_item"><span>Ses/Video</span><strong>Adet seç</strong></div><div class="dkd_anyela_packages_quick_item"><span>Sonuç</span><strong>Anında TL</strong></div></div></section>
            <section class="dkd_anyela_packages_section"><h3 class="dkd_anyela_packages_section_title">Özel Teklif Seçenekleri</h3><div class="dkd_anyela_packages_row"><div class="dkd_anyela_packages_field"><label>Sohbet dakikası</label><select data-dkd-anyela-offer-chat><option value="0">0 dk</option><option value="10">10 dk</option><option value="20">20 dk</option><option value="30" selected>30 dk</option><option value="45">45 dk</option><option value="60">60 dk</option></select></div><div class="dkd_anyela_packages_field"><label>Sesli mesaj adedi</label><input type="number" min="0" max="20" value="3" data-dkd-anyela-offer-voice /></div></div><div class="dkd_anyela_packages_row"><div class="dkd_anyela_packages_field"><label>Video mesaj adedi</label><input type="number" min="0" max="10" value="1" data-dkd-anyela-offer-video /></div><div class="dkd_anyela_packages_field"><label>Fotoğraf adedi</label><input type="number" min="0" max="50" value="5" data-dkd-anyela-offer-photo /></div></div><div class="dkd_anyela_packages_field"><label>Teslim önceliği</label><select data-dkd-anyela-offer-priority><option value="0">Normal teslim</option><option value="299">VIP hızlı onay +299 TL</option><option value="599">Ekspres öncelik +599 TL</option></select></div><div class="dkd_anyela_packages_field"><label>Özel istek açıklaması</label><textarea data-dkd-anyela-offer-note placeholder="İstediğin konuşma tarzını, video mesaj konusunu, fotoğraf konseptini ve özel notunu yaz."></textarea></div><div class="dkd_anyela_packages_total"><span>Hesaplanan teklif</span><strong data-dkd-anyela-offer-total>0 TL</strong></div><p class="dkd_anyela_packages_status" data-dkd-anyela-offer-breakdown></p></section>
            ${dkdAnyelaPackagesPaymentHtml(0, "Özel Teklif")}
          `;
          dkdAnyelaPackagesOpenModal();
          dkdAnyelaPackagesBindOfferCalculator();
          dkdAnyelaPackagesBindUtilityButtons();
        }

        function dkdAnyelaPackagesBindOfferCalculator() {
          const dkdAnyelaPackagesChat = document.querySelector("[data-dkd-anyela-offer-chat]");
          const dkdAnyelaPackagesVoice = document.querySelector("[data-dkd-anyela-offer-voice]");
          const dkdAnyelaPackagesVideo = document.querySelector("[data-dkd-anyela-offer-video]");
          const dkdAnyelaPackagesPhoto = document.querySelector("[data-dkd-anyela-offer-photo]");
          const dkdAnyelaPackagesPriority = document.querySelector("[data-dkd-anyela-offer-priority]");
          const dkdAnyelaPackagesTotal = document.querySelector("[data-dkd-anyela-offer-total]");
          const dkdAnyelaPackagesBreakdown = document.querySelector("[data-dkd-anyela-offer-breakdown]");
          const dkdAnyelaPackagesReceiptAmount = document.querySelector("[data-dkd-anyela-receipt-amount]");

          function dkdAnyelaPackagesNumber(dkdAnyelaPackagesInput) { return Number(dkdAnyelaPackagesInput?.value || 0); }
          function dkdAnyelaPackagesCalculate() {
            const dkdAnyelaPackagesChatMinutes = dkdAnyelaPackagesNumber(dkdAnyelaPackagesChat);
            const dkdAnyelaPackagesVoiceCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesVoice);
            const dkdAnyelaPackagesVideoCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesVideo);
            const dkdAnyelaPackagesPhotoCount = dkdAnyelaPackagesNumber(dkdAnyelaPackagesPhoto);
            const dkdAnyelaPackagesPriorityPrice = dkdAnyelaPackagesNumber(dkdAnyelaPackagesPriority);
            const dkdAnyelaPackagesAmount = 199 + dkdAnyelaPackagesChatMinutes * 25 + dkdAnyelaPackagesVoiceCount * 149 + dkdAnyelaPackagesVideoCount * 399 + dkdAnyelaPackagesPhotoCount * 99 + dkdAnyelaPackagesPriorityPrice;
            if (dkdAnyelaPackagesTotal) { dkdAnyelaPackagesTotal.textContent = dkdAnyelaPackagesFormatMoney(dkdAnyelaPackagesAmount); }
            if (dkdAnyelaPackagesReceiptAmount) { dkdAnyelaPackagesReceiptAmount.value = dkdAnyelaPackagesAmount; }
            if (dkdAnyelaPackagesBreakdown) { dkdAnyelaPackagesBreakdown.textContent = "Başlangıç 199 TL + sohbet " + dkdAnyelaPackagesChatMinutes + " dk + " + dkdAnyelaPackagesVoiceCount + " sesli mesaj + " + dkdAnyelaPackagesVideoCount + " video mesaj + " + dkdAnyelaPackagesPhotoCount + " fotoğraf seçildi."; }
          }
          [dkdAnyelaPackagesChat, dkdAnyelaPackagesVoice, dkdAnyelaPackagesVideo, dkdAnyelaPackagesPhoto, dkdAnyelaPackagesPriority].forEach(function dkdAnyelaPackagesInput) {
            if (dkdAnyelaPackagesInput) {
              dkdAnyelaPackagesInput.addEventListener("input", dkdAnyelaPackagesCalculate);
              dkdAnyelaPackagesInput.addEventListener("change", dkdAnyelaPackagesCalculate);
            }
          });
          dkdAnyelaPackagesCalculate();
        }

        document.querySelectorAll("[data-dkd-anyela-package]").forEach(function (dkdAnyelaPackagesButton) {
          dkdAnyelaPackagesButton.addEventListener("click", function dkdAnyelaPackagesHandleCardClick() {
            dkdAnyelaPackagesOpenPackage(dkdAnyelaPackagesButton.getAttribute("data-dkd-anyela-package"));
          });
        });

        const dkdAnyelaPackagesOfferButton = document.querySelector("[data-dkd-anyela-offer]");
        if (dkdAnyelaPackagesOfferButton) { dkdAnyelaPackagesOfferButton.addEventListener("click", dkdAnyelaPackagesOpenOffer); }
        if (dkdAnyelaPackagesClose) { dkdAnyelaPackagesClose.addEventListener("click", dkdAnyelaPackagesCloseModal); }
        if (dkdAnyelaPackagesBackdrop) { dkdAnyelaPackagesBackdrop.addEventListener("click", function dkdAnyelaPackagesBackdropClose(dkdAnyelaPackagesEvent) { if (dkdAnyelaPackagesEvent.target === dkdAnyelaPackagesBackdrop) { dkdAnyelaPackagesCloseModal(); } }); }
        document.addEventListener("keydown", function dkdAnyelaPackagesEscape(dkdAnyelaPackagesEvent) { if (dkdAnyelaPackagesEvent.key === "Escape") { dkdAnyelaPackagesCloseModal(); } });
      })();
    </script>
  </body>
</html>
