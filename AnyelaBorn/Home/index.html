<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#061044" />
    <meta
      name="description"
      content="Anyela Born Club Home — tıklayınca Packages sayfasına yönlendiren mobil ekran."
    />
    <meta property="og:title" content="Anyela Born Club Home" />
    <meta
      property="og:description"
      content="Anyela ile premium fan deneyimini keşfet. Paketleri görmek için ekrana dokun."
    />
    <meta property="og:image" content="../assets/dkd_anyela_home_reference_9873.jpg" />
    <title>Anyela Born Club Home</title>
    <style>
      :root {
        --dkd_anyela_home_bg: #070526;
        --dkd_anyela_home_shadow: 0 28px 90px rgba(0, 0, 0, 0.48);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 20% 0%, rgba(33, 217, 221, 0.22), transparent 28rem),
          radial-gradient(circle at 84% 12%, rgba(255, 79, 184, 0.24), transparent 24rem),
          linear-gradient(180deg, #061044 0%, var(--dkd_anyela_home_bg) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        -webkit-tap-highlight-color: transparent;
      }

      .dkd_anyela_home_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_home_mobile_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: #ffffff;
        box-shadow: var(--dkd_anyela_home_shadow);
      }

      .dkd_anyela_home_mockup {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_home_full_link {
        position: absolute;
        inset: 0;
        z-index: 100;
        display: block;
        cursor: pointer;
        outline: none;
        text-decoration: none;
      }

      .dkd_anyela_home_full_link:focus-visible {
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.92),
          inset 0 0 0 9px rgba(33, 217, 221, 0.72),
          0 0 34px rgba(255, 79, 184, 0.72);
      }

      .dkd_anyela_home_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @media (min-width: 820px) {
        .dkd_anyela_home_page {
          align-items: center;
          padding: 32px 0;
        }

        .dkd_anyela_home_mobile_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.16);
          box-shadow:
            0 42px 110px rgba(0, 0, 0, 0.55),
            0 0 90px rgba(255, 79, 184, 0.23),
            0 0 120px rgba(33, 217, 221, 0.18);
        }

        .dkd_anyela_home_mockup {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="dkd_anyela_home_page" aria-label="Anyela Born Club Home sayfası">
      <section class="dkd_anyela_home_mobile_shell" id="dkd_anyela_home_root">
        <img
          class="dkd_anyela_home_mockup"
          src="../assets/dkd_anyela_home_reference_9873.jpg"
          alt="Anyela Born Club Miami Style Club mobil Home sayfası"
          width="864"
          height="1536"
          loading="eager"
        />

        <a class="dkd_anyela_home_full_link" href="../Packages/" aria-label="Anyela Born Packages sayfasına git"></a>

        <section class="dkd_anyela_home_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Club Home</h1>
          <p>Bu sayfada herhangi bir yere dokununca Packages sayfası açılır.</p>
        </section>
      </section>
    </main>
    <script>
      (function dkdAnyelaHomeClickRoute() {
        "use strict";
        document.addEventListener("click", function dkdAnyelaHomeOpenPackages(dkdAnyelaHomeEvent) {
          const dkdAnyelaHomeAnchor = dkdAnyelaHomeEvent.target.closest("a");
          if (dkdAnyelaHomeAnchor) {
            return;
          }
          window.location.href = "../Packages/";
        });
      })();
    </script>
  </body>
</html>
