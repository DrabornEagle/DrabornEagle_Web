<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070018" />
  <title>Anyela Born | Home</title>
  <meta name="description" content="Anyela Born Miami Style Club ana sayfası." />
  <link rel="preload" as="image" href="../assets/dkd_anyela_home_miami_original.jpg" />
  <style>
    :root {
      color-scheme: dark;
      --dkd_anyela_bg: #070018;
      --dkd_anyela_focus: rgba(0, 245, 255, 0.95);
      --dkd_anyela_glow: rgba(255, 43, 207, 0.68);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 43, 207, 0.20), transparent 36%),
        radial-gradient(circle at 70% 65%, rgba(0, 245, 255, 0.13), transparent 30%),
        var(--dkd_anyela_bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: start center;
      overflow-x: hidden;
    }

    .dkd_anyela_home_shell {
      width: min(100vw, 864px);
      min-height: 100svh;
      margin: 0 auto;
      position: relative;
      background: #060016;
      box-shadow: 0 0 80px rgba(255, 43, 207, 0.22), 0 0 120px rgba(0, 245, 255, 0.14);
    }

    .dkd_anyela_home_image {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .dkd_anyela_hotspot {
      position: absolute;
      left: 3.7%;
      width: 92.6%;
      min-height: 44px;
      border-radius: 22px;
      text-decoration: none;
      outline: none;
      -webkit-tap-highlight-color: rgba(255, 43, 207, 0.22);
    }

    .dkd_anyela_hotspot:focus-visible {
      box-shadow:
        0 0 0 3px rgba(255, 255, 255, 0.95),
        0 0 0 7px var(--dkd_anyela_focus),
        0 0 30px var(--dkd_anyela_glow);
      background: rgba(0, 245, 255, 0.08);
    }

    .dkd_anyela_hotspot:active {
      background: rgba(255, 43, 207, 0.14);
      box-shadow: inset 0 0 36px rgba(255, 43, 207, 0.22);
    }

    .dkd_anyela_hotspot_profile {
      top: 47.2%;
      height: 11.1%;
    }

    .dkd_anyela_hotspot_chat {
      top: 59.5%;
      height: 11.2%;
    }

    .dkd_anyela_hotspot_packages {
      top: 72.0%;
      height: 11.1%;
    }

    .dkd_anyela_hotspot_brand {
      top: 84.8%;
      height: 11.0%;
      cursor: default;
    }

    .dkd_anyela_screen_reader_text {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="dkd_anyela_home_shell" aria-label="Anyela Born Miami ana ekranı">
    <img
      class="dkd_anyela_home_image"
      src="../assets/dkd_anyela_home_miami_original.jpg"
      alt="Anyela Born Miami Style Club ana ekranı: Profilim, Sohbet Odası, Paketler ve Markan için Anyela kartları"
      width="864"
      height="1536"
      decoding="async"
      fetchpriority="high"
    />

    <a class="dkd_anyela_hotspot dkd_anyela_hotspot_profile" href="../Profile/" aria-label="Profilim ekranını aç">
      <span class="dkd_anyela_screen_reader_text">Profilim</span>
    </a>

    <a class="dkd_anyela_hotspot dkd_anyela_hotspot_chat" href="../Chat/" aria-label="Sohbet Odası ekranını aç">
      <span class="dkd_anyela_screen_reader_text">Sohbet Odası</span>
    </a>

    <a class="dkd_anyela_hotspot dkd_anyela_hotspot_packages" href="https://www.draborneagle.com/AnyelaBorn/Packages/" aria-label="Paketler sayfasına git">
      <span class="dkd_anyela_screen_reader_text">Paketler</span>
    </a>

    <a class="dkd_anyela_hotspot dkd_anyela_hotspot_brand" href="javascript:void(0)" aria-label="Markan için Anyela yakında açılacak" aria-disabled="true">
      <span class="dkd_anyela_screen_reader_text">Markan için Anyela, yakında</span>
    </a>
  </main>
</body>
</html>
