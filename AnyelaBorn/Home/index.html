<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070024" />
    <meta
      name="description"
      content="Anyela Born Miami Style Club ana sayfası; Profilim, Sohbet Odası, Paketler ve Markan için Anyela girişleri."
    />
    <meta property="og:title" content="Anyela Born | Home" />
    <meta
      property="og:description"
      content="Miami temalı Anyela Born ana sayfası; profil, sohbet odası, paketler ve marka iş birlikleri ekranlarına hızlı giriş."
    />
    <meta property="og:image" content="./assets/dkd_anyela_home_miami_style_club_20260531.jpg" />
    <title>Anyela Born | Home</title>
    <style>
      :root {
        --dkd_anyela_home_bg: #070024;
        --dkd_anyela_home_pink: #ff2bd6;
        --dkd_anyela_home_cyan: #18f7ff;
        --dkd_anyela_home_text: #ffffff;
        color-scheme: dark;
      }

      * { box-sizing: border-box; }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background:
          radial-gradient(circle at 16% 0%, rgba(255, 43, 214, 0.26), transparent 23rem),
          radial-gradient(circle at 90% 10%, rgba(24, 247, 255, 0.18), transparent 26rem),
          linear-gradient(180deg, #09002d 0%, var(--dkd_anyela_home_bg) 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a,
      button { -webkit-tap-highlight-color: transparent; }

      .dkd_anyela_home_page {
        width: 100%;
        min-height: 100svh;
        display: flex;
        justify-content: center;
        padding: max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }

      .dkd_anyela_home_shell {
        position: relative;
        width: min(100vw, 480px);
        min-height: 100svh;
        overflow: hidden;
        background: var(--dkd_anyela_home_bg);
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.58),
          0 0 76px rgba(255, 43, 214, 0.22),
          0 0 86px rgba(24, 247, 255, 0.14);
      }

      .dkd_anyela_home_reference {
        display: block;
        width: 100%;
        height: auto;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
        user-select: none;
        -webkit-user-drag: none;
      }

      .dkd_anyela_home_hotspot {
        position: absolute;
        z-index: 20;
        display: block;
        outline: none;
        text-decoration: none;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.001);
      }

      .dkd_anyela_home_button_hotspot {
        left: 3.8%;
        width: 92.4%;
        height: 11.25%;
        border-radius: 34px;
      }

      .dkd_anyela_home_hotspot:focus-visible {
        box-shadow:
          0 0 0 4px rgba(255, 255, 255, 0.94),
          0 0 0 9px rgba(255, 43, 214, 0.72),
          0 0 34px rgba(24, 247, 255, 0.72);
      }

      .dkd_anyela_home_hotspot_brand {
        animation: dkd_anyela_home_brand_pulse 1.9s ease-in-out infinite;
      }

      .dkd_anyela_home_hotspot_diamond {
        top: 2.2%;
        right: 3.3%;
        width: 15.6%;
        height: 8.2%;
        border-radius: 999px;
      }

      .dkd_anyela_home_hotspot_profile { top: 47.15%; }
      .dkd_anyela_home_hotspot_chat { top: 59.42%; }
      .dkd_anyela_home_hotspot_packages { top: 71.78%; }
      .dkd_anyela_home_hotspot_brand { top: 84.16%; height: 11.18%; }

      .dkd_anyela_home_screen_reader {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip-path: inset(50%);
        border: 0;
        white-space: nowrap;
      }

      @keyframes dkd_anyela_home_brand_pulse {
        0%, 100% { box-shadow: 0 0 0 rgba(255,43,214,0); }
        50% { box-shadow: 0 0 34px rgba(255,43,214,.36), 0 0 24px rgba(24,247,255,.22); }
      }

      @media (min-width: 820px) {
        .dkd_anyela_home_page { align-items: center; padding: 32px 0; }
        .dkd_anyela_home_shell {
          width: min(44vw, 480px);
          min-height: auto;
          border-radius: 38px;
          border: 1px solid rgba(255, 255, 255, 0.16);
        }
        .dkd_anyela_home_reference { min-height: auto; }
      }
    </style>
    <script src="../assets/dkd_anyela_auth_guard.js" data-dkd-anyela-auth-mode="protected"></script>
  </head>
  <body>
    <main class="dkd_anyela_home_page" aria-label="Anyela Born Miami Style Club Home">
      <section class="dkd_anyela_home_shell">
        <img
          class="dkd_anyela_home_reference"
          src="./assets/dkd_anyela_home_miami_style_club_20260531.jpg"
          alt="Anyela Born Miami Style Club mobil ana sayfası"
          width="864"
          height="1536"
          loading="eager"
          decoding="sync"
        />

        <a
          class="dkd_anyela_home_hotspot dkd_anyela_home_hotspot_diamond"
          href="../Packages/"
          aria-label="Sağ üst elmas ikonundan Paketler sayfasını aç"
        ></a>

        <a
          class="dkd_anyela_home_hotspot dkd_anyela_home_button_hotspot dkd_anyela_home_hotspot_profile"
          href="../Profile/"
          aria-label="Profilim ekranını aç"
        ></a>

        <a
          class="dkd_anyela_home_hotspot dkd_anyela_home_button_hotspot dkd_anyela_home_hotspot_chat"
          href="../ChatRoom/"
          aria-label="Sohbet Odası ekranını aç"
        ></a>

        <a
          class="dkd_anyela_home_hotspot dkd_anyela_home_button_hotspot dkd_anyela_home_hotspot_packages"
          href="../Packages/"
          aria-label="Paketler sayfasını aç"
        ></a>

        <a
          class="dkd_anyela_home_hotspot dkd_anyela_home_button_hotspot dkd_anyela_home_hotspot_brand"
          href="../Brand/"
          aria-label="Markan için Anyela paket görselini aç"
        ></a>

        <section class="dkd_anyela_home_screen_reader" aria-label="Sayfa özeti">
          <h1>Anyela Born Miami Style Club</h1>
          <p>Profilim, Sohbet Odası, Paketler, Markan için Anyela ve sağ üst elmas ikonundan Paketler sayfasına giriş aktiftir.</p>
        </section>
      </section>
    </main>
  </body>
</html>
