<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070024">
<title>Anyela Born Admin</title>
<link rel="stylesheet" href="./admin.css">
</head>
<body>
<main class="dkd_shell">
<section class="dkd_hero">
<p class="dkd_kicker">Miami Style Club</p>
<h1>Anyela Born Admin</h1>
<div class="dkd_login" id="dkd_login_box">
<input class="dkd_input" id="dkd_admin_email" type="email" placeholder="Admin email">
<input class="dkd_input" id="dkd_admin_password" type="password" placeholder="Şifre">
<button class="dkd_btn" id="dkd_admin_login">Admin Girişi</button>
</div>
<div class="dkd_actions">
<button class="dkd_btn" id="dkd_refresh">Yenile</button>
<button class="dkd_btn dkd_danger" id="dkd_logout">Çıkış</button>
<a class="dkd_btn dkd_soft" href="../Login/">Login</a>
<a class="dkd_btn dkd_soft" href="../Packages/">Paketler</a>
</div>
<p class="dkd_note" id="dkd_note">Admin girişi bekleniyor.</p>
</section>
<section class="dkd_stats">
<article><small>Toplam Ödeme</small><strong id="dkd_stat_total">0</strong></article>
<article><small>Bekleyen Dekont</small><strong id="dkd_stat_pending">0</strong></article>
<article><small>Onaylanan TL</small><strong id="dkd_stat_approved">0 TL</strong></article>
<article><small>Kullanıcı</small><strong id="dkd_stat_users">0</strong></article>
</section>
<section class="dkd_filters">
<input class="dkd_input" id="dkd_search" placeholder="Email, paket, takip no ara">
<select class="dkd_input" id="dkd_status"><option value="all">Tüm durumlar</option><option value="pending">Bekleyen</option><option value="approved">Onaylanan</option><option value="rejected">Reddedilen</option></select>
<select class="dkd_input" id="dkd_kind"><option value="all">Tüm tipler</option><option value="package">Paket</option><option value="offer">Teklif</option></select>
</section>
<section class="dkd_layout">
<article class="dkd_card"><h2>Ödeme ve Dekont Talepleri</h2><div class="dkd_table_wrap"><table><thead><tr><th>Tarih</th><th>Kullanıcı</th><th>Paket</th><th>Tutar</th><th>Durum</th><th>Dekont</th><th>İşlem</th></tr></thead><tbody id="dkd_payments_body"><tr><td colspan="7">Veri bekleniyor...</td></tr></tbody></table></div></article>
<aside class="dkd_card"><h2>Kullanıcılar</h2><div id="dkd_users_body" class="dkd_users">Veri bekleniyor...</div><h2>Seçili Kayıt</h2><pre id="dkd_detail_box" class="dkd_detail">Kayıt seçilmedi.</pre></aside>
</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./admin.js"></script>
</body>
</html>
