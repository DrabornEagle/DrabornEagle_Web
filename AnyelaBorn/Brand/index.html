<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070024" />
    <meta name="description" content="Anyela Born marka iş birliği ve tanıtım paketleri." />
    <title>Anyela Born | Markan için Anyela</title>
    <style>
      :root {
        --dkd_brand_bg:#070024;
        --dkd_brand_pink:#ff2bd6;
        --dkd_brand_cyan:#18f7ff;
        --dkd_brand_text:#ffffff;
        color-scheme:dark;
      }
      * { box-sizing:border-box; }
      html, body {
        margin:0;
        min-height:100%;
        background:
          radial-gradient(circle at 12% 0%, rgba(255,43,214,.35), transparent 24rem),
          radial-gradient(circle at 92% 10%, rgba(24,247,255,.22), transparent 26rem),
          linear-gradient(180deg,#09002d 0%,#02000f 100%);
        color:var(--dkd_brand_text);
        font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      a { color:inherit; text-decoration:none; -webkit-tap-highlight-color:transparent; }
      .dkd_anyela_brand_page {
        min-height:100svh;
        display:flex;
        justify-content:center;
        padding:max(0px, env(safe-area-inset-top)) 0 max(0px, env(safe-area-inset-bottom));
      }
      .dkd_anyela_brand_shell {
        width:min(100vw,480px);
        min-height:100svh;
        padding:14px;
        background:
          linear-gradient(180deg,rgba(24,247,255,.10),transparent 30%),
          var(--dkd_brand_bg);
        box-shadow:0 28px 90px rgba(0,0,0,.58);
      }
      .dkd_anyela_brand_topbar {
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        margin:2px 0 12px;
      }
      .dkd_anyela_brand_button {
        min-width:46px;
        min-height:46px;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        border-radius:999px;
        border:1px solid rgba(255,255,255,.18);
        background:rgba(255,255,255,.08);
        box-shadow:0 0 24px rgba(24,247,255,.16);
        font-weight:950;
      }
      .dkd_anyela_brand_title_group { text-align:center; }
      .dkd_anyela_brand_kicker {
        margin:0;
        color:var(--dkd_brand_cyan);
        font-size:11px;
        font-weight:950;
        letter-spacing:.18em;
        text-transform:uppercase;
      }
      .dkd_anyela_brand_title {
        margin:2px 0 0;
        font-size:22px;
        line-height:1.05;
        text-shadow:0 0 24px rgba(255,43,214,.45);
      }
      .dkd_anyela_brand_card {
        position:relative;
        overflow:hidden;
        border-radius:34px;
        border:1px solid rgba(255,255,255,.18);
        background:rgba(255,255,255,.06);
        box-shadow:
          0 24px 70px rgba(0,0,0,.42),
          0 0 38px rgba(255,43,214,.17),
          inset 0 1px 0 rgba(255,255,255,.16);
        animation:dkd_anyela_brand_float 4.6s ease-in-out infinite;
      }
      .dkd_anyela_brand_card:before {
        content:"";
        position:absolute;
        inset:0;
        pointer-events:none;
        background:linear-gradient(120deg, transparent 0 38%, rgba(255,255,255,.18) 44%, transparent 52% 100%);
        transform:translateX(-110%);
        animation:dkd_anyela_brand_shine 3.8s ease-in-out infinite;
        mix-blend-mode:screen;
      }
      .dkd_anyela_brand_image {
        display:block;
        width:100%;
        height:auto;
      }
      .dkd_anyela_brand_hint {
        margin:13px 0 0;
        padding:13px 14px;
        border-radius:22px;
        background:linear-gradient(135deg,rgba(255,43,214,.16),rgba(24,247,255,.12));
        border:1px solid rgba(255,255,255,.14);
        color:rgba(255,255,255,.84);
        line-height:1.45;
        font-size:13px;
        text-align:center;
      }
      @keyframes dkd_anyela_brand_float {
        0%,100% { transform:translateY(0); }
        50% { transform:translateY(-5px); }
      }
      @keyframes dkd_anyela_brand_shine {
        0%,55% { transform:translateX(-115%); }
        100% { transform:translateX(115%); }
      }
      @media (min-width:820px) {
        .dkd_anyela_brand_page { align-items:center; padding:32px 0; }
        .dkd_anyela_brand_shell {
          min-height:auto;
          border-radius:38px;
          border:1px solid rgba(255,255,255,.16);
        }
      }
    </style>
    <script src="../assets/dkd_anyela_auth_guard.js" data-dkd-anyela-auth-mode="protected"></script>
  </head>
  <body>
    <main class="dkd_anyela_brand_page" aria-label="Markan için Anyela">
      <section class="dkd_anyela_brand_shell">
        <header class="dkd_anyela_brand_topbar">
          <a class="dkd_anyela_brand_button" href="../Home/" aria-label="Ana sayfaya dön">‹</a>
          <div class="dkd_anyela_brand_title_group">
            <p class="dkd_anyela_brand_kicker">Miami Brand Club</p>
            <h1 class="dkd_anyela_brand_title">Markan için Anyela</h1>
          </div>
          <a class="dkd_anyela_brand_button" href="../Packages/" aria-label="Paketler sayfasına git">💎</a>
        </header>
        <article class="dkd_anyela_brand_card">
          <img class="dkd_anyela_brand_image" src="../assets/dkd_anyela_brand_packages_20260601.svg?v=20260601a" alt="Anyela Born marka iş birliği ve tanıtım paketleri" width="432" height="768" loading="eager" decoding="sync" />
        </article>
        <p class="dkd_anyela_brand_hint">Story, Post/Reel, Premium Kampanya ve VIP Marka Paketi seçeneklerini buradan tek ekranda inceleyebilirsin.</p>
      </section>
    </main>
  </body>
</html>
