<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050010" />
  <meta name="description" content="Anyela Born Miami Style Club paketleri" />
  <meta property="og:title" content="Anyela Born Paketler" />
  <meta property="og:description" content="Anyela Born Miami Style Club paketleri" />
  <meta property="og:image" content="/AnyelaBorn/Packages/anyela-born-packages-original.jpg" />
  <meta property="og:type" content="website" />
  <title>Anyela Born Paketler</title>
  <style>
    :root {
      color-scheme: dark;
      --dkd_bg: #050010;
      --dkd_panel: rgba(5, 0, 16, 0.92);
      --dkd_text: #ffffff;
      --dkd_soft: rgba(255, 255, 255, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--dkd_bg);
      color: var(--dkd_text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    .dkd_page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: radial-gradient(circle at top, rgba(255, 0, 217, 0.10), transparent 32%), var(--dkd_bg);
    }

    .dkd_image_frame {
      width: min(100%, 864px);
      margin: 0 auto;
      background: var(--dkd_panel);
    }

    .dkd_original_image {
      display: block;
      width: 100%;
      max-width: 864px;
      height: auto;
      margin: 0 auto;
      border: 0;
      image-rendering: auto;
      -ms-interpolation-mode: bicubic;
    }

    .dkd_original_note {
      width: min(100%, 864px);
      margin: 0 auto;
      padding: 10px 14px 16px;
      text-align: center;
      color: var(--dkd_soft);
      font-size: 12px;
      line-height: 1.45;
      background: #050010;
    }

    .dkd_original_note a {
      color: #ff57e8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="dkd_page" aria-label="Anyela Born Paketler">
    <section class="dkd_image_frame">
      <img
        class="dkd_original_image"
        src="/AnyelaBorn/Packages/anyela-born-packages-original.jpg"
        width="864"
        height="1536"
        alt="Anyela Born Miami Style Club paketler görseli"
        decoding="async"
        fetchpriority="high"
      />
      <div class="dkd_original_note">
        Görsel orijinal 864×1536 boyutuyla eklenmiştir. Kalite kaybı olmaması için yeniden sıkıştırma yapılmadı.
        <a href="/AnyelaBorn/Packages/anyela-born-packages-original.jpg" target="_blank" rel="noopener">Orijinal görseli aç</a>
      </div>
    </section>
  </main>
</body>
</html>
