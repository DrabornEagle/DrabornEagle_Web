<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DraBornGo Android APK</title>
  <meta name="description" content="DraBornGo Android APK indirme görseli.">
  <meta name="theme-color" content="#050912">
  <style>
    :root{--dkd_bg:#050912;--dkd_panel:#07111f;--dkd_line:rgba(72,214,255,.24);--dkd_text:#f7fbff;--dkd_muted:#aab8ce;}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#0d2442 0%,var(--dkd_bg) 48%,#02040a 100%);}
    body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);font-family:Arial,Helvetica,sans-serif;overflow-x:hidden;color:var(--dkd_text)}
    .dkd_app_frame{width:min(100vw,520px);min-height:100svh;display:flex;align-items:center;justify-content:center;background:var(--dkd_panel);border-left:1px solid var(--dkd_line);border-right:1px solid var(--dkd_line)}
    .dkd_app_poster{display:block;width:100%;height:auto;max-width:100%;object-fit:contain;object-position:center;-webkit-user-select:none;user-select:none}
    .dkd_app_fallback{width:min(100%,440px);padding:24px;border:1px solid var(--dkd_line);border-radius:28px;background:rgba(255,255,255,.05);text-align:center;line-height:1.5}
    .dkd_app_fallback strong{display:block;font-size:24px;margin-bottom:8px;color:#ffd66b}.dkd_app_fallback span{color:var(--dkd_muted)}
    @media (orientation:landscape){.dkd_app_frame{width:auto;max-width:100vw}.dkd_app_poster{width:auto;height:100svh;max-height:100svh}}
  </style>
</head>
<body>
  <main class="dkd_app_frame" aria-label="DraBornGo Android APK indirme görseli">
    <picture>
      <source srcset="dkd_draborngo_apk_poster.jpg" type="image/jpeg">
      <img class="dkd_app_poster" src="dkd_draborngo_apk_poster.jpg" alt="DraBornGo Android APK web sitesinden hemen indir tanıtım görseli" onerror="this.outerHTML='<section class=&quot;dkd_app_fallback&quot;><strong>DraBornGo App</strong><span>Görsel dosyası henüz aynı klasöre yüklenmedi. Dosya adı: dkd_draborngo_apk_poster.jpg</span></section>'">
    </picture>
  </main>
</body>
</html>
