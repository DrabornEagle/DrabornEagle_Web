<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#030407" />
  <meta name="description" content="DraBornGarage v1.0 APK indir." />
  <title>DraBornGarage APK İndir</title>
  <style>
    :root{color-scheme:dark;--red:#ff2350;--cyan:#31dcff;--orange:#ff6a00;--panel:rgba(7,10,16,.96)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#000;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
    button,a{font:inherit}
    .stage{position:fixed;inset:0;display:grid;place-items:center;background:#000;isolation:isolate}
    .poster{position:relative;width:min(100vw,calc(100dvh * 819 / 1536));height:min(100dvh,calc(100vw * 1536 / 819));aspect-ratio:819/1536;overflow:hidden;background:#05070b}
    .poster>img{display:block;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}
    .download-hotspot{position:absolute;left:12.2%;right:13.1%;top:80.2%;height:9.4%;border:0;border-radius:18%;background:transparent;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent}
    .download-hotspot:focus-visible{box-shadow:0 0 0 4px #fff,0 0 36px var(--cyan)}
    .download-hotspot::after{content:"";position:absolute;inset:7%;border-radius:22px;border:2px solid transparent;transition:.2s}
    .download-hotspot:active::after{border-color:rgba(255,255,255,.7);box-shadow:0 0 30px rgba(49,220,255,.55),inset 0 0 24px rgba(255,35,80,.35)}
    .loading{position:absolute;inset:0;display:grid;place-content:center;gap:14px;text-align:center;color:#c8d1dc;background:#030407;z-index:-1}
    .loading i{width:48px;height:48px;margin:auto;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:var(--cyan);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back{position:fixed;left:max(14px,env(safe-area-inset-left));top:max(14px,env(safe-area-inset-top));z-index:5;width:46px;height:46px;border:1px solid rgba(255,255,255,.18);border-radius:15px;background:rgba(3,5,9,.62);backdrop-filter:blur(13px);color:white;font-size:22px;display:grid;place-items:center;text-decoration:none;box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .modal-backdrop{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);opacity:0;visibility:hidden;transition:.25s}
    .modal-backdrop.open{opacity:1;visibility:visible}
    .modal{width:min(100%,440px);border:1px solid rgba(255,255,255,.14);border-radius:30px;background:linear-gradient(155deg,rgba(18,24,34,.99),rgba(5,8,13,.99));box-shadow:0 30px 100px rgba(0,0,0,.72),0 0 50px rgba(255,35,80,.13);overflow:hidden;transform:translateY(25px) scale(.97);transition:.3s cubic-bezier(.2,.8,.2,1)}
    .open .modal{transform:none}
    .modal-head{position:relative;padding:26px 64px 19px 24px;border-bottom:1px solid rgba(255,255,255,.09)}
    .modal-head::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--cyan))}
    .modal-head h1{font-size:25px;line-height:1.15;margin:0;color:#fff}
    .modal-head p{margin:9px 0 0;color:#8f9bac;font-size:13px;line-height:1.55}
    .close{position:absolute;right:17px;top:18px;width:42px;height:42px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:#151d28;color:#fff;font-size:22px;cursor:pointer}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
    .option{min-height:118px;border:1px solid rgba(255,255,255,.1);border-radius:21px;background:linear-gradient(145deg,rgba(255,255,255,.065),rgba(255,255,255,.018));color:#fff;padding:18px 13px;text-align:center;text-decoration:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;transition:.2s}
    .option:hover,.option:active{transform:translateY(-2px);border-color:rgba(49,220,255,.4);box-shadow:0 14px 35px rgba(0,0,0,.28)}
    .option .ico{font-size:30px;filter:drop-shadow(0 0 13px rgba(49,220,255,.45))}
    .option strong{font-size:15px}
    .option small{color:#8e9aaa;font-size:11px;line-height:1.4}
    .option.instant{background:linear-gradient(135deg,#ff5c00,#ff1748);border-color:rgba(255,255,255,.22);box-shadow:0 13px 35px rgba(255,45,40,.2)}
    .option.instant small{color:#ffe2dc}
    .qr-panel{display:none;padding:0 20px 24px;text-align:center}
    .qr-panel.open{display:block;animation:fade .25s ease}
    .qr-box{width:230px;max-width:74vw;margin:0 auto 15px;padding:13px;border-radius:24px;background:#fff;box-shadow:0 18px 55px rgba(49,220,255,.2)}
    .qr-box img{display:block;width:100%;height:auto}
    .qr-panel h2{font-size:19px;margin:0 0 7px}
    .qr-panel p{color:#929dac;font-size:13px;line-height:1.55;margin:0}
    .qr-actions{display:flex;justify-content:center;gap:10px;margin-top:16px}
    .qr-actions button,.qr-actions a{border:1px solid rgba(255,255,255,.12);border-radius:13px;background:#151d27;color:#fff;padding:11px 14px;text-decoration:none;font-weight:800;font-size:12px;cursor:pointer}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}}
    @media(max-width:420px){.options{grid-template-columns:1fr}.option{min-height:96px;flex-direction:row;text-align:left;justify-content:flex-start;padding:16px 18px}.option .ico{width:46px;text-align:center}.modal{border-radius:27px}.modal-head{padding-top:24px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="stage">
    <a class="back" href="/DraBornGarage/" aria-label="DraBornGarage ana sayfasına dön">‹</a>
    <section class="poster" aria-label="DraBornGarage APK indirme posteri">
      <div class="loading"><i></i><span>Görsel yükleniyor…</span></div>
      <img src="/DraBornGarage/APKindir/assets/poster.png?v=1.0" width="819" height="1536" alt="DraBornGarage Garage APK İndir" />
      <button class="download-hotspot" id="openDownload" type="button" aria-label="APK indirme seçeneklerini aç"></button>
    </section>
  </main>

  <div class="modal-backdrop" id="downloadModal" role="dialog" aria-modal="true" aria-labelledby="downloadTitle">
    <section class="modal">
      <header class="modal-head">
        <h1 id="downloadTitle">DraBornGarage v1.0</h1>
        <p>Android telefonuna kurmak için bir indirme yöntemi seç.</p>
        <button class="close" id="closeDownload" type="button" aria-label="Kapat">×</button>
      </header>
      <div class="options" id="downloadOptions">
        <button class="option" id="showQr" type="button">
          <span class="ico">▦</span>
          <span><strong>QR Okutarak İndir</strong><small>Başka bir telefonun kamerasıyla okut.</small></span>
        </button>
        <a class="option instant" href="/DraBornGarage/APKindir/files/DraBornGarage-v1.0-production.apk" download="DraBornGarage-v1.0-production.apk">
          <span class="ico">⇩</span>
          <span><strong>Hemen İndir</strong><small>APK dosyasını bu telefona indir.</small></span>
        </a>
      </div>
      <div class="qr-panel" id="qrPanel">
        <div class="qr-box"><img src="/DraBornGarage/APKindir/assets/qr.svg?v=1" alt="DraBornGarage APK indirme QR kodu" /></div>
        <h2>Kamerayla QR kodu okut</h2>
        <p>QR kodu açan telefonda DraBornGarage v1.0 APK indirmesi başlayacak.</p>
        <div class="qr-actions">
          <button type="button" id="backOptions">Geri</button>
          <a href="/DraBornGarage/APKindir/files/DraBornGarage-v1.0-production.apk" download>Bu Telefona İndir</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    (()=>{
      const modal=document.getElementById('downloadModal');
      const options=document.getElementById('downloadOptions');
      const qr=document.getElementById('qrPanel');
      const open=()=>{modal.classList.add('open');document.body.style.overflow='hidden'};
      const close=()=>{modal.classList.remove('open');qr.classList.remove('open');options.style.display='grid';document.body.style.overflow=''};
      document.getElementById('openDownload').addEventListener('click',open);
      document.getElementById('closeDownload').addEventListener('click',close);
      document.getElementById('showQr').addEventListener('click',()=>{options.style.display='none';qr.classList.add('open')});
      document.getElementById('backOptions').addEventListener('click',()=>{qr.classList.remove('open');options.style.display='grid'});
      modal.addEventListener('click',e=>{if(e.target===modal)close()});
      addEventListener('keydown',e=>{if(e.key==='Escape')close()});
    })();
  </script>
</body>
</html>
