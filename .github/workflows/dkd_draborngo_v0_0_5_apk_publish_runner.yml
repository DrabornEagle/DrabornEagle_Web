name: DKD DraBornGo v0.0.5 APK Web Publisher

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: dkd-draborngo-v0-0-5-apk-web-publisher
  cancel-in-progress: false

jobs:
  dkd_publish_web_apk:
    if: github.event.pull_request.title == '[DKD] Publish DraBornGo v0.0.5 APK to web'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish APK link and SHA-256 to web files
        run: python3 scripts/dkd_draborngo_v0_0_5_apk_publish.py

      - name: Verify public APK asset
        shell: bash
        run: |
          dkd_apk_url='https://github.com/DrabornEagle/DraBornGo/releases/download/dkd_draborngo_v0.0.5/DraBornGo-v0.0.5-code5-release.apk'
          curl --fail --location --head "${dkd_apk_url}"

      - name: Verify manifest and download page
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          dkd_app_path = Path('DraBornGo/App')
          dkd_apk_url = 'https://github.com/DrabornEagle/DraBornGo/releases/download/dkd_draborngo_v0.0.5/DraBornGo-v0.0.5-code5-release.apk'
          dkd_sha256_value = '7b7bdc301eaaba4c4484ce18464c242fe98d4492012d44171c31394f72ed762f'

          dkd_manifest_value = json.loads((dkd_app_path / 'dkd_draborngo_update_manifest.json').read_text(encoding='utf-8'))
          if dkd_manifest_value.get('dkd_latest_version_name') != '0.0.5':
              raise SystemExit('Manifest version is not 0.0.5.')
          if int(dkd_manifest_value.get('dkd_latest_version_code', 0)) != 5:
              raise SystemExit('Manifest versionCode is not 5.')
          if dkd_manifest_value.get('dkd_apk_url') != dkd_apk_url:
              raise SystemExit('Manifest APK URL is incorrect.')
          if dkd_manifest_value.get('dkd_sha256') != dkd_sha256_value:
              raise SystemExit('Manifest SHA-256 is incorrect.')

          dkd_download_text_value = (dkd_app_path / 'dkd_download.html').read_text(encoding='utf-8')
          if dkd_apk_url not in dkd_download_text_value:
              raise SystemExit('Download page APK link is missing.')
          if 'APK hazırlanıyor' in dkd_download_text_value:
              raise SystemExit('Download page still shows preparing state.')

          print('DraBornGo v0.0.5 web APK publication verified.')
          PY

      - name: Publish validated web files to main
        shell: bash
        run: |
          git config user.name 'DKD Web Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No web changes to publish.'
            exit 0
          fi
          git commit -m 'DraBornGo web: enable v0.0.5 signed APK download'
          git push origin HEAD:main
