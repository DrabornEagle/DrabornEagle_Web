name: Inspect DraBornGarage Release APK

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/publish-draborngarage-apk-page.yml

permissions:
  contents: read

jobs:
  inspect-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download current production APK
        shell: bash
        run: |
          set -euo pipefail
          gh release download v1.0-apk-rc \
            --repo DrabornEagle/DraBornGarage \
            --pattern DraBornGarage-v1.0-production.apk \
            --dir "$RUNNER_TEMP" \
            --clobber
          sha256sum "$RUNNER_TEMP/DraBornGarage-v1.0-production.apk"
          stat -c '%s bytes' "$RUNNER_TEMP/DraBornGarage-v1.0-production.apk"

      - name: Upload current release APK for binary comparison
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-current-release-apk
          path: ${{ runner.temp }}/DraBornGarage-v1.0-production.apk
          compression-level: 0
          retention-days: 1
