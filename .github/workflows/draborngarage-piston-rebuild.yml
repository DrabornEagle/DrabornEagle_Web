name: Rebuild Exact Piston Garaj Poster

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-poster:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/draborngarage-piston-apk-v1.1
          fetch-depth: 0

      - name: Rebuild exact poster
        shell: bash
        run: |
          set -euo pipefail
          SRC="DraBornGarage/PistonGaraj/APKindir"
          cat "$SRC"/source_exact/chunk_*.b64 > /tmp/poster.b64
          base64 --decode /tmp/poster.b64 > "$SRC/assets/poster.jpg"
          wc -c /tmp/poster.b64 "$SRC/assets/poster.jpg"

      - name: Validate exact bytes and dimensions
        shell: python
        run: |
          from pathlib import Path
          import hashlib

          path = Path("DraBornGarage/PistonGaraj/APKindir/assets/poster.jpg")
          data = path.read_bytes()
          expected_sha = "ebb4c32fac5236196f67024278e6ed21473bd2ba09f3d1100afe2c2d3a027e95"
          actual_sha = hashlib.sha256(data).hexdigest()
          if actual_sha != expected_sha:
              raise SystemExit(f"SHA mismatch: {actual_sha}")
          if len(data) != 346056:
              raise SystemExit(f"Unexpected byte size: {len(data)}")
          if not data.startswith(b"\xff\xd8"):
              raise SystemExit("Poster is not JPEG")

          index = 2
          width = height = None
          while index + 9 < len(data):
              if data[index] != 0xFF:
                  index += 1
                  continue
              marker = data[index + 1]
              index += 2
              if marker in (0xD8, 0xD9):
                  continue
              segment_length = int.from_bytes(data[index:index + 2], "big")
              if marker in range(0xC0, 0xC4):
                  height = int.from_bytes(data[index + 3:index + 5], "big")
                  width = int.from_bytes(data[index + 5:index + 7], "big")
                  break
              index += segment_length

          if (width, height) != (819, 1536):
              raise SystemExit(f"Unexpected dimensions: {width}x{height}")
          print(f"Validated exact JPEG {width}x{height}, {len(data)} bytes, SHA256={actual_sha}")

      - name: Finalize feature branch
        shell: bash
        run: |
          set -euo pipefail
          SRC="DraBornGarage/PistonGaraj/APKindir"
          sed -i 's#assets/poster\.png?v=1\.1#assets/poster.jpg?v=1.1#g' "$SRC/index.html"
          rm -f "$SRC/assets/poster.png"
          rm -rf "$SRC/source" "$SRC/source_exact"
          rm -f .github/workflows/draborngarage-piston-poster.yml
          rm -f .github/workflows/draborngarage-piston-exact.yml
          rm -f .github/workflows/draborngarage-piston-rebuild.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(draborngarage): publish exact Piston Garaj poster"
          git push origin HEAD:feature/draborngarage-piston-apk-v1.1
