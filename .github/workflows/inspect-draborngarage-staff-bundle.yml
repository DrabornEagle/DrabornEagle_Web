name: Inspect DraBornGarage Web Bundles

on:
  push:
    branches:
      - automation/draborngarage-finalize
    paths:
      - .github/workflows/inspect-draborngarage-staff-bundle.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-draborngarage-staff-bundle.yml
      - DraBornGarage/assets/chunks_v3/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild web sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reconstructed
          for module in core customer staff garage; do
            cat DraBornGarage/assets/chunks_v3/${module}_*.txt | tr -d '\r\n' | base64 --decode | gzip --decompress > reconstructed/dkd_${module}.js
            sha256sum reconstructed/dkd_${module}.js
          done
          rg -n -C 40 'Hızlı Servis|Bırakılan Motor' reconstructed | tee reconstructed/matches.txt || true
          rg -n -C 20 -i 'hızlı.*servis|bırakılan.*motor|quick.*service|dropped.*motor' reconstructed | tee reconstructed/related.txt || true

      - name: Upload reconstructed sources
        uses: actions/upload-artifact@v4
        with:
          name: draborngarage-web-sources
          path: reconstructed/
          if-no-files-found: error
          retention-days: 1
