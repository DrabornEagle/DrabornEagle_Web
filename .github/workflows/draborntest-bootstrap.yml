name: DraBornTest CRM bootstrap

on:
  push:
    branches:
      - agent/draborntest-crm-demo
    paths:
      - '.draborntest-bootstrap/**'
      - '.github/workflows/draborntest-bootstrap.yml'

permissions:
  contents: write

concurrency:
  group: draborntest-bootstrap
  cancel-in-progress: false

jobs:
  unpack-validate-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/draborntest-crm-demo
          fetch-depth: 0

      - name: Rebuild DraBornTest source files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(find .draborntest-bootstrap -maxdepth 1 -type f -name 'part*' | sort -V)
          test "${#parts[@]}" -gt 0
          cat "${parts[@]}" > /tmp/draborntest-payload.b64
          base64 --decode /tmp/draborntest-payload.b64 > /tmp/draborntest-payload.tgz
          tar -tzf /tmp/draborntest-payload.tgz >/dev/null
          tar -xzf /tmp/draborntest-payload.tgz
          test -f DraBornTest/index.html
          test -f DraBornTest/app.js
          test -f DraBornTest/styles.css
          test -f DraBornTest/server/index.js
          test -f DraBornTest/docs/API-ANAHTARLARI-VE-WHATSAPP-REHBERI.md

      - name: Validate demo application
        working-directory: DraBornTest
        run: npm run check

      - name: Commit rebuilt application
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .draborntest-bootstrap
          rm -f .github/workflows/draborntest-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "feat(draborntest): complete CRM demo application"
          git push origin HEAD:agent/draborntest-crm-demo
